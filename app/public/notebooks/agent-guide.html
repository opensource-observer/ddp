      function __resizeIframe(obj) {
        const scrollbarHeight = 20; // Max between windows, mac, and linux

        function setHeight() {
          // Guard against race condition where iframe isn't ready
          if (!obj.contentWindow?.document?.documentElement) {
            return;
          }
          const element = obj.contentWindow.document.documentElement;
          // If there is no vertical scrollbar, we don't need to resize the iframe
          if (element.scrollHeight === element.clientHeight) {
            return;
          }

          // Create a new height that includes the scrollbar height if it's visible
          const hasHorizontalScrollbar = element.scrollWidth > element.clientWidth;
          const newHeight = element.scrollHeight + (hasHorizontalScrollbar ? scrollbarHeight : 0);

          // Only update the height if it's different from the current height
          if (obj.style.height !== `${newHeight}px`) {
            obj.style.height = `${newHeight}px`;
          }
        }

        // Resize the iframe to the height of the content and bottom scrollbar height
        setHeight();

        // Resize the iframe when the content changes
        const resizeObserver = new ResizeObserver((_entries) => {
          setHeight();
        });
        // Only observe if iframe content is ready
        if (obj.contentWindow?.document?.body) {
          resizeObserver.observe(obj.contentWindow.document.body);
        }
      }
    </script>

<style title='marimo-custom'>/* Generated by build_css.py — do not edit directly. */
/* Source: base.css + _root.css */

/*
 * DDP Notebook Base Styles
 *
 * Shared foundation for all marimo notebooks in the Developer Data Portal.
 * This file is concatenated with variant partials (_root.css, _data.css,
 * _insights.css) by scripts/build_css.py to produce self-contained CSS files.
 *
 * Font: System stack — matches the Next.js shell exactly. Overrides marimo's
 * default PT Sans to eliminate the visual mismatch between sidebar and content.
 *
 * Color provenance (update both here and app/app/globals.css if colors change):
 *   - Chart palette: --ddp-primary, --ddp-secondary, --ddp-tertiary
 *   - Shell accent: --ddp-accent (indigo-600, shared with Tailwind config)
 *   - Slate scale: --ddp-text, --ddp-border, etc. (Tailwind slate palette)
 */

/* === Custom Properties === */
:root {
  --ddp-font: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen',
    'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue', sans-serif;
  --ddp-font-mono: 'Fira Mono', 'Fira Code', ui-monospace, monospace;
  --ddp-primary: #4C78A8;
  --ddp-secondary: #F58518;
  --ddp-tertiary: #72B7B2;
  --ddp-text: #0f172a;
  --ddp-text-muted: #64748b;
  --ddp-bg: #ffffff;
  --ddp-border: #e2e8f0;
  --ddp-surface: #f8fafc;
  --ddp-accent: #4f46e5;
}

/* === Nuclear font override ===
 * Marimo components use inline styles and deeply nested React elements.
 * A targeted selector list can't catch them all. The universal selector
 * with !important is the only way to guarantee the system font everywhere. */
*, *::before, *::after {
  box-sizing: border-box;
  font-family: var(--ddp-font) !important;
}
code, code *, pre, pre *, .cm-editor, .cm-editor * {
  font-family: var(--ddp-font-mono) !important;
}

/* === Content width ===
 * Global max-width for all cell output so tables, charts, markdown,
 * and stat cards align to the same column. Root variant narrows to 720px. */
#root [data-cell-id] > div {
  max-width: 1100px !important;
}

/* === Base === */
body {
  margin: 0;
  padding: 0;
  font-size: 14px;
  line-height: 1.5;
  color: var(--ddp-text);
  background: var(--ddp-bg);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

/* === Headings ===
 * Weight 600 (semibold) throughout — quieter than marimo's 700-800 defaults.
 * Tight letter-spacing for a modern, dense feel. .prose targets marimo's
 * Tailwind Typography wrapper around markdown output. */
h1, .prose h1 {
  font-weight: 600 !important;
  line-height: 1.25 !important;
  letter-spacing: -0.02em !important;
  color: var(--ddp-text) !important;
}
h2, .prose h2 {
  font-weight: 600 !important;
  line-height: 1.3 !important;
  letter-spacing: -0.01em !important;
  color: var(--ddp-text) !important;
}
h3, .prose h3 {
  font-weight: 600 !important;
  line-height: 1.35 !important;
  color: var(--ddp-text) !important;
}

/* === Body text === */
p, li, .prose p, .prose li {
  line-height: 1.5 !important;
  color: var(--ddp-text) !important;
  font-size: inherit !important;
}

small, .text-muted {
  color: var(--ddp-text-muted);
}

/* === Inline code === */
code {
  font-size: 0.8125em;
  background: var(--ddp-surface);
  padding: 0.15em 0.4em;
  border-radius: 3px;
  color: var(--ddp-text);
}
.prose code {
  font-size: 0.8125em !important;
  background: var(--ddp-surface) !important;
  color: var(--ddp-text) !important;
}

/* === Code blocks (GitHub-style: subtle bg, no border) === */
pre code {
  display: block;
  padding: 0.85em 1em;
  overflow-x: auto;
  background: #f6f8fa;
  border: none;
  border-radius: 6px;
  font-size: 0.8125em;
  line-height: 1.55;
}

/* === Links === */
a {
  color: var(--ddp-accent);
  text-decoration: none;
}
a:hover {
  text-decoration: underline;
}

/* === Scrollbar === */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: #9ca3af; }

/* === Tables === */
table {
  width: 100%;
  border-collapse: collapse;
  font-size: 0.8125em;
}
th {
  text-align: left;
  padding: 6px 10px;
  border-bottom: 1px solid var(--ddp-border);
  color: var(--ddp-text-muted);
  font-weight: 500;
  font-size: 0.8125em;
  text-transform: uppercase;
  letter-spacing: 0.03em;
}
td {
  padding: 6px 10px;
  border-bottom: 1px solid var(--ddp-border);
  color: var(--ddp-text);
}

/* === Marimo stat cards ===
 * Normalize the oversized stat values and labels to feel like
 * part of the same app as the sidebar. */
/* Equal-height stat cards: stretch within flex row, clamp long values */
[data-testid="marimo-stat"] {
  border-color: var(--ddp-border) !important;
  border-radius: 6px !important;
  align-self: stretch !important;
  min-height: 0 !important;
}
[data-testid="marimo-stat"] > div {
  height: 100% !important;
}
[data-testid="marimo-stat"] [class*="label"],
[data-testid="marimo-stat"] [class*="Label"] {
  font-size: 0.75em !important;
  font-weight: 500 !important;
  color: var(--ddp-text-muted) !important;
  text-transform: uppercase !important;
  letter-spacing: 0.03em !important;
}
[data-testid="marimo-stat"] [class*="value"],
[data-testid="marimo-stat"] [class*="Value"] {
  font-size: clamp(1em, 4vw, 1.5em) !important;
  font-weight: 600 !important;
  letter-spacing: -0.02em !important;
  color: var(--ddp-text) !important;
  overflow-wrap: break-word !important;
  word-break: break-word !important;
  line-height: 1.2 !important;
}
[data-testid="marimo-stat"] [class*="caption"],
[data-testid="marimo-stat"] [class*="Caption"] {
  font-size: 0.75em !important;
  color: var(--ddp-text-muted) !important;
}

/* === Marimo tables (data grid) === */
[data-testid="marimo-table"] th,
[class*="TableHeader"] th {
  font-size: 0.6875em !important;
  font-weight: 500 !important;
  text-transform: uppercase !important;
  letter-spacing: 0.04em !important;
  color: var(--ddp-text-muted) !important;
}

/* === Marimo UI elements === */
select, button, input {
  font-size: 0.8125em !important;
}

/* === Plotly chart overrides ===
 * Plotly uses inline SVG text — we can't override font-family on those,
 * but we can normalize the container spacing. */
.js-plotly-plot {
  max-width: 100%;
  margin: 0.5em 0;
}

/* === Mobile: Tablet === */
@media (max-width: 768px) {
  #root {
    padding-left: 12px !important;
    padding-right: 12px !important;
  }

  table {
    display: block;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
  }

  .marimo-output .flex-row {
    flex-direction: column !important;
  }
}

/* === Mobile: Phone === */
@media (max-width: 480px) {
  .marimo-output .flex-row {
    flex-direction: column !important;
    gap: 0.5rem !important;
  }
}


/* === Root variant overrides === */

/*
 * DDP Root Notebook Overrides
 * For: quick-start.py, publications.py, agent-guide.py
 * Prose-optimized layout for documentation/onboarding content.
 */

/* Use same 1100px as base — consistent across all variants */

/* Accordion styling */
details {
  border: 1px solid var(--ddp-border);
  border-radius: 6px;
  padding: 0.5em 1em;
  margin: 0.75em 0;
}
details summary {
  font-weight: 600;
  cursor: pointer;
  padding: 0.25em 0;
}

/* Links with accent color */
.marimo-output a {
  color: var(--ddp-accent);
}

/* Numbered section headers */
h2 {
  padding-bottom: 0.3em;
  border-bottom: 1px solid var(--ddp-border);
}

            "session": {"cells": [{"code_hash": "cf4c5f3b4b292be51c8934ada1ee2db9", "console": [], "id": "Hbol", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Ch1 id=\"agent-guide\"\u003EAgent Guide\u003C/h1\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "924f7fe6d1ef42ce6b6ebb7bdb46795e", "console": [], "id": "MJUe", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Ch2 id=\"setup\"\u003ESetup\u003C/h2\u003E\n\u003Cspan class=\"paragraph\"\u003EPoint your agent at \u003Ca href=\"https://ddp.oso.xyz/agents.md\" rel=\"noopener noreferrer\" target=\"_blank\"\u003Ethis URL\u003C/a\u003E:\u003C/span\u003E\n\u003Cdiv class=\"language-bash codehilite\"\u003E\u003Cpre\u003E\u003Cspan\u003E\u003C/span\u003E\u003Ccode\u003Ecurl\u003Cspan class=\"w\"\u003E \u003C/span\u003E-s\u003Cspan class=\"w\"\u003E \u003C/span\u003Ehttps://ddp.oso.xyz/agents.md\n\u003C/code\u003E\u003C/pre\u003E\u003C/div\u003E\n\u003Cspan class=\"paragraph\"\u003EThe guide is a standalone markdown file with connection setup, SQL dialect, key tables, and starter queries. Paste it into Claude Code, Codex, or any agent framework. Your agent will ask you for an API key and start querying.\u003C/span\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "ec740ba1aba5871aee243c34a9f72014", "console": [], "id": "vblA", "outputs": [{"data": {"text/html": "\u003Cdiv style='display: flex;flex: 1;flex-direction: column;justify-content: flex-start;align-items: normal;flex-wrap: nowrap;gap: 0.5rem'\u003E\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Ch2 id=\"creating-interactive-notebooks\"\u003ECreating Interactive Notebooks\u003C/h2\u003E\u003C/span\u003E\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Cspan class=\"paragraph\"\u003EWe also have some skill templates for creating notebooks on top of DDP data with marimo. The guides below are opinionated but hopefully useful as inspiration. You can also point your agent to the \u003Ca href=\"https://github.com/opensource-observer/ddp\" rel=\"noopener noreferrer\" target=\"_blank\"\u003Efull repo\u003C/a\u003E.\u003C/span\u003E\u003C/span\u003E\u003Cmarimo-accordion data-labels='[\u0026quot;\u0026lt;span class=\u0026#92;\u0026quot;markdown prose dark:prose-invert contents\u0026#92;\u0026quot;\u0026gt;\u0026lt;span class=\u0026#92;\u0026quot;paragraph\u0026#92;\u0026quot;\u0026gt;Notebook Creation Guide\u0026lt;/span\u0026gt;\u0026lt;/span\u0026gt;\u0026quot;,\u0026quot;\u0026lt;span class=\u0026#92;\u0026quot;markdown prose dark:prose-invert contents\u0026#92;\u0026quot;\u0026gt;\u0026lt;span class=\u0026#92;\u0026quot;paragraph\u0026#92;\u0026quot;\u0026gt;Advanced Patterns\u0026lt;/span\u0026gt;\u0026lt;/span\u0026gt;\u0026quot;]' data-multiple='false'\u003E\u003Cdiv\u003E\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Cdiv class=\"language-markdown codehilite\"\u003E\u003Cpre\u003E\u003Cspan\u003E\u003C/span\u003E\u003Ccode\u003E\u003Cspan class=\"gh\"\u003E# Creating an Interactive Notebook\u003C/span\u003E\n\nDDP notebooks are marimo notebooks (\u003Cspan class=\"sb\"\u003E`.py`\u003C/span\u003E files, not \u003Cspan class=\"sb\"\u003E`.ipynb`\u003C/span\u003E). Marimo uses a DAG of cells\nwith automatic dependency resolution \u2014 cell order in the file doesn\u0026#39;t affect execution order.\nFor the full style guide, see \u003Cspan class=\"sb\"\u003E`notebooks/CLAUDE.md`\u003C/span\u003E in the repo.\n\n\u003Cspan class=\"gu\"\u003E## Required Boilerplate\u003C/span\u003E\n\nEvery notebook needs three things:\n\n\u003Cspan class=\"gs\"\u003E**1. File header**\u003C/span\u003E (top of file):\n\u003Cspan class=\"sb\"\u003E```python\u003C/span\u003E\n\u003Cspan class=\"kn\"\u003Eimport\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"nn\"\u003Emarimo\u003C/span\u003E\n\n\u003Cspan class=\"n\"\u003E__generated_with\u003C/span\u003E \u003Cspan class=\"o\"\u003E=\u003C/span\u003E \u003Cspan class=\"s2\"\u003E\u0026quot;unknown\u0026quot;\u003C/span\u003E\n\u003Cspan class=\"n\"\u003Eapp\u003C/span\u003E \u003Cspan class=\"o\"\u003E=\u003C/span\u003E \u003Cspan class=\"n\"\u003Emarimo\u003C/span\u003E\u003Cspan class=\"o\"\u003E.\u003C/span\u003E\u003Cspan class=\"n\"\u003EApp\u003C/span\u003E\u003Cspan class=\"p\"\u003E(\u003C/span\u003E\u003Cspan class=\"n\"\u003Ewidth\u003C/span\u003E\u003Cspan class=\"o\"\u003E=\u003C/span\u003E\u003Cspan class=\"s2\"\u003E\u0026quot;full\u0026quot;\u003C/span\u003E\u003Cspan class=\"p\"\u003E)\u003C/span\u003E\n\u003Cspan class=\"sb\"\u003E```\u003C/span\u003E\n\n\u003Cspan class=\"gs\"\u003E**2. Setup cell**\u003C/span\u003E (can be placed at the bottom \u2014 marimo resolves deps automatically):\n\u003Cspan class=\"sb\"\u003E```python\u003C/span\u003E\n\u003Cspan class=\"nd\"\u003E@app\u003C/span\u003E\u003Cspan class=\"o\"\u003E.\u003C/span\u003E\u003Cspan class=\"n\"\u003Ecell\u003C/span\u003E\u003Cspan class=\"p\"\u003E(\u003C/span\u003E\u003Cspan class=\"n\"\u003Ehide_code\u003C/span\u003E\u003Cspan class=\"o\"\u003E=\u003C/span\u003E\u003Cspan class=\"kc\"\u003ETrue\u003C/span\u003E\u003Cspan class=\"p\"\u003E)\u003C/span\u003E\n\u003Cspan class=\"k\"\u003Edef\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"nf\"\u003Esetup_pyoso\u003C/span\u003E\u003Cspan class=\"p\"\u003E():\u003C/span\u003E\n    \u003Cspan class=\"c1\"\u003E# This code sets up pyoso to be used as a database provider for this notebook\u003C/span\u003E\n    \u003Cspan class=\"c1\"\u003E# This code is autogenerated. Modification could lead to unexpected results :)\u003C/span\u003E\n    \u003Cspan class=\"kn\"\u003Eimport\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"nn\"\u003Epyoso\u003C/span\u003E\n    \u003Cspan class=\"kn\"\u003Eimport\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"nn\"\u003Emarimo\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"k\"\u003Eas\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"nn\"\u003Emo\u003C/span\u003E\n    \u003Cspan class=\"n\"\u003Epyoso_db_conn\u003C/span\u003E \u003Cspan class=\"o\"\u003E=\u003C/span\u003E \u003Cspan class=\"n\"\u003Epyoso\u003C/span\u003E\u003Cspan class=\"o\"\u003E.\u003C/span\u003E\u003Cspan class=\"n\"\u003EClient\u003C/span\u003E\u003Cspan class=\"p\"\u003E()\u003C/span\u003E\u003Cspan class=\"o\"\u003E.\u003C/span\u003E\u003Cspan class=\"n\"\u003Edbapi_connection\u003C/span\u003E\u003Cspan class=\"p\"\u003E()\u003C/span\u003E\n    \u003Cspan class=\"k\"\u003Ereturn\u003C/span\u003E \u003Cspan class=\"n\"\u003Emo\u003C/span\u003E\u003Cspan class=\"p\"\u003E,\u003C/span\u003E \u003Cspan class=\"n\"\u003Epyoso_db_conn\u003C/span\u003E\n\u003Cspan class=\"sb\"\u003E```\u003C/span\u003E\n\n\u003Cspan class=\"gs\"\u003E**3. Entry point**\u003C/span\u003E (bottom of file):\n\u003Cspan class=\"sb\"\u003E```python\u003C/span\u003E\n\u003Cspan class=\"k\"\u003Eif\u003C/span\u003E \u003Cspan class=\"vm\"\u003E__name__\u003C/span\u003E \u003Cspan class=\"o\"\u003E==\u003C/span\u003E \u003Cspan class=\"s2\"\u003E\u0026quot;__main__\u0026quot;\u003C/span\u003E\u003Cspan class=\"p\"\u003E:\u003C/span\u003E\n    \u003Cspan class=\"n\"\u003Eapp\u003C/span\u003E\u003Cspan class=\"o\"\u003E.\u003C/span\u003E\u003Cspan class=\"n\"\u003Erun\u003C/span\u003E\u003Cspan class=\"p\"\u003E()\u003C/span\u003E\n\u003Cspan class=\"sb\"\u003E```\u003C/span\u003E\n\n\u003Cspan class=\"gu\"\u003E## Running \u0026amp; Validating\u003C/span\u003E\n\n\u003Cspan class=\"sb\"\u003E```bash\u003C/span\u003E\n\u003Cspan class=\"c1\"\u003E# Check structure (catches cycles, multiple definitions, import errors)\u003C/span\u003E\nuv\u003Cspan class=\"w\"\u003E \u003C/span\u003Erun\u003Cspan class=\"w\"\u003E \u003C/span\u003Emarimo\u003Cspan class=\"w\"\u003E \u003C/span\u003Echeck\u003Cspan class=\"w\"\u003E \u003C/span\u003Enotebooks/my-notebook.py\n\n\u003Cspan class=\"c1\"\u003E# Edit interactively in browser (cells don\u0026#39;t auto-execute on open)\u003C/span\u003E\nuv\u003Cspan class=\"w\"\u003E \u003C/span\u003Erun\u003Cspan class=\"w\"\u003E \u003C/span\u003Emarimo\u003Cspan class=\"w\"\u003E \u003C/span\u003Eedit\u003Cspan class=\"w\"\u003E \u003C/span\u003Enotebooks/my-notebook.py\n\n\u003Cspan class=\"c1\"\u003E# Run headless \u2014 executes all cells, useful for verifying end-to-end\u003C/span\u003E\nuv\u003Cspan class=\"w\"\u003E \u003C/span\u003Erun\u003Cspan class=\"w\"\u003E \u003C/span\u003Emarimo\u003Cspan class=\"w\"\u003E \u003C/span\u003Erun\u003Cspan class=\"w\"\u003E \u003C/span\u003Enotebooks/my-notebook.py\n\u003Cspan class=\"sb\"\u003E```\u003C/span\u003E\n\nAlways run \u003Cspan class=\"sb\"\u003E`marimo check`\u003C/span\u003E before committing. It catches problems that\nwon\u0026#39;t surface until runtime.\n\n\u003Cspan class=\"gu\"\u003E## Cell Conventions\u003C/span\u003E\n\n\u003Cspan class=\"k\"\u003E-\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"gs\"\u003E**All cells**\u003C/span\u003E use \u003Cspan class=\"sb\"\u003E`@app.cell(hide_code=True)`\u003C/span\u003E \u2014 no exceptions\n\n\u003Cspan class=\"k\"\u003E-\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003EUse \u003Cspan class=\"sb\"\u003E`mo.sql(query, engine=pyoso_db_conn)`\u003C/span\u003E for SQL queries\n\n\u003Cspan class=\"k\"\u003E-\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003EPrefix throwaway variables with \u003Cspan class=\"sb\"\u003E`_`\u003C/span\u003E to avoid \u0026quot;multiple definitions\u0026quot; errors\n\n\u003Cspan class=\"k\"\u003E-\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003EUse \u003Cspan class=\"sb\"\u003E`\u0026quot;\u0026quot;\u0026quot;`\u003C/span\u003E for markdown strings, not \u003Cspan class=\"sb\"\u003E`r\u0026quot;\u0026quot;\u0026quot;`\u003C/span\u003E\n\n\u003Cspan class=\"k\"\u003E-\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003ENamed data for downstream cells should be descriptive: \u003Cspan class=\"sb\"\u003E`df_top_ecosystems`\u003C/span\u003E\n\n\u003Cspan class=\"k\"\u003E-\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003EEach cell must explicitly \u003Cspan class=\"sb\"\u003E`return`\u003C/span\u003E all variables other cells need\n\n\u003Cspan class=\"k\"\u003E-\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003EDeclare dependencies via function args: \u003Cspan class=\"sb\"\u003E`def _(mo, px, df_data):`\u003C/span\u003E\n\n\u003Cspan class=\"gu\"\u003E## Common Anti-Patterns\u003C/span\u003E\n\n| Don\u0026#39;t | Do Instead |\n|-------|------------|\n| \u003Cspan class=\"sb\"\u003E`conn = pyoso.Client()`\u003C/span\u003E in random cells | Use \u003Cspan class=\"sb\"\u003E`pyoso_db_conn`\u003C/span\u003E from \u003Cspan class=\"sb\"\u003E`setup_pyoso`\u003C/span\u003E |\n| \u003Cspan class=\"sb\"\u003E`conn.to_pandas(sql)`\u003C/span\u003E | \u003Cspan class=\"sb\"\u003E`mo.sql(sql, engine=pyoso_db_conn)`\u003C/span\u003E |\n| Import \u003Cspan class=\"sb\"\u003E`mo`\u003C/span\u003E in multiple cells | Get \u003Cspan class=\"sb\"\u003E`mo`\u003C/span\u003E from \u003Cspan class=\"sb\"\u003E`setup_pyoso`\u003C/span\u003E via function args |\n| \u003Cspan class=\"sb\"\u003E`from dotenv import load_dotenv`\u003C/span\u003E | Rely on \u003Cspan class=\"sb\"\u003E`direnv`\u003C/span\u003E \u2014 keys load automatically |\n| Reuse a variable name across cells | Prefix with \u003Cspan class=\"sb\"\u003E`_`\u003C/span\u003E or give a unique name |\n| \u003Cspan class=\"sb\"\u003E`@app.cell`\u003C/span\u003E without \u003Cspan class=\"sb\"\u003E`hide_code=True`\u003C/span\u003E | Always include \u003Cspan class=\"sb\"\u003E`hide_code=True`\u003C/span\u003E |\n| \u003Cspan class=\"sb\"\u003E`r\u0026quot;\u0026quot;\u0026quot;`\u003C/span\u003E raw strings for markdown | Use plain \u003Cspan class=\"sb\"\u003E`\u0026quot;\u0026quot;\u0026quot;`\u003C/span\u003E triple-quote strings |\n| Circular references between cells | Restructure so data flows one direction |\n| \u003Cspan class=\"sb\"\u003E`SELECT *`\u003C/span\u003E in queries | List columns explicitly for clarity |\n| Wide date ranges in live queries | Use \u003Cspan class=\"sb\"\u003E`CURRENT_DATE - INTERVAL \u0026#39;30\u0026#39; DAY`\u003C/span\u003E or narrower |\n\n\u003Cspan class=\"gu\"\u003E## Notebook Structure (recommended order)\u003C/span\u003E\n\n\u003Cspan class=\"k\"\u003E1.\u003C/span\u003E Title + intro\n\n\u003Cspan class=\"k\"\u003E2.\u003C/span\u003E Overview section\n\n\u003Cspan class=\"k\"\u003E3.\u003C/span\u003E Data lineage (\u003Cspan class=\"sb\"\u003E`mo.mermaid()`\u003C/span\u003E)\n\n\u003Cspan class=\"k\"\u003E4.\u003C/span\u003E Model previews (accordion with SQL snippets)\n\n\u003Cspan class=\"k\"\u003E5.\u003C/span\u003E Live data exploration (stats + charts)\n\n\u003Cspan class=\"k\"\u003E6.\u003C/span\u003E Sample queries (markdown + executed pairs)\n\n\u003Cspan class=\"k\"\u003E7.\u003C/span\u003E Related models\n\n\u003Cspan class=\"k\"\u003E8.\u003C/span\u003E Helper utilities cell\n\n\u003Cspan class=\"k\"\u003E9.\u003C/span\u003E Imports cell (\u003Cspan class=\"sb\"\u003E`plotly.express`\u003C/span\u003E, \u003Cspan class=\"sb\"\u003E`pandas`\u003C/span\u003E)\n\n\u003Cspan class=\"k\"\u003E10.\u003C/span\u003E Setup cell (\u003Cspan class=\"sb\"\u003E`setup_pyoso`\u003C/span\u003E)\n\u003C/code\u003E\u003C/pre\u003E\u003C/div\u003E\u003C/span\u003E\u003C/div\u003E\u003Cdiv\u003E\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Cdiv class=\"language-markdown codehilite\"\u003E\u003Cpre\u003E\u003Cspan\u003E\u003C/span\u003E\u003Ccode\u003E\u003Cspan class=\"gh\"\u003E# Advanced Notebook Patterns\u003C/span\u003E\n\nDeeper patterns for polished DDP notebooks. Assumes familiarity with the basics above.\n\n\u003Cspan class=\"gu\"\u003E## Caching Expensive Queries\u003C/span\u003E\n\nUse \u003Cspan class=\"sb\"\u003E`mo.persistent_cache`\u003C/span\u003E to avoid re-running slow queries during development.\nThe cache persists across sessions and is keyed by cell content \u2014 if the SQL changes,\nthe cache invalidates automatically.\n\n\u003Cspan class=\"sb\"\u003E```python\u003C/span\u003E\n\u003Cspan class=\"nd\"\u003E@app\u003C/span\u003E\u003Cspan class=\"o\"\u003E.\u003C/span\u003E\u003Cspan class=\"n\"\u003Ecell\u003C/span\u003E\u003Cspan class=\"p\"\u003E(\u003C/span\u003E\u003Cspan class=\"n\"\u003Ehide_code\u003C/span\u003E\u003Cspan class=\"o\"\u003E=\u003C/span\u003E\u003Cspan class=\"kc\"\u003ETrue\u003C/span\u003E\u003Cspan class=\"p\"\u003E)\u003C/span\u003E\n\u003Cspan class=\"k\"\u003Edef\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"nf\"\u003E_\u003C/span\u003E\u003Cspan class=\"p\"\u003E(\u003C/span\u003E\u003Cspan class=\"n\"\u003Emo\u003C/span\u003E\u003Cspan class=\"p\"\u003E,\u003C/span\u003E \u003Cspan class=\"n\"\u003Epyoso_db_conn\u003C/span\u003E\u003Cspan class=\"p\"\u003E):\u003C/span\u003E\n    \u003Cspan class=\"k\"\u003Ewith\u003C/span\u003E \u003Cspan class=\"n\"\u003Emo\u003C/span\u003E\u003Cspan class=\"o\"\u003E.\u003C/span\u003E\u003Cspan class=\"n\"\u003Epersistent_cache\u003C/span\u003E\u003Cspan class=\"p\"\u003E(\u003C/span\u003E\u003Cspan class=\"s2\"\u003E\u0026quot;my_query_data\u0026quot;\u003C/span\u003E\u003Cspan class=\"p\"\u003E):\u003C/span\u003E\n        \u003Cspan class=\"n\"\u003Edf_results\u003C/span\u003E \u003Cspan class=\"o\"\u003E=\u003C/span\u003E \u003Cspan class=\"n\"\u003Emo\u003C/span\u003E\u003Cspan class=\"o\"\u003E.\u003C/span\u003E\u003Cspan class=\"n\"\u003Esql\u003C/span\u003E\u003Cspan class=\"p\"\u003E(\u003C/span\u003E\n\u003Cspan class=\"w\"\u003E            \u003C/span\u003E\u003Cspan class=\"sd\"\u003E\u0026quot;\u0026quot;\u0026quot;\u003C/span\u003E\n\u003Cspan class=\"sd\"\u003E            SELECT ecosystem_name, day, total_devs\u003C/span\u003E\n\u003Cspan class=\"sd\"\u003E            FROM oso.stg_opendevdata__eco_mads\u003C/span\u003E\n\u003Cspan class=\"sd\"\u003E            WHERE day \u0026gt;= CURRENT_DATE - INTERVAL \u0026#39;365\u0026#39; DAY\u003C/span\u003E\n\u003Cspan class=\"sd\"\u003E            \u0026quot;\u0026quot;\u0026quot;\u003C/span\u003E\u003Cspan class=\"p\"\u003E,\u003C/span\u003E\n            \u003Cspan class=\"n\"\u003Eengine\u003C/span\u003E\u003Cspan class=\"o\"\u003E=\u003C/span\u003E\u003Cspan class=\"n\"\u003Epyoso_db_conn\u003C/span\u003E\u003Cspan class=\"p\"\u003E,\u003C/span\u003E\n            \u003Cspan class=\"n\"\u003Eoutput\u003C/span\u003E\u003Cspan class=\"o\"\u003E=\u003C/span\u003E\u003Cspan class=\"kc\"\u003EFalse\u003C/span\u003E\n        \u003Cspan class=\"p\"\u003E)\u003C/span\u003E\n    \u003Cspan class=\"k\"\u003Ereturn\u003C/span\u003E \u003Cspan class=\"p\"\u003E(\u003C/span\u003E\u003Cspan class=\"n\"\u003Edf_results\u003C/span\u003E\u003Cspan class=\"p\"\u003E,)\u003C/span\u003E\n\u003Cspan class=\"sb\"\u003E```\u003C/span\u003E\n\n\u003Cspan class=\"gs\"\u003E**Tips:**\u003C/span\u003E\n\n\u003Cspan class=\"k\"\u003E-\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003EGive each cache a unique, descriptive name\n\n\u003Cspan class=\"k\"\u003E-\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003EUse \u003Cspan class=\"sb\"\u003E`output=False`\u003C/span\u003E when you need the DataFrame for downstream processing rather than inline display\n\n\u003Cspan class=\"k\"\u003E-\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003EWrap the entire query block \u2014 the \u003Cspan class=\"sb\"\u003E`with`\u003C/span\u003E block defines what gets cached\n\n\u003Cspan class=\"k\"\u003E-\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003EEspecially useful for queries that scan large date ranges or join multiple tables\n\n\u003Cspan class=\"gu\"\u003E## Plotly Chart Templates\u003C/span\u003E\n\nAll charts use \u003Cspan class=\"sb\"\u003E`plotly_white`\u003C/span\u003E template with consistent axis styling.\n\n\u003Cspan class=\"gu\"\u003E### Bar Chart (horizontal)\u003C/span\u003E\n\u003Cspan class=\"sb\"\u003E```python\u003C/span\u003E\n\u003Cspan class=\"n\"\u003E_fig\u003C/span\u003E \u003Cspan class=\"o\"\u003E=\u003C/span\u003E \u003Cspan class=\"n\"\u003Epx\u003C/span\u003E\u003Cspan class=\"o\"\u003E.\u003C/span\u003E\u003Cspan class=\"n\"\u003Ebar\u003C/span\u003E\u003Cspan class=\"p\"\u003E(\u003C/span\u003E\n    \u003Cspan class=\"n\"\u003Edf_data\u003C/span\u003E\u003Cspan class=\"p\"\u003E,\u003C/span\u003E\n    \u003Cspan class=\"n\"\u003Ex\u003C/span\u003E\u003Cspan class=\"o\"\u003E=\u003C/span\u003E\u003Cspan class=\"s1\"\u003E\u0026#39;value_column\u0026#39;\u003C/span\u003E\u003Cspan class=\"p\"\u003E,\u003C/span\u003E\n    \u003Cspan class=\"n\"\u003Ey\u003C/span\u003E\u003Cspan class=\"o\"\u003E=\u003C/span\u003E\u003Cspan class=\"s1\"\u003E\u0026#39;label_column\u0026#39;\u003C/span\u003E\u003Cspan class=\"p\"\u003E,\u003C/span\u003E\n    \u003Cspan class=\"n\"\u003Eorientation\u003C/span\u003E\u003Cspan class=\"o\"\u003E=\u003C/span\u003E\u003Cspan class=\"s1\"\u003E\u0026#39;h\u0026#39;\u003C/span\u003E\u003Cspan class=\"p\"\u003E,\u003C/span\u003E\n    \u003Cspan class=\"n\"\u003Etext\u003C/span\u003E\u003Cspan class=\"o\"\u003E=\u003C/span\u003E\u003Cspan class=\"s1\"\u003E\u0026#39;value_column\u0026#39;\u003C/span\u003E\u003Cspan class=\"p\"\u003E,\u003C/span\u003E\n    \u003Cspan class=\"n\"\u003Ecolor_discrete_sequence\u003C/span\u003E\u003Cspan class=\"o\"\u003E=\u003C/span\u003E\u003Cspan class=\"p\"\u003E[\u003C/span\u003E\u003Cspan class=\"s1\"\u003E\u0026#39;#4C78A8\u0026#39;\u003C/span\u003E\u003Cspan class=\"p\"\u003E]\u003C/span\u003E\n\u003Cspan class=\"p\"\u003E)\u003C/span\u003E\n\u003Cspan class=\"n\"\u003E_fig\u003C/span\u003E\u003Cspan class=\"o\"\u003E.\u003C/span\u003E\u003Cspan class=\"n\"\u003Eupdate_traces\u003C/span\u003E\u003Cspan class=\"p\"\u003E(\u003C/span\u003E\n    \u003Cspan class=\"n\"\u003Etexttemplate\u003C/span\u003E\u003Cspan class=\"o\"\u003E=\u003C/span\u003E\u003Cspan class=\"s1\"\u003E\u0026#39;%\u003C/span\u003E\u003Cspan class=\"si\"\u003E{text:,.0f}\u003C/span\u003E\u003Cspan class=\"s1\"\u003E\u0026#39;\u003C/span\u003E\u003Cspan class=\"p\"\u003E,\u003C/span\u003E\n    \u003Cspan class=\"n\"\u003Etextposition\u003C/span\u003E\u003Cspan class=\"o\"\u003E=\u003C/span\u003E\u003Cspan class=\"s1\"\u003E\u0026#39;outside\u0026#39;\u003C/span\u003E\n\u003Cspan class=\"p\"\u003E)\u003C/span\u003E\n\u003Cspan class=\"n\"\u003E_fig\u003C/span\u003E\u003Cspan class=\"o\"\u003E.\u003C/span\u003E\u003Cspan class=\"n\"\u003Eupdate_layout\u003C/span\u003E\u003Cspan class=\"p\"\u003E(\u003C/span\u003E\n    \u003Cspan class=\"n\"\u003Etemplate\u003C/span\u003E\u003Cspan class=\"o\"\u003E=\u003C/span\u003E\u003Cspan class=\"s1\"\u003E\u0026#39;plotly_white\u0026#39;\u003C/span\u003E\u003Cspan class=\"p\"\u003E,\u003C/span\u003E\n    \u003Cspan class=\"n\"\u003Emargin\u003C/span\u003E\u003Cspan class=\"o\"\u003E=\u003C/span\u003E\u003Cspan class=\"nb\"\u003Edict\u003C/span\u003E\u003Cspan class=\"p\"\u003E(\u003C/span\u003E\u003Cspan class=\"n\"\u003Et\u003C/span\u003E\u003Cspan class=\"o\"\u003E=\u003C/span\u003E\u003Cspan class=\"mi\"\u003E20\u003C/span\u003E\u003Cspan class=\"p\"\u003E,\u003C/span\u003E \u003Cspan class=\"n\"\u003El\u003C/span\u003E\u003Cspan class=\"o\"\u003E=\u003C/span\u003E\u003Cspan class=\"mi\"\u003E0\u003C/span\u003E\u003Cspan class=\"p\"\u003E,\u003C/span\u003E \u003Cspan class=\"n\"\u003Er\u003C/span\u003E\u003Cspan class=\"o\"\u003E=\u003C/span\u003E\u003Cspan class=\"mi\"\u003E0\u003C/span\u003E\u003Cspan class=\"p\"\u003E,\u003C/span\u003E \u003Cspan class=\"n\"\u003Eb\u003C/span\u003 an class=\"p\"\u003E,\u003C/span\u003E\n    \u003Cspan class=\"n\"\u003Ecolor\u003C/span\u003E\u003Cspan class=\"o\"\u003E=\u003C/span\u003E\u003Cspan class=\"s1\"\u003E\u0026#39;series_name\u0026#39;\u003C/span\u003E\u003Cspan class=\"p\"\u003E,\u003C/span\u003E\n    \u003Cspan class=\"n\"\u003Ecolor_discrete_sequence\u003C/span\u003E\u003Cspan class=\"o\"\u003E=\u003C/span\u003E\u003Cspan class=\"p\"\u003E[\u003C/span\u003E\u003Cspan class=\"s1\"\u003E\u0026#39;#4C78A8\u0026#39;\u003C/span\u003E\u003Cspan class=\"p\"\u003E,\u003C/span\u003E \u003Cspan class=\"s1\"\u003E\u0026#39;#F58518\u0026#39;\u003C/span\u003E\u003Cspan class=\"p\"\u003E,\u003C/span\u003E \u003Cspan class=\"s1\"\u003E\u0026#39;#72B7B2\u0026#39;\u003C/span\u003E\u003Cspan class=\"p\"\u003E]\u003C/span\u003E\n\u003Cspan class=\"p\"\u003E)\u003C/span\u003E\n\u003Cspan class=\"n\"\u003E_fig\u003C/span\u003E\u003Cspan class=\"o\"\u003E.\u003C/span\u003E\u003Cspan class=\"n\"\u003Eupdate_layout\u003C/span\u003E\u003Cspan class=\"p\"\u003E(\u003C/span\u003E\n    \u003Cspan class=\"n\"\u003Etemplate\u003C/span\u003E\u003Cspan class=\"o\"\u003E=\u003C/span\u003E\u003Cspan class=\"s1\"\u003E\u0026#39;plotly_white\u0026#39;\u003C/span\u003E\u003Cspan class=\"p\"\u003E,\u003C/span\u003E\n    \u003Cspan class=\"n\"\u003Emargin\u003C/span\u003E\u003Cspan class=\"o\"\u003E=\u003C/span\u003E\u003Cspan class=\"nb\"\u003Edict\u003C/span\u003E\u003Cspan class=\"p\"\u003E(\u003C/span\u003E\u003Cspan class=\"n\"\u003Et\u003C/span\u003E\u003Cspan class=\"o\"\u003E=\u003C/span\u003E\u003Cspan class=\"mi\"\u003E20\u003C/span\u003E\u003Cspan class=\"p\"\u003E,\u003C/span\u003E \u003Cspan class=\"n\"\u003El\u003C/span\u003E\u003Cspan class=\"o\"\u003E=\u003C/span\u003E\u003Cspan class=\"mi\"\u003E0\u003C/span\u003E\u003Cspan class=\"p\"\u003E,\u003C/span\u003E \u003Cspan class=\"n\"\u003Er\u003C/span\u003E\u003Cspan class=\"o\"\u003E=\u003C/span\u003E\u003Cspan class=\"mi\"\u003E0\u003C/span\u003E\u003Cspan class=\"p\"\u003E,\u003C/span\u003E \u003Cspan class=\"n\"\u003Eb\u003C/span\u003E\u003Cspan class=\"o\"\u003E=\u003C/span\u003E\u003Cspan class=\"mi\"\u003E0\u003C/span\u003E\u003Cspan class=\"p\"\u003E),\u003C/span\u003E\n    \u003Cspan class=\"n\"\u003Eheight\u003C/span\u003E\u003Cspan class=\"o\"\u003E=\u003C/span\u003E\u003Cspan class=\"mi\"\u003E400\u003C/span\u003E\u003Cspan class=\"p\"\u003E,\u003C/span\u003E\n    \u003Cspan class=\"n\"\u003Ehovermode\u003C/span\u003E\u003Cspan class=\"o\"\u003E=\u003C/span\u003E\u003Cspan class=\"s1\"\u003E\u0026#39;x unified\u0026#39;\u003C/span\u003E\u003Cspan class=\"p\"\u003E,\u003C/span\u003E\n    \u003Cspan class=\"n\"\u003Exaxis\u003C/span\u003E\u003Cspan class=\"o\"\u003E=\u003C/span\u003E\u003Cspan class=\"nb\"\u003Edict\u003C/span\u003E\u003Cspan class=\"p\"\u003E(\u003C/span\u003E\u003Cspan class=\"n\"\u003Etickformat\u003C/span\u003E\u003Cspan class=\"o\"\u003E=\u003C/span\u003E\u003Cspan class=\"s1\"\u003E\u0026#39;%b %Y\u0026#39;\u003C/span\u003E\u003Cspan class=\"p\"\u003E),\u003C/span\u003E\n    \u003Cspan class=\"n\"\u003Elegend\u003C/span\u003E\u003Cspan class=\"o\"\u003E=\u003C/span\u003E\u003Cspan class=\"nb\"\u003Edict\u003C/span\u003E\u003Cspan class=\"p\"\u003E(\u003C/span\u003E\n        \u003Cspan class=\"n\"\u003Eorientation\u003C/span\u003E\u003Cspan class=\"o\"\u003E=\u003C/span\u003E\u003Cspan class=\"s1\"\u003E\u0026#39;h\u0026#39;\u003C/span\u003E\u003Cspan class=\"p\"\u003E,\u003C/span\u003E \u003Cspan class=\"n\"\u003Eyanchor\u003C/span\u003E\u003Cspan class=\"o\"\u003E=\u003C/span\u003E\u003Cspan class=\"s1\"\u003E\u0026#39;bottom\u0026#39;\u003C/span\u003E\u003Cspan class=\"p\"\u003E,\u003C/span\u003E \u003Cspan class=\"n\"\u003Ey\u003C/span\u003E\u003Cspan class=\"o\"\u003E=\u003C/span\u003E\u003Cspan class=\"mf\"\u003E1.02\u003C/span\u003E\u003Cspan class=\"p\"\u003E,\u003C/span\u003E\n        \u003Cspan class=\"n\"\u003Exanchor\u003C/span\u003E\u003Cspan class=\"o\"\u003E=\u003C/span\u003E\u003Cspan class=\"s1\"\u003E\u0026#39;right\u0026#39;\u003C/span\u003E\u003Cspan class=\"p\"\u003E,\u003C/span\u003E \u003Cspan class=\"n\"\u003Ex\u003C/span\u003E\u003Cspan class=\"o\"\u003E=\u003C/span\u003E\u003Cspan class=\"mi\"\u003E1\u003C/span\u003E\u003Cspan class=\"p\"\u003E,\u003C/span\u003E \u003Cspan class=\"n\"\u003Etitle_text\u003C/span\u003E\u003Cspan class=\"o\"\u003E=\u003C/span\u003E\u003Cspan class=\"s1\"\u003E\u0026#39;\u0026#39;\u003C/span\u003E\n    \u003Cspan class=\"p\"\u003E)\u003C/span\u003E\n\u003Cspan class=\"p\"\u003E)\u003C/span\u003E\n\u003Cspan class=\"sb\"\u003E```\u003C/span\u003E\n\n\u003Cspan class=\"gu\"\u003E### Shared Axis Styling\u003C/span\u003E\nApply to all charts:\n\u003Cspan class=\"sb\"\u003E```python\u003C/span\u003E\n\u003Cspan class=\"n\"\u003E_fig\u003C/span\u003E\u003Cspan class=\"o\"\u003E.\u003C/span\u003E\u003Cspan class=\"n\"\u003Eupdate_xaxes\u003C/span\u003E\u003Cspan class=\"p\"\u003E(\u003C/span\u003E\u003Cspan class=\"n\"\u003Etitle\u003C/span\u003E\u003Cspan class=\"o\"\u003E=\u003C/span\u003E\u003Cspan class=\"s1\"\u003E\u0026#39;\u0026#39;\u003C/span\u003E\u003Cspan class=\"p\"\u003E,\u003C/span\u003E \u003Cspan class=\"n\"\u003Eshowgrid\u003C/span\u003E\u003Cspan class=\"o\"\u003E=\u003C/span\u003E\u003Cspan class=\"kc\"\u003EFalse\u003C/span\u003E\u003Cspan class=\"p\"\u003E,\u003C/span\u003E \u003Cspan class=\"n\"\u003Elinecolor\u003C/span\u003E\u003Cspan class=\"o\"\u003E=\u003C/span\u003E\u003Cspan class=\"s1\"\u003E\u0026#39;#000\u0026#39;\u003C/span\u003E\u003Cspan class=\"p\"\u003E,\u003C/span\u003E \u003Cspan class=\"n\"\u003Elinewidth\u003C/span\u003E\u003Cspan class=\"o\"\u003E=\u003C/span\u003E\u003Cspan class=\"mi\"\u003E1\u003C/span\u003E\u003Cspan class=\"p\"\u003E)\u003C/span\u003E\n\u003Cspan class=\"n\"\u003E_fig\u003C/span\u003E\u003Cspan class=\"o\"\u003E.\u003C/span\u003E\u003Cspan class=\"n\"\u003Eupdate_yaxes\u003C/span\u003E\u003Cspan class=\"p\"\u003E(\u003C/span\u003E\u003Cspan class=\"n\"\u003Etitle\u003C/span\u003E\u003Cspan class=\"o\"\u003E=\u003C/span\u003E\u003Cspan class=\"s1\"\u003E\u0026#39;Y Label\u0026#39;\u003C/span\u003E\u003Cspan class=\"p\"\u003E,\u003C/span\u003E \u003Cspan class=\"n\"\u003Eshowgrid\u003C/span\u003E\u003Cspan class=\"o\"\u003E=\u003C/span\u003E\u003Cspan class=\"kc\"\u003ETrue\u003C/span\u003E\u003Cspan class=\"p\"\u003E,\u003C/span\u003E \u003Cspan class=\"n\"\u003Egridcolor\u003C/span\u003E\u003Cspan class=\"o\"\u003E=\u003C/span\u003E\u003Cspan class=\"s1\"\u003E\u0026#39;#E5E5E5\u0026#39;\u003C/span\u003E\u003Cspan class=\"p\"\u003E,\u003C/span\u003E\n                  \u003Cspan class=\"n\"\u003Elinecolor\u003C/span\u003E\u003Cspan class=\"o\"\u003E=\u003C/span\u003E\u003Cspan class=\"s1\"\u003E\u0026#39;#000\u0026#39;\u003C/span\u003E\u003Cspan class=\"p\"\u003E,\u003C/span\u003E \u003Cspan class=\"n\"\u003Elinewidth\u003C/span\u003E\u003Cspan class=\"o\"\u003E=\u003C/span\u003E\u003Cspan class=\"mi\"\u003E1\u003C/span\u003E\u003Cspan class=\"p\"\u003E)\u003C/span\u003E\n\u003Cspan class=\"sb\"\u003E```\u003C/span\u003E\n\n\u003Cspan class=\"gu\"\u003E### Rendering\u003C/span\u003E\nAlways render with the mode bar hidden:\n\u003Cspan class=\"sb\"\u003E```python\u003C/span\u003E\n\u003Cspan class=\"n\"\u003Emo\u003C/span\u003E\u003Cspan class=\"o\"\u003E.\u003C/span\u003E\u003Cspan class=\"n\"\u003Eui\u003C/span\u003E\u003Cspan class=\"o\"\u003E.\u003C/span\u003E\u003Cspan class=\"n\"\u003Eplotly\u003C/span\u003E\u003Cspan class=\"p\"\u003E(\u003C/span\u003E\u003Cspan class=\"n\"\u003E_fig\u003C/span\u003E\u003Cspan class=\"p\"\u003E,\u003C/span\u003E \u003Cspan class=\"n\"\u003Econfig\u003C/span\u003E\u003Cspan class=\"o\"\u003E=\u003C/span\u003E\u003Cspan class=\"p\"\u003E{\u003C/span\u003E\u003Cspan class=\"s1\"\u003E\u0026#39;displayModeBar\u0026#39;\u003C/span\u003E\u003Cspan class=\"p\"\u003E:\u003C/span\u003E \u003Cspan class=\"kc\"\u003EFalse\u003C/span\u003E\u003Cspan class=\"p\"\u003E})\u003C/span\u003E\n\u003Cspan class=\"sb\"\u003E```\u003C/span\u003E\n\n\u003Cspan class=\"gu\"\u003E### Color Palette\u003C/span\u003E\n\n\u003Cspan class=\"k\"\u003E-\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003EPrimary: \u003Cspan class=\"sb\"\u003E`#4C78A8`\u003C/span\u003E (blue) \u2014 default for single-series\n\n\u003Cspan class=\"k\"\u003E-\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003ESecondary: \u003Cspan class=\"sb\"\u003E`#F58518`\u003C/span\u003E (orange) \u2014 second series\n\n\u003Cspan class=\"k\"\u003E-\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003ETertiary: \u003Cspan class=\"sb\"\u003E`#72B7B2`\u003C/span\u003E (teal) \u2014 third series\n\n\u003Cspan class=\"k\"\u003E-\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003EArea fill: 0.2 opacity (e.g., \u003Cspan class=\"sb\"\u003E`rgba(76, 120, 168, 0.2)`\u003C/span\u003E)\n\n\u003Cspan class=\"gu\"\u003E## Stats Widgets\u003C/span\u003E\n\nPlace summary stats above charts using \u003Cspan class=\"sb\"\u003E`mo.stat`\u003C/span\u003E:\n\u003Cspan class=\"sb\"\u003E```python\u003C/span\u003E\n\u003Cspan class=\"n\"\u003Emo\u003C/span\u003E\u003Cspan class=\"o\"\u003E.\u003C/span\u003E\u003Cspan class=\"n\"\u003Evstack\u003C/span\u003E\u003Cspan class=\"p\"\u003E([\u003C/span\u003E\n    \u003Cspan class=\"n\"\u003Emo\u003C/span\u003E\u003Cspan class=\"o\"\u003E.\u003C/span\u003E\u003Cspan class=\"n\"\u003Ehstack\u003C/span\u003E\u003Cspan class=\"p\"\u003E([\u003C/span\u003E\n        \u003Cspan class=\"n\"\u003Emo\u003C/span\u003E\u003Cspan class=\"o\"\u003E.\u003C/span\u003E\u003Cspan class=\"n\"\u003Estat\u003C/span\u003E\u003Cspan class=\"p\"\u003E(\u003C/span\u003E\u003Cspan class=\"n\"\u003Elabel\u003C/span\u003E\u003Cspan class=\"o\"\u003E=\u003C/span\u003E\u003Cspan class=\"s2\"\u003E\u0026quot;Active Devs\u0026quot;\u003C/span\u003E\u003Cspan class=\"p\"\u003E,\u003C/span\u003E \u003Cspan class=\"n\"\u003Evalue\u003C/span\u003E\u003Cspan class=\"o\"\u003E=\u003C/span\u003E\u003Cspan class=\"sa\"\u003Ef\u003C/span\u003E\u003Cspan class=\"s2\"\u003E\u0026quot;\u003C/span\u003E\u003Cspan class=\"si\"\u003E{\u003C/span\u003E\u003Cspan class=\"n\"\u003Edev_count\u003C/span\u003E\u003Cspan class=\"si\"\u003E:\u003C/span\u003E\u003Cspan class=\"s2\"\u003E,\u003C/span\u003E\u003Cspan class=\"si\"\u003E}\u003C/span\u003E\u003Cspan class=\"s2\"\u003E\u0026quot;\u003C/span\u003E\u003Cspan class=\"p\"\u003E,\u003C/span\u003E\n                \u003Cspan class=\"n\"\u003Ebordered\u003C/span\u003E\u003Cspan class=\"o\"\u003E=\u003C/span\u003E\u003Cspan class=\"kc\"\u003ETrue\u003C/span\u003E\u003Cspan class=\"p\"\u003E,\u003C/span\u003E \u003Cspan class=\"n\"\u003Ecaption\u003C/span\u003E\u003Cspan class=\"o\"\u003E=\u003C/span\u003E\u003Cspan class=\"s2\"\u003E\u0026quot;Last 30 days\u0026quot;\u003C/span\u003E\u003Cspan class=\"p\"\u003E),\u003C/span\u003E\n        \u003Cspan class=\"n\"\u003Emo\u003C/span\u003E\u003Cspan class=\"o\"\u003E.\u003C/span\u003E\u003Cspan class=\"n\"\u003Estat\u003C/span\u003E\u003Cspan class=\"p\"\u003E(\u003C/span\u003E\u003Cspan class=\"n\"\u003Elabel\u003C/span\u003E\u003Cspan class=\"o\"\u003E=\u003C/span\u003E\u003Cspan class=\"s2\"\u003E\u0026quot;Total Repos\u0026quot;\u003C/span\u003E\u003Cspan class=\"p\"\u003E,\u003C/span\u003E \u003Cspan class=\"n\"\u003Evalue\u003C/span\u003E\u003Cspan class=\"o\"\u003E=\u003C/span\u003E\u003Cspan class=\"sa\"\u003Ef\u003C/span\u003E\u003Cspan class=\"s2\"\u003E\u0026quot;\u003C/span\u003E\u003Cspan class=\"si\"\u003E{\u003C/span\u003E\u003Cspan class=\"n\"\u003Erepo_count\u003C/span\u003E\u003Cspan class=\"si\"\u003E:\u003C/span\u003E\u003Cspan class=\"s2\"\u003E,\u003C/span\u003E\u003Cspan class=\"si\"\u003E}\u003C/span\u003E\u003Cspan class=\"s2\"\u003E\u0026quot;\u003C/span\u003E\u003Cspan class=\"p\"\u003E,\u003C/span\u003E\n                \u003Cspan class=\"n\"\u003Ebordered\u003C/span\u003E\u003Cspan class=\"o\"\u003E=\u003C/span\u003E\u003Cspan class=\"kc\"\u003ETrue\u003C/span\u003E\u003Cspan class=\"p\"\u003E,\u003C/span\u003E \u003Cspan class=\"n\"\u003Ecaption\u003C/span\u003E\u003Cspan class=\"o\"\u003E=\u003C/span\u003E\u003Cspan class=\"s2\"\u003E\u0026quot;Recursive mapping\u0026quot;\u003C/span\u003E\u003Cspan class=\"p\"\u003E),\u003C/span\u003E\n        \u003Cspan class=\"n\"\u003Emo\u003C/span\u003E\u003Cspan class=\"o\"\u003E.\u003C/span\u003E\u003Cspan class=\"n\"\u003Estat\u003C/span\u003E\u003Cspan class=\"p\"\u003E(\u003C/span\u003E\u003Cspan class=\"n\"\u003Elabel\u003C/span\u003E\u003Cspan class=\"o\"\u003E=\u003C/span\u003E\u003Cspan class=\"s2\"\u003E\u0026quot;Peak MAD\u0026quot;\u003C/span\u003E\u003Cspan class=\"p\"\u003E,\u003C/span\u003E \u003Cspan class=\"n\"\u003Evalue\u003C/span\u003E\u003Cspan class=\"o\"\u003E=\u003C/span\u003E\u003Cspan class=\"sa\"\u003Ef\u003C/span\u003E\u003Cspan class=\"s2\"\u003E\u0026quot;\u003C/span\u003E\u003Cspan class=\"si\"\u003E{\u003C/span\u003E\u003Cspan class=\"n\"\u003Epeak\u003C/span\u003E\u003Cspan class=\"si\"\u003E:\u003C/span\u003E\u003Cspan class=\"s2\"\u003E,\u003C/span\u003E\u003Cspan class=\"si\"\u003E}\u003C/span\u003E\u003Cspan class=\"s2\"\u003E\u0026quot;\u003C/span\u003E\u003Cspan class=\"p\"\u003E,\u003C/span\u003E\n                \u003Cspan class=\"n\"\u003Ebordered\u003C/span\u003E\u003Cspan class=\"o\"\u003E=\u003C/span\u003E\u003Cspan class=\"kc\"\u003ETrue\u003C/span\u003E\u003Cspan class=\"p\"\u003E,\u003C/span\u003E \u003Cspan class=\"n\"\u003Ecaption\u003C/span\u003E\u003Cspan class=\"o\"\u003E=\u003C/span\u003E\u003Cspan class=\"sa\"\u003Ef\u003C/span\u003E\u003Cspan class=\"s2\"\u003E\u0026quot;\u003C/span\u003E\u003Cspan class=\"si\"\u003E{\u003C/span\u003E\u003Cspan class=\"n\"\u003Epeak_date\u003C/span\u003E\u003Cspan class=\"si\"\u003E:\u003C/span\u003E\u003Cspan class=\"s2\"\u003E%b %Y\u003C/span\u003E\u003Cspan class=\"si\"\u003E}\u003C/span\u003E\u003Cspan class=\"s2\"\u003E\u0026quot;\u003C/span\u003E\u003Cspan class=\"p\"\u003E),\u003C/span\u003E\n    \u003Cspan class=\"p\"\u003E],\u003C/span\u003E \u003Cspan class=\"n\"\u003Ewidths\u003C/span\u003E\u003Cspan class=\"o\"\u003E=\u003C/span\u003E\u003Cspan class=\"s1\"\u003E\u0026#39;equal\u0026#39;\u003C/span\u003E\u003Cspan class=\"p\"\u003E,\u003C/span\u003E \u003Cspan class=\"n\"\u003Egap\u003C/span\u003E\u003Cspan class=\"o\"\u003E=\u003C/span\u003E\u003Cspan class=\"mi\"\u003E1\u003C/span\u003E\u003Cspan class=\"p\"\u003E),\u003C/span\u003E\n    \u003Cspan class=\"n\"\u003Emo\u003C/span\u003E\u003Cspan class=\"o\"\u003E.\u003C/span\u003E\u003Cspan class=\"n\"\u003Eui\u003C/span\u003E\u003Cspan class=\"o\"\u003E.\u003C/span\u003E\u003Cspan class=\"n\"\u003Eplotly\u003C/span\u003E\u003Cspan class=\"p\"\u003E(\u003C/span\u003E\u003Cspan class=\"n\"\u003E_fig\u003C/span\u003E\u003Cspan class=\"p\"\u003E,\u003C/span\u003E \u003Cspan class=\"n\"\u003Econfig\u003C/span\u003E\u003Cspan class=\"o\"\u003E=\u003C/span\u003E\u003Cspan class=\"p\"\u003E{\u003C/span\u003E\u003Cspan class=\"s1\"\u003E\u0026#39;displayModeBar\u0026#39;\u003C/span\u003E\u003Cspan class=\"p\"\u003E:\u003C/span\u003E \u003Cspan class=\"kc\"\u003EFalse\u003C/span\u003E\u003Cspan class=\"p\"\u003E}),\u003C/span\u003E\n\u003Cspan class=\"p\"\u003E])\u003C/span\u003E\n\u003Cspan class=\"sb\"\u003E```\u003C/span\u003E\n\n\u003Cspan class=\"gs\"\u003E**Rules:**\u003C/span\u003E Always \u003Cspan class=\"sb\"\u003E`bordered=True`\u003C/span\u003E, always include \u003Cspan class=\"sb\"\u003E`caption`\u003C/span\u003E, 3-4 stats per row.\n\n\u003Cspan class=\"gu\"\u003E## Table Formatting\u003C/span\u003E\n\nUse \u003Cspan class=\"sb\"\u003E`mo.ui.table`\u003C/span\u003E with formatting for large numeric IDs:\n\u003Cspan class=\"sb\"\u003E```python\u003C/span\u003E\n\u003Cspan class=\"c1\"\u003E# Format integer ID columns to avoid scientific notation\u003C/span\u003E\n\u003Cspan class=\"n\"\u003Efmt\u003C/span\u003E \u003Cspan class=\"o\"\u003E=\u003C/span\u003E \u003Cspan class=\"p\"\u003E{\u003C/span\u003E\n    \u003Cspan class=\"n\"\u003Ec\u003C/span\u003E\u003Cspan class=\"p\"\u003E:\u003C/span\u003E \u003Cspan class=\"s1\"\u003E\u0026#39;\u003C/span\u003E\u003Cspan class=\"si\"\u003E{:.0f}\u003C/span\u003E\u003Cspan class=\"s1\"\u003E\u0026#39;\u003C/span\u003E\n    \u003Cspan class=\"k\"\u003Efor\u003C/span\u003E \u003Cspan class=\"n\"\u003Ec\u003C/span\u003E \u003Cspan class=\"ow\"\u003Ein\u003C/span\u003E \u003Cspan class=\"n\"\u003Edf\u003C/span\u003E\u003Cspan class=\"o\"\u003E.\u003C/span\u003E\u003Cspan class=\"n\"\u003Ecolumns\u003C/span\u003E\n    \u003Cspan class=\"k\"\u003Eif\u003C/span\u003E \u003Cspan class=\"n\"\u003Edf\u003C/span\u003E\u003Cspan class=\"p\"\u003E[\u003C/span\u003E\u003Cspan class=\"n\"\u003Ec\u003C/span\u003E\u003Cspan class=\"p\"\u003E]\u003C/span\u003E\u003Cspan class=\"o\"\u003E.\u003C/span\u003E\u003Cspan class=\"n\"\u003Edtype\u003C/span\u003E \u003Cspan class=\"o\"\u003E==\u003C/span\u003E \u003Cspan class=\"s1\"\u003E\u0026#39;int64\u0026#39;\u003C/span\u003E \u003Cspan class=\"ow\"\u003Eand\u003C/span\u003E \u003Cspan class=\"p\"\u003E(\u003C/span\u003E\u003Cspan class=\"s1\"\u003E\u0026#39;_id\u0026#39;\u003C/span\u003E \u003Cspan class=\"ow\"\u003Ein\u003C/span\u003E \u003Cspan class=\"n\"\u003Ec\u003C/span\u003E \u003Cspan class=\"ow\"\u003Eor\u003C/span\u003E \u003Cspan class=\"n\"\u003Ec\u003C/span\u003E \u003Cspan class=\"o\"\u003E==\u003C/span\u003E \u003Cspan class=\"s1\"\u003E\u0026#39;id\u0026#39;\u003C/span\u003E\u003Cspan class=\"p\"\u003E)\u003C/span\u003E\n\u003Cspan class=\"p\"\u003E}\u003C/span\u003E\n\u003Cspan class=\"n\"\u003Emo\u003C/span\u003E\u003Cspan class=\"o\"\u003E.\u003C/span\u003E\u003Cspan class=\"n\"\u003Eui\u003C/span\u003E\u003Cspan class=\"o\"\u003E.\u003C/span\u003E\u003Cspan class=\"n\"\u003Etable\u003C/span\u003E\u003Cspan class=\"p\"\u003E(\u003C/span\u003E\n    \u003Cspan class=\"n\"\u003Edf\u003C/span\u003E\u003Cspan class=\"p\"\u003E,\u003C/span\u003E\n    \u003Cspan class=\"n\"\u003Eformat_mapping\u003C/span\u003E\u003Cspan class=\"o\"\u003E=\u003C/span\u003E\u003Cspan class=\"n\"\u003Efmt\u003C/span\u003E\u003Cspan class=\"p\"\u003E,\u003C/span\u003E\n    \u003Cspan class=\"n\"\u003Eshow_column_summaries\u003C/span\u003E\u003Cspan class=\"o\"\u003E=\u003C/span\u003E\u003Cspan class=\"kc\"\u003EFalse\u003C/span\u003E\u003Cspan class=\"p\"\u003E,\u003C/span\u003E\n    \u003Cspan class=\"n\"\u003Eshow_data_types\u003C/span\u003E\u003Cspan class=\"o\"\u003E=\u003C/span\u003E\u003Cspan class=\"kc\"\u003EFalse\u003C/span\u003E\n\u003Cspan class=\"p\"\u003E)\u003C/span\u003E\n\u003Cspan class=\"sb\"\u003E```\u003C/span\u003E\n\nFor read-only metric tables, disable selection and enable pagination:\n\u003Cspan class=\"sb\"\u003E```python\u003C/span\u003E\n\u003Cspan class=\"n\"\u003Emo\u003C/span\u003E\u003Cspan class=\"o\"\u003E.\u003C/span\u003E\u003Cspan class=\"n\"\u003Eui\u003C/span\u003E\u003Cspan class=\"o\"\u003E.\u003C/span\u003E\u003Cspan class=\"n\"\u003Etable\u003C/span\u003E\u003Cspan class=\"p\"\u003E(\u003C/span\u003E\u003Cspan class=\"n\"\u003Edf_metrics\u003C/span\u003E\u003Cspan class=\"p\"\u003E,\u003C/span\u003E \u003Cspan class=\"n\"\u003Eselection\u003C/span\u003E\u003Cspan class=\"o\"\u003E=\u003C/span\u003E\u003Cspan class=\"kc\"\u003ENone\u003C/span\u003E\u003Cspan class=\"p\"\u003E,\u003C/span\u003E \u003Cspan class=\"n\"\u003Epagination\u003C/span\u003E\u003Cspan class=\"o\"\u003E=\u003C/span\u003E\u003Cspan class=\"kc\"\u003ETrue\u003C/span\u003E\u003Cspan class=\"p\"\u003E)\u003C/span\u003E\n\u003Cspan class=\"sb\"\u003E```\u003C/span\u003E\n\n\u003Cspan class=\"gu\"\u003E## Table Previews with Accordion\u003C/span\u003E\n\nThe \u003Cspan class=\"sb\"\u003E`render_table_preview`\u003C/span\u003E helper wraps a model preview in an accordion\nwith row count, column count, and a SQL snippet:\n\u003Cspan class=\"sb\"\u003E```python\u003C/span\u003E\n\u003Cspan class=\"c1\"\u003E# In your helper utilities cell:\u003C/span\u003E\n\u003Cspan class=\"k\"\u003Edef\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"nf\"\u003Erender_table_preview\u003C/span\u003E\u003Cspan class=\"p\"\u003E(\u003C/span\u003E\u003Cspan class=\"n\"\u003Emodel_name\u003C/span\u003E\u003Cspan class=\"p\"\u003E):\u003C/span\u003E\n    \u003Cspan class=\"n\"\u003Edf\u003C/span\u003E \u003Cspan class=\"o\"\u003E=\u003C/span\u003E \u003Cspan class=\"n\"\u003Eget_model_preview\u003C/span\u003E\u003Cspan class=\"p\"\u003E(\u003C/span\u003E\u003Cspan class=\"n\"\u003Emodel_name\u003C/span\u003E\u003Cspan class=\"p\"\u003E)\u003C/span\u003E\n    \u003Cspan class=\"n\"\u003Esql_snippet\u003C/span\u003E \u003Cspan class=\"o\"\u003E=\u003C/span\u003E \u003Cspan class=\"n\"\u003Egenerate_sql_snippet\u003C/span\u003E\u003Cspan class=\"p\"\u003E(\u003C/span\u003E\u003Cspan class=\"n\"\u003Emodel_name\u003C/span\u003E\u003Cspan class=\"p\"\u003E,\u003C/span\u003E \u003Cspan class=\"n\"\u003Edf\u003C/span\u003E\u003Cspan class=\"p\"\u003E)\u003C/span\u003E\n    \u003Cspan class=\"n\"\u003Erow_count\u003C/span\u003E \u003Cspan class=\"o\"\u003E=\u003C/span\u003E \u003Cspan class=\"n\"\u003Eget_row_count\u003C/span\u003E\u003Cspan class=\"p\"\u003E(\u003C/span\u003E\u003Cspan class=\"n\"\u003Emodel_name\u003C/span\u003E\u003Cspan class=\"p\"\u003E)\u003C/span\u003E\n    \u003Cspan class=\"n\"\u003Ecol_count\u003C/span\u003E \u003Cspan class=\"o\"\u003E=\u003C/span\u003E \u003Cspan class=\"nb\"\u003Elen\u003C/span\u003E\u003Cspan class=\"p\"\u003E(\u003C/span\u003E\u003Cspan class=\"n\"\u003Edf\u003C/span\u003E\u003Cspan class=\"o\"\u003E.\u003C/span\u003E\u003Cspan class=\"n\"\u003Ecolumns\u003C/span\u003E\u003Cspan class=\"p\"\u003E)\u003C/span\u003E\n    \u003Cspan class=\"n\"\u003Etitle\u003C/span\u003E \u003Cspan class=\"o\"\u003E=\u003C/span\u003E \u003Cspan class=\"sa\"\u003Ef\u003C/span\u003E\u003Cspan class=\"s2\"\u003E\u0026quot;\u003C/span\u003E\u003Cspan class=\"si\"\u003E{\u003C/span\u003E\u003Cspan class=\"n\"\u003Emodel_name\u003C/span\u003E\u003Cspan class=\"si\"\u003E}\u003C/span\u003E\u003Cspan class=\"s2\"\u003E | \u003C/span\u003E\u003Cspan class=\"si\"\u003E{\u003C/span\u003E\u003Cspan class=\"n\"\u003Erow_count\u003C/span\u003E\u003Cspan class=\"si\"\u003E:\u003C/span\u003E\u003Cspan class=\"s2\"\u003E,.0f\u003C/span\u003E\u003Cspan class=\"si\"\u003E}\u003C/span\u003E\u003Cspan class=\"s2\"\u003E rows, \u003C/span\u003E\u003Cspan class=\"si\"\u003E{\u003C/span\u003E\u003Cspan class=\"n\"\u003Ecol_count\u003C/span\u003E\u003Cspan class=\"si\"\u003E}\u003C/span\u003E\u003Cspan class=\"s2\"\u003E cols\u0026quot;\u003C/span\u003E\n    \u003Cspan class=\"k\"\u003Ereturn\u003C/span\u003E \u003Cspan class=\"n\"\u003Emo\u003C/span\u003E\u003Cspan class=\"o\"\u003E.\u003C/span\u003E\u003Cspan class=\"n\"\u003Eaccordion\u003C/span\u003E\u003Cspan class=\"p\"\u003E({\u003C/span\u003E\u003Cspan class=\"n\"\u003Etitle\u003C/span\u003E\u003Cspan class=\"p\"\u003E:\u003C/span\u003E \u003Cspan class=\"n\"\u003Emo\u003C/span\u003E\u003Cspan class=\"o\"\u003E.\u003C/span\u003E\u003Cspan class=\"n\"\u003Evstack\u003C/span\u003E\u003Cspan class=\"p\"\u003E([\u003C/span\u003E\u003Cspan class=\"n\"\u003Esql_snippet\u003C/span\u003E\u003Cspan class=\"p\"\u003E,\u003C/span\u003E \u003Cspan class=\"n\"\u003Etable\u003C/span\u003E\u003Cspan class=\"p\"\u003E])})\u003C/span\u003E\n\n\u003Cspan class=\"c1\"\u003E# Then in content cells:\u003C/span\u003E\n\u003Cspan class=\"n\"\u003Erender_table_preview\u003C/span\u003E\u003Cspan class=\"p\"\u003E(\u003C/span\u003E\u003Cspan class=\"s1\"\u003E\u0026#39;oso.stg_opendevdata__ecosystems\u0026#39;\u003C/span\u003E\u003Cspan class=\"p\"\u003E)\u003C/span\u003E\n\u003Cspan class=\"sb\"\u003E```\u003C/span\u003E\n\n\u003Cspan class=\"gu\"\u003E## Data Lineage Diagrams\u003C/span\u003E\n\nUse \u003Cspan class=\"sb\"\u003E`mo.mermaid()`\u003C/span\u003E for showing model relationships:\n\u003Cspan class=\"sb\"\u003E```python\u003C/span\u003E\n\u003Cspan class=\"nd\"\u003E@app\u003C/span\u003E\u003Cspan class=\"o\"\u003E.\u003C/span\u003E\u003Cspan class=\"n\"\u003Ecell\u003C/span\u003E\u003Cspan class=\"p\"\u003E(\u003C/span\u003E\u003Cspan class=\"n\"\u003Ehide_code\u003C/span\u003E\u003Cspan class=\"o\"\u003E=\u003C/span\u003E\u003Cspan class=\"kc\"\u003ETrue\u003C/span\u003E\u003Cspan class=\"p\"\u003E)\u003C/span\u003E\n\u003Cspan class=\"k\"\u003Edef\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"nf\"\u003E_\u003C/span\u003E\u003Cspan class=\"p\"\u003E(\u003C/span\u003E\u003Cspan class=\"n\"\u003Emo\u003C/span\u003E\u003Cspan class=\"p\"\u003E):\u003C/span\u003E\n    \u003Cspan class=\"n\"\u003Emo\u003C/span\u003E\u003Cspan class=\"o\"\u003E.\u003C/span\u003E\u003Cspan class=\"n\"\u003Emermaid\u003C/span\u003E\u003Cspan class=\"p\"\u003E(\u003C/span\u003E\u003Cspan class=\"s2\"\u003E\u0026quot;\u0026quot;\u0026quot;\u003C/span\u003E\n\u003Cspan class=\"s2\"\u003E    graph TD\u003C/span\u003E\n\u003Cspan class=\"s2\"\u003E        A[source_model\u0026lt;br/\u0026gt;Raw data] --\u0026gt; B[int_model\u0026lt;br/\u0026gt;Cleaned]\u003C/span\u003E\n\u003Cspan class=\"s2\"\u003E        B --\u0026gt; C[final_model\u0026lt;br/\u0026gt;Ready to query]\u003C/span\u003E\n\u003Cspan class=\"s2\"\u003E    \u0026quot;\u0026quot;\u0026quot;\u003C/span\u003E\u003Cspan class=\"p\"\u003E)\u003C/span\u003E\n    \u003Cspan class=\"k\"\u003Ereturn\u003C/span\u003E\n\u003Cspan class=\"sb\"\u003E```\u003C/span\u003E\n\u003C/code\u003E\u003C/pre\u003E\u003C/div\u003E\u003C/span\u003E\u003C/div\u003E\u003C/marimo-accordion\u003E\u003C/div\u003E"}, "type": "data"}]}, {"code_hash": "211bae9c597f22b5b8c5ab17e29eea8a", "console": [], "id": "bkHC", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Ch2 id=\"additional-resources\"\u003EAdditional Resources\u003C/h2\
