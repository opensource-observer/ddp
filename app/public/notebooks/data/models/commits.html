      function __resizeIframe(obj) {
        const scrollbarHeight = 20; // Max between windows, mac, and linux

        function setHeight() {
          // Guard against race condition where iframe isn't ready
          if (!obj.contentWindow?.document?.documentElement) {
            return;
          }
          const element = obj.contentWindow.document.documentElement;
          // If there is no vertical scrollbar, we don't need to resize the iframe
          if (element.scrollHeight === element.clientHeight) {
            return;
          }

          // Create a new height that includes the scrollbar height if it's visible
          const hasHorizontalScrollbar = element.scrollWidth > element.clientWidth;
          const newHeight = element.scrollHeight + (hasHorizontalScrollbar ? scrollbarHeight : 0);

          // Only update the height if it's different from the current height
          if (obj.style.height !== `${newHeight}px`) {
            obj.style.height = `${newHeight}px`;
          }
        }

        // Resize the iframe to the height of the content and bottom scrollbar height
        setHeight();

        // Resize the iframe when the content changes
        const resizeObserver = new ResizeObserver((_entries) => {
          setHeight();
        });
        // Only observe if iframe content is ready
        if (obj.contentWindow?.document?.body) {
          resizeObserver.observe(obj.contentWindow.document.body);
        }
      }
    </script>

/* Source: base.css + _data.css */

/*
 * DDP Notebook Base Styles
 *
 * Shared foundation for all marimo notebooks in the Developer Data Portal.
 * This file is concatenated with variant partials (_root.css, _data.css,
 * _insights.css) by scripts/build_css.py to produce self-contained CSS files.
 *
 * Font: System stack — matches the Next.js shell exactly. Overrides marimo's
 * default PT Sans to eliminate the visual mismatch between sidebar and content.
 *
 * Color provenance (update both here and app/app/globals.css if colors change):
 *   - Chart palette: --ddp-primary, --ddp-secondary, --ddp-tertiary
 *   - Shell accent: --ddp-accent (indigo-600, shared with Tailwind config)
 *   - Slate scale: --ddp-text, --ddp-border, etc. (Tailwind slate palette)
 */

/* === Custom Properties === */
:root {
  --ddp-font: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen',
    'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue', sans-serif;
  --ddp-font-mono: 'Fira Mono', 'Fira Code', ui-monospace, monospace;
  --ddp-primary: #4C78A8;
  --ddp-secondary: #F58518;
  --ddp-tertiary: #72B7B2;
  --ddp-text: #0f172a;
  --ddp-text-muted: #64748b;
  --ddp-bg: #ffffff;
  --ddp-border: #e2e8f0;
  --ddp-surface: #f8fafc;
  --ddp-accent: #4f46e5;
}

/* === Nuclear font override ===
 * Marimo components use inline styles and deeply nested React elements.
 * A targeted selector list can't catch them all. The universal selector
 * with !important is the only way to guarantee the system font everywhere. */
*, *::before, *::after {
  box-sizing: border-box;
  font-family: var(--ddp-font) !important;
}
code, code *, pre, pre *, .cm-editor, .cm-editor * {
  font-family: var(--ddp-font-mono) !important;
}

/* === Content width ===
 * Global max-width for all cell output so tables, charts, markdown,
 * and stat cards align to the same column. Root variant narrows to 720px. */
#root [data-cell-id] > div {
  max-width: 1100px !important;
}

/* === Base === */
body {
  margin: 0;
  padding: 0;
  font-size: 14px;
  line-height: 1.5;
  color: var(--ddp-text);
  background: var(--ddp-bg);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

/* === Headings ===
 * Weight 600 (semibold) throughout — quieter than marimo's 700-800 defaults.
 * Tight letter-spacing for a modern, dense feel. .prose targets marimo's
 * Tailwind Typography wrapper around markdown output. */
h1, .prose h1 {
  font-weight: 600 !important;
  line-height: 1.25 !important;
  letter-spacing: -0.02em !important;
  color: var(--ddp-text) !important;
}
h2, .prose h2 {
  font-weight: 600 !important;
  line-height: 1.3 !important;
  letter-spacing: -0.01em !important;
  color: var(--ddp-text) !important;
}
h3, .prose h3 {
  font-weight: 600 !important;
  line-height: 1.35 !important;
  color: var(--ddp-text) !important;
}

/* === Body text === */
p, li, .prose p, .prose li {
  line-height: 1.5 !important;
  color: var(--ddp-text) !important;
  font-size: inherit !important;
}

small, .text-muted {
  color: var(--ddp-text-muted);
}

/* === Inline code === */
code {
  font-size: 0.8125em;
  background: var(--ddp-surface);
  padding: 0.15em 0.4em;
  border-radius: 3px;
  color: var(--ddp-text);
}
.prose code {
  font-size: 0.8125em !important;
  background: var(--ddp-surface) !important;
  color: var(--ddp-text) !important;
}

/* === Code blocks (GitHub-style: subtle bg, no border) === */
pre code {
  display: block;
  padding: 0.85em 1em;
  overflow-x: auto;
  background: #f6f8fa;
  border: none;
  border-radius: 6px;
  font-size: 0.8125em;
  line-height: 1.55;
}

/* === Links === */
a {
  color: var(--ddp-accent);
  text-decoration: none;
}
a:hover {
  text-decoration: underline;
}

/* === Scrollbar === */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: #9ca3af; }

/* === Tables === */
table {
  width: 100%;
  border-collapse: collapse;
  font-size: 0.8125em;
}
th {
  text-align: left;
  padding: 6px 10px;
  border-bottom: 1px solid var(--ddp-border);
  color: var(--ddp-text-muted);
  font-weight: 500;
  font-size: 0.8125em;
  text-transform: uppercase;
  letter-spacing: 0.03em;
}
td {
  padding: 6px 10px;
  border-bottom: 1px solid var(--ddp-border);
  color: var(--ddp-text);
}

/* === Marimo stat cards ===
 * Normalize the oversized stat values and labels to feel like
 * part of the same app as the sidebar. */
/* Equal-height stat cards: stretch within flex row, clamp long values */
[data-testid="marimo-stat"] {
  border-color: var(--ddp-border) !important;
  border-radius: 6px !important;
  align-self: stretch !important;
  min-height: 0 !important;
}
[data-testid="marimo-stat"] > div {
  height: 100% !important;
}
[data-testid="marimo-stat"] [class*="label"],
[data-testid="marimo-stat"] [class*="Label"] {
  font-size: 0.75em !important;
  font-weight: 500 !important;
  color: var(--ddp-text-muted) !important;
  text-transform: uppercase !important;
  letter-spacing: 0.03em !important;
}
[data-testid="marimo-stat"] [class*="value"],
[data-testid="marimo-stat"] [class*="Value"] {
  font-size: clamp(1em, 4vw, 1.5em) !important;
  font-weight: 600 !important;
  letter-spacing: -0.02em !important;
  color: var(--ddp-text) !important;
  overflow-wrap: break-word !important;
  word-break: break-word !important;
  line-height: 1.2 !important;
}
[data-testid="marimo-stat"] [class*="caption"],
[data-testid="marimo-stat"] [class*="Caption"] {
  font-size: 0.75em !important;
  color: var(--ddp-text-muted) !important;
}

/* === Marimo tables (data grid) === */
[data-testid="marimo-table"] th,
[class*="TableHeader"] th {
  font-size: 0.6875em !important;
  font-weight: 500 !important;
  text-transform: uppercase !important;
  letter-spacing: 0.04em !important;
  color: var(--ddp-text-muted) !important;
}

/* === Marimo UI elements === */
select, button, input {
  font-size: 0.8125em !important;
}

/* === Plotly chart overrides ===
 * Plotly uses inline SVG text — we can't override font-family on those,
 * but we can normalize the container spacing. */
.js-plotly-plot {
  max-width: 100%;
  margin: 0.5em 0;
}

/* === Mobile: Tablet === */
@media (max-width: 768px) {
  #root {
    padding-left: 12px !important;
    padding-right: 12px !important;
  }

  table {
    display: block;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
  }

  .marimo-output .flex-row {
    flex-direction: column !important;
  }
}

/* === Mobile: Phone === */
@media (max-width: 480px) {
  .marimo-output .flex-row {
    flex-direction: column !important;
    gap: 0.5rem !important;
  }
}


/* === Data variant overrides === */

/*
 * DDP Data Notebook Overrides
 * For: data/sources/*.py, data/models/*.py, data/metric-definitions/*.py
 * Reference/documentation style with table-heavy content.
 */

/* Zebra striping for tables */
tbody tr:nth-child(even) {
  background: var(--ddp-surface);
}

/* Code blocks in documentation */
pre code {
  font-size: 0.8125em;
  line-height: 1.6;
}

/* Mermaid diagram container */
.marimo-output svg.mermaid {
  display: block;
  max-width: 600px;
  margin: 1em auto;
}

/* Accordion previews (render_table_preview) */
details {
  border: 1px solid var(--ddp-border);
  border-radius: 6px;
  margin: 0.5em 0;
  overflow: hidden;
}
details summary {
  font-weight: 600;
  font-size: 0.9em;
  padding: 0.6em 1em;
  background: var(--ddp-surface);
  cursor: pointer;
}
details > div {
  padding: 0.5em 1em;
}

/* Field documentation tables */
table th {
  background: var(--ddp-surface);
  white-space: nowrap;
}

abled": false, "hide_code": true}, "id": "Hstk", "name": "_"}, {"code": "", "code_hash": "df3193e95e8ea3330d4ff96607c2de2a", "config": {"column": null, "disabled": false, "hide_code": true}, "id": "nWHF", "name": "_"}, {"code": "", "code_hash": "3627dbbbb223a6c520f845e562024e05", "config": {"column": null, "disabled": false, "hide_code": true}, "id": "iLit", "name": "_"}, {"code": "", "code_hash": "60fd74ded8a20bcef9733ea73f009d60", "config": {"column": null, "disabled": false, "hide_code": true}, "id": "ZHCJ", "name": "_"}, {"code": "", "code_hash": "08cccf08290400574810fe1f96bdaea4", "config": {"column": null, "disabled": false, "hide_code": true}, "id": "ROlb", "name": "_"}, {"code": "", "code_hash": "368d6c4e7e031f15038b8a126a7a644d", "config": {"column": null, "disabled": false, "hide_code": true}, "id": "qnkX", "name": "_"}, {"code": "", "code_hash": "5925e769da176b7723439f696b454656", "config": {"column": null, "disabled": false, "hide_code": true}, "id": "TqIu", "name": "_"}, {"code": "", "code_hash": "71be4f141998b096a0f37c660b1c5e14", "config": {"column": null, "disabled": false, "hide_code": true}, "id": "Vxnm", "name": "_"}], "metadata": {"marimo_version": "0.18.4"}, "version": "1"},
            "session": {"cells": [{"code_hash": "7e6fa0b633041ef61719e7c9b6af20e1", "console": [], "id": "Hbol", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Ch1 id=\"commits\"\u003ECommits\u003C/h1\u003E\n\u003Cspan class=\"paragraph\"\u003EWe've created a \u003Cstrong\u003Eunified commits model\u003C/strong\u003E that combines Open Dev Data's high-fidelity commit tracking with GitHub Archive's broad coverage, matched on commit SHA and repository.\u003C/span\u003E\n\u003Cspan class=\"paragraph\"\u003EPreview:\n\u003Cdiv class=\"language-sql codehilite\"\u003E\u003Cpre\u003E\u003Cspan\u003E\u003C/span\u003E\u003Ccode\u003E\u003Cspan class=\"k\"\u003ESELECT\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"o\"\u003E*\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"k\"\u003EFROM\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"n\"\u003Eoso\u003C/span\u003E\u003Cspan class=\"p\"\u003E.\u003C/span\u003E\u003Cspan class=\"n\"\u003Eint_ddp__commits_unified\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"k\"\u003ELIMIT\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"mi\"\u003E10\u003C/span\u003E\n\u003C/code\u003E\u003C/pre\u003E\u003C/div\u003E\nOr:\n\u003Cdiv class=\"language-sql codehilite\"\u003E\u003Cpre\u003E\u003Cspan\u003E\u003C/span\u003E\u003Ccode\u003E\u003Cspan class=\"k\"\u003ESELECT\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"o\"\u003E*\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"k\"\u003EFROM\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"n\"\u003Eoso\u003C/span\u003E\u003Cspan class=\"p\"\u003E.\u003C/span\u003E\u003Cspan class=\"n\"\u003Eint_ddp__commits_deduped\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"k\"\u003ELIMIT\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"mi\"\u003E10\u003C/span\u003E\n\u003C/code\u003E\u003C/pre\u003E\u003C/div\u003E\u003C/span\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "5df0fbc95041a87d334477d9cd846aad", "console": [], "id": "MJUe", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Ch2 id=\"overview\"\u003EOverview\u003C/h2\u003E\n\u003Cspan class=\"paragraph\"\u003EThe Unified Commits Model brings together commit data from two complementary sources:\u003C/span\u003E\n\u003Cul\u003E\n\u003Cli\u003E\u003Cstrong\u003EOpen Dev Data (ODD)\u003C/strong\u003E: A proprietary deduplication system that tracks commits with high fidelity, including detailed metrics like additions/deletions and resolved author identities via \u003Ccode\u003Ecanonical_developer_id\u003C/code\u003E.\u003C/li\u003E\n\u003Cli\u003E\u003Cstrong\u003EGitHub Archive (GHA)\u003C/strong\u003E: A public event stream capturing all GitHub activity, including push events with commit payloads, identified by \u003Ccode\u003Eactor_id\u003C/code\u003E (the GitHub Database ID of the event actor).\u003C/li\u003E\n\u003C/ul\u003E\n\u003Cspan class=\"paragraph\"\u003EThis unified model provides a complete view of code contributions, enabling accurate analysis across both curated high-fidelity data and universal event coverage.\u003C/span\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "660eb3fa77f133495a25f76fbf65b0bb", "console": [], "id": "vblA", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Ch2 id=\"data-quality-and-coverage-challenges\"\u003EData Quality and Coverage Challenges\u003C/h2\u003E\n\u003Cspan class=\"paragraph\"\u003EWorking with commit data presents several quality and coverage challenges:\u003C/span\u003E\n\u003Cul\u003E\n\u003Cli\u003E\u003Cstrong\u003EActor vs. Author\u003C/strong\u003E: GHA \u003Ccode\u003Eactor_id\u003C/code\u003E represents the \u003Cem\u003Epusher\u003C/em\u003E (e.g., a maintainer merging a PR), not necessarily the original author of the code. In squash merges, original authors are buried within the event payload rather than being the primary actor.\u003C/li\u003E\n\u003Cli\u003E\u003Cstrong\u003EPayload Caps\u003C/strong\u003E: GitHub Archive \u003Ccode\u003EPushEvent\u003C/code\u003E payloads are capped at 20 commits per event. Any commits beyond this limit in a single push are entirely missing from the GHA dataset.\u003C/li\u003E\n\u003Cli\u003E\u003Cstrong\u003EHistorical Limitations (Pre-Oct 2025)\u003C/strong\u003E: Prior to 2025-10-07, commit payloads in GHA only contained \u003Ccode\u003Eauthor_email\u003C/code\u003E and \u003Ccode\u003Eauthor_name\u003C/code\u003E, but lacked the unique GitHub \u003Ccode\u003Euser_id\u003C/code\u003E, making reliable cross-event attribution difficult.\u003C/li\u003E\n\u003Cli\u003E\u003Cstrong\u003EData Loss (Post-Oct 2025)\u003C/strong\u003E: Since 2025-10-07, GitHub Archive has stopped providing commit payload data entirely. This makes author attribution via GHA impossible for all new data, reinforcing the need for Open Dev Data's direct commit tracking.\u003C/li\u003E\n\u003Cli\u003E\u003Cstrong\u003ECoverage Limitations\u003C/strong\u003E: Open Dev Data tracks a curated set of repositories (high fidelity but selective), whereas GitHub Archive captures all public activity (universal but lower fidelity). This means commits may be missing from ODD if they occur in repositories outside the tracked set.\u003C/li\u003E\n\u003C/ul\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "12923f3b04fd567b139e72f88c75d870", "console": [], "id": "bkHC", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Ch2 id=\"the-unified-solution\"\u003EThe Unified Solution\u003C/h2\u003E\n\u003Cspan class=\"paragraph\"\u003EWe provide two models for working with unified commits:\u003C/span\u003E\n\u003Ch3 id=\"int_ddp__commits_unified\"\u003E\u003Ccode\u003Eint_ddp__commits_unified\u003C/code\u003E\u003C/h3\u003E\n\u003Cspan class=\"paragraph\"\u003ECombines commits from both Open Dev Data and GitHub Archive. The model uses a UNION ALL approach:\u003C/span\u003E\n\u003Col\u003E\n\u003Cli\u003EAll GHA commits enriched with ODD metadata where available (matched on SHA + repository_id)\u003C/li\u003E\n\u003Cli\u003EODD-only commits that don't exist in GHA\u003C/li\u003E\n\u003C/ol\u003E\n\u003Cspan class=\"paragraph\"\u003E\u003Cstrong\u003EKey characteristics:\u003C/strong\u003E\u003C/span\u003E\n\u003Cul\u003E\n\u003Cli\u003EGrain is \u003Ccode\u003E(sha, repository_id)\u003C/code\u003E - the same commit can appear in multiple repositories (forks)\u003C/li\u003E\n\u003Cli\u003EThe \u003Ccode\u003Esource\u003C/code\u003E column indicates origin: 'gharchive' (with or without ODD enrichment) or 'opendevdata' (ODD-only)\u003C/li\u003E\n\u003Cli\u003EBest for: Analysis where you want all commit occurrences, including across forks\u003C/li\u003E\n\u003Cli\u003EOnly includes commits from repositories that can be mapped to a canonical GitHub repository_id\u003C/li\u003E\n\u003C/ul\u003E\n\u003Ch3 id=\"int_ddp__commits_deduped\"\u003E\u003Ccode\u003Eint_ddp__commits_deduped\u003C/code\u003E\u003C/h3\u003E\n\u003Cspan class=\"paragraph\"\u003EA deduplicated version of the unified commits, keeping only the first occurrence of each \u003Ccode\u003E(sha, repository_id)\u003C/code\u003E pair by \u003Ccode\u003Ecreated_at\u003C/code\u003E.\u003C/span\u003E\n\u003Cspan class=\"paragraph\"\u003E\u003Cstrong\u003EKey characteristics:\u003C/strong\u003E\u003C/span\u003E\n\u003Cul\u003E\n\u003Cli\u003EGrain is \u003Ccode\u003E(sha, repository_id)\u003C/code\u003E with deduplication applied\u003C/li\u003E\n\u003Cli\u003EEach commit appears only once per repository\u003C/li\u003E\n\u003Cli\u003EBest for: Analysis requiring unique commits per repository (e.g., counting commits per repo)\u003C/li\u003E\n\u003C/ul\u003E\n\u003Ch3 id=\"how-the-unification-works\"\u003EHow the Unification Works\u003C/h3\u003E\n\u003Col\u003E\n\u003Cli\u003E\u003Cstrong\u003EStart with GHA commits\u003C/strong\u003E: All commits from GitHub Archive push events (\u003Ccode\u003Estg_github__commits\u003C/code\u003E)\u003C/li\u003E\n\u003Cli\u003E\u003Cstrong\u003EMap ODD repositories\u003C/strong\u003E: Join ODD commits to \u003Ccode\u003Eint_opendevdata__repositories_with_repo_id\u003C/code\u003E to get canonical GitHub \u003Ccode\u003Erepository_id\u003C/code\u003E. ODD commits without a valid repository mapping are excluded.\u003C/li\u003E\n\u003Cli\u003E\u003Cstrong\u003EEnrich GHA commits\u003C/strong\u003E: LEFT JOIN ODD data to GHA commits on SHA + repository_id to add rich metadata (additions, deletions, \u003Ccode\u003Ecanonical_developer_id\u003C/code\u003E)\u003C/li\u003E\n\u003Cli\u003E\u003Cstrong\u003EAdd ODD-only commits\u003C/strong\u003E: UNION ALL commits that exist in ODD but not in GHA (identified by SHA + repository_id)\u003C/li\u003E\n\u003Cli\u003E\u003Cstrong\u003EResolve author IDs\u003C/strong\u003E: Use \u003Ccode\u003Enode_id_map\u003C/code\u003E to decode ODD's GraphQL IDs to GitHub Database IDs\u003C/li\u003E\n\u003C/ol\u003E\n\u003Cspan class=\"paragraph\"\u003EThe result combines GHA commits (enriched with ODD metadata where available) with ODD-only commits, providing both \u003Ccode\u003Eactor_id\u003C/code\u003E (who pushed) and \u003Ccode\u003Eauthor_id\u003C/code\u003E (commit author) when possible.\u003C/span\u003E\n\u003Ch3 id=\"data-lineage\"\u003EData Lineage\u003C/h3\u003E\n\u003Cspan class=\"paragraph\"\u003E\u003Cstrong\u003ESource Models:\u003C/strong\u003E\u003C/span\u003E\n\u003Cul\u003E\n\u003Cli\u003E\u003Ccode\u003Estg_github__commits\u003C/code\u003E: Extracts commits from GitHub Archive push events (pre-Oct 2025)\u003C/li\u003E\n\u003Cli\u003E\u003Ccode\u003Estg_github__commits_since_20251007\u003C/code\u003E: Extracts commits from GitHub Archive push events (post-Oct 2025)\u003C/li\u003E\n\u003Cli\u003E\u003Ccode\u003Estg_opendevdata__commits\u003C/code\u003E: Raw commits from Open Dev Data with identity resolution\u003C/li\u003E\n\u003Cli\u003E\u003Ccode\u003Eint_opendevdata__repositories_with_repo_id\u003C/code\u003E: Repository mapping from ODD to canonical GitHub IDs\u003C/li\u003E\n\u003Cli\u003E\u003Ccode\u003Eint_github__commits_all\u003C/code\u003E: Consolidated GHA commits (UNION of both pre and post-Oct 2025)\u003C/li\u003E\n\u003C/ul\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "ae66d20eef721d5955e9d8400f618008", "console": [], "id": "lEQa", "outputs": [{"data": {"text/html": "\u003Cmarimo-mermaid data-diagram='\u0026quot;\u0026#92;ngraph TD\u0026#92;n    A[stg_github__commits\u0026lt;br/\u0026gt;Pre-Oct 2025] --\u0026gt; B[int_github__commits_all\u0026lt;br/\u0026gt;Consolidated GHA]\u0026#92;n    A2[stg_github__commits_since_20251007\u0026lt;br/\u0026gt;Post-Oct 2025] --\u0026gt; B\u0026#92;n    C[stg_opendevdata__commits\u0026lt;br/\u0026gt;ODD commits] --\u0026gt; D[int_opendevdata__repositories_with_repo_id\u0026lt;br/\u0026gt;Repository mapping]\u0026#92;n    D --\u0026gt; E\u0026#92;n    B --\u0026gt; E{Enrich: LEFT JOIN on SHA + repository_id}\u0026#92;n    E --\u0026gt; E2{Add ODD-only: UNION ALL}\u0026#92;n    E2 --\u0026gt; F[int_ddp__commits_unified\u0026lt;br/\u0026gt;Unified, not deduped]\u0026#92;n    F --\u0026gt; G[int_ddp__commits_deduped\u0026lt;br/\u0026gt;Deduplicated]\u0026#92;n\u0026quot;'\u003E\u003C/marimo-mermaid\u003E"}, "type": "data"}]}, {"code_hash": "fe06a606a44741db3b85964a60d4c741", "console": [], "id": "PKri", "outputs": [{"data": {"text/html": "\u003Cmarimo-accordion data-labels='[\u0026quot;\u0026lt;span class=\u0026#92;\u0026quot;markdown prose dark:prose-invert contents\u0026#92;\u0026quot;\u0026gt;\u0026lt;span class=\u0026#92;\u0
