    <script data-marimo="true">
      function __resizeIframe(obj) {
        const scrollbarHeight = 20; // Max between windows, mac, and linux

        function setHeight() {
          // Guard against race condition where iframe isn't ready
          if (!obj.contentWindow?.document?.documentElement) {
            return;
          }
          const element = obj.contentWindow.document.documentElement;
          // If there is no vertical scrollbar, we don't need to resize the iframe
          if (element.scrollHeight === element.clientHeight) {
            return;
          }

          // Create a new height that includes the scrollbar height if it's visible
          const hasHorizontalScrollbar = element.scrollWidth > element.clientWidth;
          const newHeight = element.scrollHeight + (hasHorizontalScrollbar ? scrollbarHeight : 0);

          // Only update the height if it's different from the current height
          if (obj.style.height !== `${newHeight}px`) {
            obj.style.height = `${newHeight}px`;
          }
        }

        // Resize the iframe to the height of the content and bottom scrollbar height
        setHeight();

        // Resize the iframe when the content changes
        const resizeObserver = new ResizeObserver((_entries) => {
          setHeight();
        });
        // Only observe if iframe content is ready
        if (obj.contentWindow?.document?.body) {
          resizeObserver.observe(obj.contentWindow.document.body);
        }
      }
    </script>

/* Source: base.css + _data.css */

/*
 * DDP Notebook Base Styles
 *
 * Shared foundation for all marimo notebooks in the Developer Data Portal.
 * This file is concatenated with variant partials (_root.css, _data.css,
 * _insights.css) by scripts/build_css.py to produce self-contained CSS files.
 *
 * Font: System stack — matches the Next.js shell exactly. Overrides marimo's
 * default PT Sans to eliminate the visual mismatch between sidebar and content.
 *
 * Color provenance (update both here and app/app/globals.css if colors change):
 *   - Chart palette: --ddp-primary, --ddp-secondary, --ddp-tertiary
 *   - Shell accent: --ddp-accent (indigo-600, shared with Tailwind config)
 *   - Slate scale: --ddp-text, --ddp-border, etc. (Tailwind slate palette)
 */

/* === Custom Properties === */
:root {
  --ddp-font: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen',
    'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue', sans-serif;
  --ddp-font-mono: 'Fira Mono', 'Fira Code', ui-monospace, monospace;
  --ddp-primary: #4C78A8;
  --ddp-secondary: #F58518;
  --ddp-tertiary: #72B7B2;
  --ddp-text: #0f172a;
  --ddp-text-muted: #64748b;
  --ddp-bg: #ffffff;
  --ddp-border: #e2e8f0;
  --ddp-surface: #f8fafc;
  --ddp-accent: #4f46e5;
}

/* === Nuclear font override ===
 * Marimo components use inline styles and deeply nested React elements.
 * A targeted selector list can't catch them all. The universal selector
 * with !important is the only way to guarantee the system font everywhere. */
*, *::before, *::after {
  box-sizing: border-box;
  font-family: var(--ddp-font) !important;
}
code, code *, pre, pre *, .cm-editor, .cm-editor * {
  font-family: var(--ddp-font-mono) !important;
}

/* === Content width ===
 * Global max-width for all cell output so tables, charts, markdown,
 * and stat cards align to the same column. Root variant narrows to 720px. */
#root [data-cell-id] > div {
  max-width: 1100px !important;
}

/* === Base === */
body {
  margin: 0;
  padding: 0;
  font-size: 14px;
  line-height: 1.5;
  color: var(--ddp-text);
  background: var(--ddp-bg);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

/* === Headings ===
 * Weight 600 (semibold) throughout — quieter than marimo's 700-800 defaults.
 * Tight letter-spacing for a modern, dense feel. .prose targets marimo's
 * Tailwind Typography wrapper around markdown output. */
h1, .prose h1 {
  font-weight: 600 !important;
  line-height: 1.25 !important;
  letter-spacing: -0.02em !important;
  color: var(--ddp-text) !important;
}
h2, .prose h2 {
  font-weight: 600 !important;
  line-height: 1.3 !important;
  letter-spacing: -0.01em !important;
  color: var(--ddp-text) !important;
}
h3, .prose h3 {
  font-weight: 600 !important;
  line-height: 1.35 !important;
  color: var(--ddp-text) !important;
}

/* === Body text === */
p, li, .prose p, .prose li {
  line-height: 1.5 !important;
  color: var(--ddp-text) !important;
  font-size: inherit !important;
}

small, .text-muted {
  color: var(--ddp-text-muted);
}

/* === Inline code === */
code {
  font-size: 0.8125em;
  background: var(--ddp-surface);
  padding: 0.15em 0.4em;
  border-radius: 3px;
  color: var(--ddp-text);
}
.prose code {
  font-size: 0.8125em !important;
  background: var(--ddp-surface) !important;
  color: var(--ddp-text) !important;
}

/* === Code blocks (GitHub-style: subtle bg, no border) === */
pre code {
  display: block;
  padding: 0.85em 1em;
  overflow-x: auto;
  background: #f6f8fa;
  border: none;
  border-radius: 6px;
  font-size: 0.8125em;
  line-height: 1.55;
}

/* === Links === */
a {
  color: var(--ddp-accent);
  text-decoration: none;
}
a:hover {
  text-decoration: underline;
}

/* === Scrollbar === */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: #9ca3af; }

/* === Tables === */
table {
  width: 100%;
  border-collapse: collapse;
  font-size: 0.8125em;
}
th {
  text-align: left;
  padding: 6px 10px;
  border-bottom: 1px solid var(--ddp-border);
  color: var(--ddp-text-muted);
  font-weight: 500;
  font-size: 0.8125em;
  text-transform: uppercase;
  letter-spacing: 0.03em;
}
td {
  padding: 6px 10px;
  border-bottom: 1px solid var(--ddp-border);
  color: var(--ddp-text);
}

/* === Marimo stat cards ===
 * Normalize the oversized stat values and labels to feel like
 * part of the same app as the sidebar. */
/* Equal-height stat cards: stretch within flex row, clamp long values */
[data-testid="marimo-stat"] {
  border-color: var(--ddp-border) !important;
  border-radius: 6px !important;
  align-self: stretch !important;
  min-height: 0 !important;
}
[data-testid="marimo-stat"] > div {
  height: 100% !important;
}
[data-testid="marimo-stat"] [class*="label"],
[data-testid="marimo-stat"] [class*="Label"] {
  font-size: 0.75em !important;
  font-weight: 500 !important;
  color: var(--ddp-text-muted) !important;
  text-transform: uppercase !important;
  letter-spacing: 0.03em !important;
}
[data-testid="marimo-stat"] [class*="value"],
[data-testid="marimo-stat"] [class*="Value"] {
  font-size: clamp(1em, 4vw, 1.5em) !important;
  font-weight: 600 !important;
  letter-spacing: -0.02em !important;
  color: var(--ddp-text) !important;
  overflow-wrap: break-word !important;
  word-break: break-word !important;
  line-height: 1.2 !important;
}
[data-testid="marimo-stat"] [class*="caption"],
[data-testid="marimo-stat"] [class*="Caption"] {
  font-size: 0.75em !important;
  color: var(--ddp-text-muted) !important;
}

/* === Marimo tables (data grid) === */
[data-testid="marimo-table"] th,
[class*="TableHeader"] th {
  font-size: 0.6875em !important;
  font-weight: 500 !important;
  text-transform: uppercase !important;
  letter-spacing: 0.04em !important;
  color: var(--ddp-text-muted) !important;
}

/* === Marimo UI elements === */
select, button, input {
  font-size: 0.8125em !important;
}

/* === Plotly chart overrides ===
 * Plotly uses inline SVG text — we can't override font-family on those,
 * but we can normalize the container spacing. */
.js-plotly-plot {
  max-width: 100%;
  margin: 0.5em 0;
}

/* === Mobile: Tablet === */
@media (max-width: 768px) {
  #root {
    padding-left: 12px !important;
    padding-right: 12px !important;
  }

  table {
    display: block;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
  }

  .marimo-output .flex-row {
    flex-direction: column !important;
  }
}

/* === Mobile: Phone === */
@media (max-width: 480px) {
  .marimo-output .flex-row {
    flex-direction: column !important;
    gap: 0.5rem !important;
  }
}


/* === Data variant overrides === */

/*
 * DDP Data Notebook Overrides
 * For: data/sources/*.py, data/models/*.py, data/metric-definitions/*.py
 * Reference/documentation style with table-heavy content.
 */

/* Zebra striping for tables */
tbody tr:nth-child(even) {
  background: var(--ddp-surface);
}

/* Code blocks in documentation */
pre code {
  font-size: 0.8125em;
  line-height: 1.6;
}

/* Mermaid diagram container */
.marimo-output svg.mermaid {
  display: block;
  max-width: 600px;
  margin: 1em auto;
}

/* Accordion previews (render_table_preview) */
details {
  border: 1px solid var(--ddp-border);
  border-radius: 6px;
  margin: 0.5em 0;
  overflow: hidden;
}
details summary {
  font-weight: 600;
  font-size: 0.9em;
  padding: 0.6em 1em;
  background: var(--ddp-surface);
  cursor: pointer;
}
details > div {
  padding: 0.5em 1em;
}

/* Field documentation tables */
table th {
  background: var(--ddp-surface);
  white-space: nowrap;
}

nfig": {"column": null, "disabled": false, "hide_code": true}, "id": "aLJB", "name": "_"}, {"code": "", "code_hash": "71be4f141998b096a0f37c660b1c5e14", "config": {"column": null, "disabled": false, "hide_code": true}, "id": "nHfw", "name": "_"}], "metadata": {"marimo_version": "0.18.4"}, "version": "1"},
            "session": {"cells": [{"code_hash": "92e187d2ba9016c1e0e0387212d5d754", "console": [], "id": "Hbol", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Ch1 id=\"ecosystems\"\u003EEcosystems\u003C/h1\u003E\n\u003Cspan class=\"paragraph\"\u003EOpen Dev Data organizes repositories into \u003Cstrong\u003Eecosystems\u003C/strong\u003E \u2014 logical groupings by chain, protocol, foundation, or category \u2014 with hierarchical parent-child relationships and recursive repository mappings.\u003C/span\u003E\n\u003Cspan class=\"paragraph\"\u003EPreview:\n\u003Cdiv class=\"language-sql codehilite\"\u003E\u003Cpre\u003E\u003Cspan\u003E\u003C/span\u003E\u003Ccode\u003E\u003Cspan class=\"k\"\u003ESELECT\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"o\"\u003E*\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"k\"\u003EFROM\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"n\"\u003Eoso\u003C/span\u003E\u003Cspan class=\"p\"\u003E.\u003C/span\u003E\u003Cspan class=\"n\"\u003Estg_opendevdata__ecosystems\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"k\"\u003ELIMIT\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"mi\"\u003E10\u003C/span\u003E\n\u003C/code\u003E\u003C/pre\u003E\u003C/div\u003E\u003C/span\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "d8ef36a7c8980aa16ef1769ab74d80f9", "console": [], "id": "MJUe", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Ch2 id=\"overview\"\u003EOverview\u003C/h2\u003E\n\u003Cspan class=\"paragraph\"\u003EEcosystems are groupings of repositories representing chains, protocols, projects, foundations, organizations, or broader categories. They provide a meaningful unit of analysis by aggregating developer activity beyond the repository level.\u003C/span\u003E\n\u003Cul\u003E\n\u003Cli\u003E\u003Cstrong\u003EWhat they are\u003C/strong\u003E: Collections of repos organized by chain (Ethereum, Solana), protocol (Uniswap, Aave), or category (DeFi, NFTs)\u003C/li\u003E\n\u003Cli\u003E\u003Cstrong\u003EMetadata flags\u003C/strong\u003E: Each ecosystem has \u003Ccode\u003Eis_crypto\u003C/code\u003E, \u003Ccode\u003Eis_chain\u003C/code\u003E, and \u003Ccode\u003Eis_category\u003C/code\u003E booleans for filtering\u003C/li\u003E\n\u003Cli\u003E\u003Cstrong\u003EWhy they matter\u003C/strong\u003E: Aggregation (roll up repos to ecosystem-level metrics), comparison (benchmark across ecosystems), discovery (find repos in a domain), and hierarchy (navigate parent-child relationships)\u003C/li\u003E\n\u003C/ul\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "13369551e0a487d1192a9b5ab2d26bd3", "console": [], "id": "vblA", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Ch2 id=\"ecosystem-hierarchy\"\u003EEcosystem Hierarchy\u003C/h2\u003E\n\u003Cspan class=\"paragraph\"\u003EEcosystems form a directed graph (usually a tree or forest). A parent ecosystem is a higher-level grouping (e.g., Ethereum), and a child ecosystem is a project that belongs to it (e.g., Uniswap as a child of Ethereum). Nesting can be multi-level \u2014 a child can itself be a parent of other ecosystems.\u003C/span\u003E\n\u003Ch3 id=\"key-models\"\u003EKey Models\u003C/h3\u003E\n\u003Ctable\u003E\n\u003Cthead\u003E\n\u003Ctr\u003E\n\u003Cth style=\"text-align: left;\"\u003EModel\u003C/th\u003E\n\u003Cth style=\"text-align: left;\"\u003EPurpose\u003C/th\u003E\n\u003Cth style=\"text-align: left;\"\u003EKey Fields\u003C/th\u003E\n\u003C/tr\u003E\n\u003C/thead\u003E\n\u003Ctbody\u003E\n\u003Ctr\u003E\n\u003Ctd style=\"text-align: left;\"\u003E\u003Ccode\u003Estg_opendevdata__ecosystems\u003C/code\u003E\u003C/td\u003E\n\u003Ctd style=\"text-align: left;\"\u003EEcosystem definitions\u003C/td\u003E\n\u003Ctd style=\"text-align: left;\"\u003E\u003Ccode\u003Eid\u003C/code\u003E, \u003Ccode\u003Ename\u003C/code\u003E, \u003Ccode\u003Eis_crypto\u003C/code\u003E, \u003Ccode\u003Eis_chain\u003C/code\u003E, \u003Ccode\u003Eis_category\u003C/code\u003E\u003C/td\u003E\n\u003C/tr\u003E\n\u003Ctr\u003E\n\u003Ctd style=\"text-align: left;\"\u003E\u003Ccode\u003Estg_opendevdata__ecosystems_child_ecosystems\u003C/code\u003E\u003C/td\u003E\n\u003Ctd style=\"text-align: left;\"\u003EParent-child links\u003C/td\u003E\n\u003Ctd style=\"text-align: left;\"\u003E\u003Ccode\u003Eparent_id\u003C/code\u003E, \u003Ccode\u003Echild_id\u003C/code\u003E\u003C/td\u003E\n\u003C/tr\u003E\n\u003Ctr\u003E\n\u003Ctd style=\"text-align: left;\"\u003E\u003Ccode\u003Estg_opendevdata__ecosystems_repos\u003C/code\u003E\u003C/td\u003E\n\u003Ctd style=\"text-align: left;\"\u003EDirect repo mapping\u003C/td\u003E\n\u003Ctd style=\"text-align: left;\"\u003E\u003Ccode\u003Eecosystem_id\u003C/code\u003E, \u003Ccode\u003Erepo_id\u003C/code\u003E\u003C/td\u003E\n\u003C/tr\u003E\n\u003Ctr\u003E\n\u003Ctd style=\"text-align: left;\"\u003E\u003Ccode\u003Estg_opendevdata__ecosystems_repos_recursive\u003C/code\u003E\u003C/td\u003E\n\u003Ctd style=\"text-align: left;\"\u003ERecursive repo mapping\u003C/td\u003E\n\u003Ctd style=\"text-align: left;\"\u003E\u003Ccode\u003Eecosystem_id\u003C/code\u003E, \u003Ccode\u003Erepo_id\u003C/code\u003E, \u003Ccode\u003Edistance\u003C/code\u003E, \u003Ccode\u003Epath\u003C/code\u003E\u003C/td\u003E\n\u003C/tr\u003E\n\u003C/tbody\u003E\n\u003C/table\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "1ee3d5a572a0366f2f6717a6bfca1a43", "console": [], "id": "bkHC", "outputs": [{"data": {"text/html": "\u003Cmarimo-mermaid data-diagram='\u0026quot;\u0026#92;ngraph TD\u0026#92;n    A[stg_opendevdata__ecosystems\u0026lt;br/\u0026gt;Definitions: name, flags] --\u0026gt; D\u0026#92;n    B[stg_opendevdata__ecosystems_child_ecosystems\u0026lt;br/\u0026gt;Parent-child links] --\u0026gt; D\u0026#92;n    C[stg_opendevdata__ecosystems_repos\u0026lt;br/\u0026gt;Direct repo mapping] --\u0026gt; D\u0026#92;n    D[stg_opendevdata__ecosystems_repos_recursive\u0026lt;br/\u0026gt;Recursive repo mapping with distance + path]\u0026#92;n    D --\u0026gt; E[Bridge to GitHub Archive\u0026lt;br/\u0026gt;via int_opendevdata__repositories_with_repo_id]\u0026#92;n\u0026quot;'\u003E\u003C/marimo-mermaid\u003E"}, "type": "data"}]}, {"code_hash": "463bdf824b5301b0ac5108e676956562", "console": [], "id": "lEQa", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Ch2 id=\"working-with-recursive-repository-mappings\"\u003EWorking with Recursive Repository Mappings\u003C/h2\u003E\n\u003Cspan class=\"paragraph\"\u003EThe \u003Ccode\u003Eoso.stg_opendevdata__ecosystems_repos_recursive\u003C/code\u003E table is the primary tool for mapping repositories to ecosystems. It resolves the hierarchy so you don't have to traverse parent-child links yourself.\u003C/span\u003E\n\u003Ch3 id=\"key-fields\"\u003EKey Fields\u003C/h3\u003E\n\u003Cul\u003E\n\u003Cli\u003E\u003Cstrong\u003E\u003Ccode\u003Eecosystem_id\u003C/code\u003E\u003C/strong\u003E: The ID of the ecosystem\u003C/li\u003E\n\u003Cli\u003E\u003Cstrong\u003E\u003Ccode\u003Erepo_id\u003C/code\u003E\u003C/strong\u003E: The ID of the repository\u003C/li\u003E\n\u003Cli\u003E\u003Cstrong\u003E\u003Ccode\u003Edistance\u003C/code\u003E\u003C/strong\u003E: Depth of the relationship (0 = direct, 1 = one level of nesting, etc.)\u003C/li\u003E\n\u003Cli\u003E\u003Cstrong\u003E\u003Ccode\u003Epath\u003C/code\u003E\u003C/strong\u003E: The lineage path from the repo's immediate ecosystem up to the queried ecosystem\u003C/li\u003E\n\u003C/ul\u003E\n\u003Ch3 id=\"when-to-use-each-model\"\u003EWhen to Use Each Model\u003C/h3\u003E\n\u003Ctable\u003E\n\u003Cthead\u003E\n\u003Ctr\u003E\n\u003Cth style=\"text-align: left;\"\u003EUse Case\u003C/th\u003E\n\u003Cth style=\"text-align: left;\"\u003EModel\u003C/th\u003E\n\u003Cth style=\"text-align: left;\"\u003EWhy\u003C/th\u003E\n\u003C/tr\u003E\n\u003C/thead\u003E\n\u003Ctbody\u003E\n\u003Ctr\u003E\n\u003Ctd style=\"text-align: left;\"\u003EAll repos in an ecosystem (including nested children)\u003C/td\u003E\n\u003Ctd style=\"text-align: left;\"\u003E\u003Ccode\u003Eecosystems_repos_recursive\u003C/code\u003E\u003C/td\u003E\n\u003Ctd style=\"text-align: left;\"\u003EResolves full hierarchy automatically\u003C/td\u003E\n\u003C/tr\u003E\n\u003Ctr\u003E\n\u003Ctd style=\"text-align: left;\"\u003EOnly directly-owned repos\u003C/td\u003E\n\u003Ctd style=\"text-align: left;\"\u003E\u003Ccode\u003Eecosystems_repos\u003C/code\u003E\u003C/td\u003E\n\u003Ctd style=\"text-align: left;\"\u003ENo hierarchy traversal, direct mapping only\u003C/td\u003E\n\u003C/tr\u003E\n\u003Ctr\u003E\n\u003Ctd style=\"text-align: left;\"\u003ENavigate the ecosystem tree\u003C/td\u003E\n\u003Ctd style=\"text-align: left;\"\u003E\u003Ccode\u003Eecosystems_child_ecosystems\u003C/code\u003E\u003C/td\u003E\n\u003Ctd style=\"text-align: left;\"\u003EExplore parent-child relationships\u003C/td\u003E\n\u003C/tr\u003E\n\u003C/tbody\u003E\n\u003C/table\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "394d04689a801a039a6e36a85d97560e", "console": [], "id": "PKri", "outputs": [{"data": {"text/html": "\u003Cmarimo-accordion data-labels='[\u0026quot;\u0026lt;span class=\u0026#92;\u0026quot;markdown prose dark:prose-invert contents\u0026#92;\u0026quot;\u0026gt;\u0026lt;span class=\u0026#92;\u0026quot;paragraph\u0026#92;\u0026quot;\u0026gt;oso.stg_opendevdata__ecosystems | 13,294 rows, 13 cols\u0026lt;/span\u0026gt;\u0026lt;/span\u0026gt;\u0026quot;]' data-multiple='false'\u003E\u003Cdiv\u003E\u003Cdiv style='display: flex;flex: 1;flex-direction: column;justify-content: flex-start;align-items: normal;flex-wrap: nowrap;gap: 0.5rem'\u003E\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u0
