    <script data-marimo="true">
      function __resizeIframe(obj) {
        const scrollbarHeight = 20; // Max between windows, mac, and linux

        function setHeight() {
          // Guard against race condition where iframe isn't ready
          if (!obj.contentWindow?.document?.documentElement) {
            return;
          }
          const element = obj.contentWindow.document.documentElement;
          // If there is no vertical scrollbar, we don't need to resize the iframe
          if (element.scrollHeight === element.clientHeight) {
            return;
          }

          // Create a new height that includes the scrollbar height if it's visible
          const hasHorizontalScrollbar = element.scrollWidth > element.clientWidth;
          const newHeight = element.scrollHeight + (hasHorizontalScrollbar ? scrollbarHeight : 0);

          // Only update the height if it's different from the current height
          if (obj.style.height !== `${newHeight}px`) {
            obj.style.height = `${newHeight}px`;
          }
        }

        // Resize the iframe to the height of the content and bottom scrollbar height
        setHeight();

        // Resize the iframe when the content changes
        const resizeObserver = new ResizeObserver((_entries) => {
          setHeight();
        });
        // Only observe if iframe content is ready
        if (obj.contentWindow?.document?.body) {
          resizeObserver.observe(obj.contentWindow.document.body);
        }
      }
    </script>

/* Source: base.css + _data.css */

/*
 * DDP Notebook Base Styles
 *
 * Shared foundation for all marimo notebooks in the Developer Data Portal.
 * This file is concatenated with variant partials (_root.css, _data.css,
 * _insights.css) by scripts/build_css.py to produce self-contained CSS files.
 *
 * Font: System stack — matches the Next.js shell exactly. Overrides marimo's
 * default PT Sans to eliminate the visual mismatch between sidebar and content.
 *
 * Color provenance (update both here and app/app/globals.css if colors change):
 *   - Chart palette: --ddp-primary, --ddp-secondary, --ddp-tertiary
 *   - Shell accent: --ddp-accent (indigo-600, shared with Tailwind config)
 *   - Slate scale: --ddp-text, --ddp-border, etc. (Tailwind slate palette)
 */

/* === Custom Properties === */
:root {
  --ddp-font: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen',
    'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue', sans-serif;
  --ddp-font-mono: 'Fira Mono', 'Fira Code', ui-monospace, monospace;
  --ddp-primary: #4C78A8;
  --ddp-secondary: #F58518;
  --ddp-tertiary: #72B7B2;
  --ddp-text: #0f172a;
  --ddp-text-muted: #64748b;
  --ddp-bg: #ffffff;
  --ddp-border: #e2e8f0;
  --ddp-surface: #f8fafc;
  --ddp-accent: #4f46e5;
}

/* === Nuclear font override ===
 * Marimo components use inline styles and deeply nested React elements.
 * A targeted selector list can't catch them all. The universal selector
 * with !important is the only way to guarantee the system font everywhere. */
*, *::before, *::after {
  box-sizing: border-box;
  font-family: var(--ddp-font) !important;
}
code, code *, pre, pre *, .cm-editor, .cm-editor * {
  font-family: var(--ddp-font-mono) !important;
}

/* === Content width ===
 * Global max-width for all cell output so tables, charts, markdown,
 * and stat cards align to the same column. Root variant narrows to 720px. */
#root [data-cell-id] > div {
  max-width: 1100px !important;
}

/* === Base === */
body {
  margin: 0;
  padding: 0;
  font-size: 14px;
  line-height: 1.5;
  color: var(--ddp-text);
  background: var(--ddp-bg);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

/* === Headings ===
 * Weight 600 (semibold) throughout — quieter than marimo's 700-800 defaults.
 * Tight letter-spacing for a modern, dense feel. .prose targets marimo's
 * Tailwind Typography wrapper around markdown output. */
h1, .prose h1 {
  font-weight: 600 !important;
  line-height: 1.25 !important;
  letter-spacing: -0.02em !important;
  color: var(--ddp-text) !important;
}
h2, .prose h2 {
  font-weight: 600 !important;
  line-height: 1.3 !important;
  letter-spacing: -0.01em !important;
  color: var(--ddp-text) !important;
}
h3, .prose h3 {
  font-weight: 600 !important;
  line-height: 1.35 !important;
  color: var(--ddp-text) !important;
}

/* === Body text === */
p, li, .prose p, .prose li {
  line-height: 1.5 !important;
  color: var(--ddp-text) !important;
  font-size: inherit !important;
}

small, .text-muted {
  color: var(--ddp-text-muted);
}

/* === Inline code === */
code {
  font-size: 0.8125em;
  background: var(--ddp-surface);
  padding: 0.15em 0.4em;
  border-radius: 3px;
  color: var(--ddp-text);
}
.prose code {
  font-size: 0.8125em !important;
  background: var(--ddp-surface) !important;
  color: var(--ddp-text) !important;
}

/* === Code blocks (GitHub-style: subtle bg, no border) === */
pre code {
  display: block;
  padding: 0.85em 1em;
  overflow-x: auto;
  background: #f6f8fa;
  border: none;
  border-radius: 6px;
  font-size: 0.8125em;
  line-height: 1.55;
}

/* === Links === */
a {
  color: var(--ddp-accent);
  text-decoration: none;
}
a:hover {
  text-decoration: underline;
}

/* === Scrollbar === */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: #9ca3af; }

/* === Tables === */
table {
  width: 100%;
  border-collapse: collapse;
  font-size: 0.8125em;
}
th {
  text-align: left;
  padding: 6px 10px;
  border-bottom: 1px solid var(--ddp-border);
  color: var(--ddp-text-muted);
  font-weight: 500;
  font-size: 0.8125em;
  text-transform: uppercase;
  letter-spacing: 0.03em;
}
td {
  padding: 6px 10px;
  border-bottom: 1px solid var(--ddp-border);
  color: var(--ddp-text);
}

/* === Marimo stat cards ===
 * Normalize the oversized stat values and labels to feel like
 * part of the same app as the sidebar. */
/* Equal-height stat cards: stretch within flex row, clamp long values */
[data-testid="marimo-stat"] {
  border-color: var(--ddp-border) !important;
  border-radius: 6px !important;
  align-self: stretch !important;
  min-height: 0 !important;
}
[data-testid="marimo-stat"] > div {
  height: 100% !important;
}
[data-testid="marimo-stat"] [class*="label"],
[data-testid="marimo-stat"] [class*="Label"] {
  font-size: 0.75em !important;
  font-weight: 500 !important;
  color: var(--ddp-text-muted) !important;
  text-transform: uppercase !important;
  letter-spacing: 0.03em !important;
}
[data-testid="marimo-stat"] [class*="value"],
[data-testid="marimo-stat"] [class*="Value"] {
  font-size: clamp(1em, 4vw, 1.5em) !important;
  font-weight: 600 !important;
  letter-spacing: -0.02em !important;
  color: var(--ddp-text) !important;
  overflow-wrap: break-word !important;
  word-break: break-word !important;
  line-height: 1.2 !important;
}
[data-testid="marimo-stat"] [class*="caption"],
[data-testid="marimo-stat"] [class*="Caption"] {
  font-size: 0.75em !important;
  color: var(--ddp-text-muted) !important;
}

/* === Marimo tables (data grid) === */
[data-testid="marimo-table"] th,
[class*="TableHeader"] th {
  font-size: 0.6875em !important;
  font-weight: 500 !important;
  text-transform: uppercase !important;
  letter-spacing: 0.04em !important;
  color: var(--ddp-text-muted) !important;
}

/* === Marimo UI elements === */
select, button, input {
  font-size: 0.8125em !important;
}

/* === Plotly chart overrides ===
 * Plotly uses inline SVG text — we can't override font-family on those,
 * but we can normalize the container spacing. */
.js-plotly-plot {
  max-width: 100%;
  margin: 0.5em 0;
}

/* === Mobile: Tablet === */
@media (max-width: 768px) {
  #root {
    padding-left: 12px !important;
    padding-right: 12px !important;
  }

  table {
    display: block;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
  }

  .marimo-output .flex-row {
    flex-direction: column !important;
  }
}

/* === Mobile: Phone === */
@media (max-width: 480px) {
  .marimo-output .flex-row {
    flex-direction: column !important;
    gap: 0.5rem !important;
  }
}


/* === Data variant overrides === */

/*
 * DDP Data Notebook Overrides
 * For: data/sources/*.py, data/models/*.py, data/metric-definitions/*.py
 * Reference/documentation style with table-heavy content.
 */

/* Zebra striping for tables */
tbody tr:nth-child(even) {
  background: var(--ddp-surface);
}

/* Code blocks in documentation */
pre code {
  font-size: 0.8125em;
  line-height: 1.6;
}

/* Mermaid diagram container */
.marimo-output svg.mermaid {
  display: block;
  max-width: 600px;
  margin: 1em auto;
}

/* Accordion previews (render_table_preview) */
details {
  border: 1px solid var(--ddp-border);
  border-radius: 6px;
  margin: 0.5em 0;
  overflow: hidden;
}
details summary {
  font-weight: 600;
  font-size: 0.9em;
  padding: 0.6em 1em;
  background: var(--ddp-surface);
  cursor: pointer;
}
details > div {
  padding: 0.5em 1em;
}

/* Field documentation tables */
table th {
  background: var(--ddp-surface);
  white-space: nowrap;
}

nfig": {"column": null, "disabled": false, "hide_code": true}, "id": "aLJB", "name": "_"}, {"code": "", "code_hash": "63dce9bf7ee47721b416dd939d0a2308", "config": {"column": null, "disabled": false, "hide_code": true}, "id": "nHfw", "name": "_"}, {"code": "", "code_hash": "5b7b5bb2438509d88ba0a1d77df55c54", "config": {"column": null, "disabled": false, "hide_code": true}, "id": "xXTn", "name": "_"}, {"code": "", "code_hash": "ee8ea7e72d72b85111c3b07a0992c62a", "config": {"column": null, "disabled": false, "hide_code": true}, "id": "AjVT", "name": "_"}, {"code": "", "code_hash": "1ec5a1990ce6e0b4d3832e7c79f70437", "config": {"column": null, "disabled": false, "hide_code": true}, "id": "pHFh", "name": "_"}, {"code": "", "code_hash": "e4d2b2c6b63c21090c229b599d497cfc", "config": {"column": null, "disabled": false, "hide_code": true}, "id": "NCOB", "name": "_"}, {"code": "", "code_hash": "97f5f1f1654c5037ae9fa583b616ff90", "config": {"column": null, "disabled": false, "hide_code": true}, "id": "aqbW", "name": "_"}, {"code": "", "code_hash": "8574892d01533a1d3af8ddf7b49d1fea", "config": {"column": null, "disabled": false, "hide_code": true}, "id": "TRpd", "name": "_"}, {"code": "", "code_hash": "61df521b9f1381cafcb322f5a10b5c44", "config": {"column": null, "disabled": false, "hide_code": true}, "id": "TXez", "name": "_"}, {"code": "", "code_hash": "d42bd28ac4e842cdbaff74d56525eb8e", "config": {"column": null, "disabled": false, "hide_code": true}, "id": "dNNg", "name": "_"}, {"code": "", "code_hash": "88427dda1e621758c83ffe268ef228ce", "config": {"column": null, "disabled": false, "hide_code": true}, "id": "yCnT", "name": "_"}, {"code": "", "code_hash": "2816b57213c5521edd6dc4467a67dfe6", "config": {"column": null, "disabled": false, "hide_code": true}, "id": "wlCL", "name": "_"}, {"code": "", "code_hash": "8182e7ad1b8315c28037350eb7ff1d92", "config": {"column": null, "disabled": false, "hide_code": true}, "id": "kqZH", "name": "_"}, {"code": "", "code_hash": "ca44f5496e70fc51d1cad15af059dad6", "config": {"column": null, "disabled": false, "hide_code": true}, "id": "wAgl", "name": "_"}, {"code": "", "code_hash": "ffeb30114ac92e6bba6cfb423dd58c13", "config": {"column": null, "disabled": false, "hide_code": true}, "id": "rEll", "name": "_"}, {"code": "", "code_hash": "71be4f141998b096a0f37c660b1c5e14", "config": {"column": null, "disabled": false, "hide_code": false}, "id": "dGlV", "name": "_"}], "metadata": {"marimo_version": "0.18.4"}, "version": "1"},
            "session": {"cells": [{"code_hash": "bd754dde7d8ec2852906fe32635015e0", "console": [], "id": "Hbol", "outputs": [{"data": {"text/plain": ""}, "type": "data"}]}, {"code_hash": "669dca5e990a7feb6204f412f2a6540a", "console": [], "id": "MJUe", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Ch1 id=\"github-events-model\"\u003EGitHub Events Model\u003C/h1\u003E\n\u003Cspan class=\"paragraph\"\u003EThis notebook documents GitHub event data in OSO, explaining where it comes from, how it's\ntransformed, and how to use it for developer activity analysis.\u003C/span\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "232fa213cc738bd615e8358e414f7ab6", "console": [], "id": "vblA", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Ch2 id=\"overview\"\u003EOverview\u003C/h2\u003E\n\u003Cspan class=\"paragraph\"\u003EOSO tracks developer activity from two complementary sources:\n\u003Ca href=\"https://www.gharchive.org/\" rel=\"noopener noreferrer\" target=\"_blank\"\u003EGitHub Archive\u003C/a\u003E (GHA) and\n\u003Ca href=\"https://opendevdata.org/\" rel=\"noopener noreferrer\" target=\"_blank\"\u003EOpen Dev Data\u003C/a\u003E (ODD). Both are linked through a shared\n\u003Ccode\u003Erepo_id\u003C/code\u003E (GitHub REST API repository ID), enabling cross-source joins and\necosystem-level analysis.\u003C/span\u003E\n\u003Ctable\u003E\n\u003Cthead\u003E\n\u003Ctr\u003E\n\u003Cth\u003ESource\u003C/th\u003E\n\u003Cth\u003ECoverage\u003C/th\u003E\n\u003Cth\u003EStrengths\u003C/th\u003E\n\u003C/tr\u003E\n\u003C/thead\u003E\n\u003Ctbody\u003E\n\u003Ctr\u003E\n\u003Ctd\u003E\u003Cstrong\u003EGitHub Archive\u003C/strong\u003E\u003C/td\u003E\n\u003Ctd\u003EAll event types\u003C/td\u003E\n\u003Ctd\u003EBroad activity coverage (PRs, issues, reviews, stars, forks), real-time public timeline\u003C/td\u003E\n\u003C/tr\u003E\n\u003Ctr\u003E\n\u003Ctd\u003E\u003Cstrong\u003EOpen Dev Data\u003C/strong\u003E\u003C/td\u003E\n\u003Ctd\u003ECommits only\u003C/td\u003E\n\u003Ctd\u003EIdentity resolution, code churn metrics (additions/deletions), Git history analysis\u003C/td\u003E\n\u003C/tr\u003E\n\u003C/tbody\u003E\n\u003C/table\u003E\n\u003Cspan class=\"paragraph\"\u003EThis notebook defines the \u003Cstrong\u003Eunified event model\u003C/strong\u003E \u2014 a complete view of developer\nactivity that combines data from both sources. GHA alone has known gaps:\u003C/span\u003E\n\u003Cul\u003E\n\u003Cli\u003E\u003Ccode\u003EPushEvent\u003C/code\u003E payloads are capped at \u003Cstrong\u003E20 commits\u003C/strong\u003E per event\u003C/li\u003E\n\u003Cli\u003ESince \u003Cstrong\u003E2025-10-07\u003C/strong\u003E, GHA stopped providing commit payload data entirely\u003C/li\u003E\n\u003C/ul\u003E\n\u003Cspan class=\"paragraph\"\u003EThe unified event model addresses these gaps by enriching GHA events with ODD data\nwhere available. For commit events specifically, the unified commit model\n(\u003Ccode\u003Eint_ddp__commits_unified\u003C/code\u003E) provides identity-resolved authorship and code churn\nmetrics \u2014 see commits.py for details.\u003C/span\u003E\n\u003Cspan class=\"paragraph\"\u003EDownstream metrics (MAD, activity rollups, ecosystem comparisons) depend on accurate\nevent data, so the unified models are the correct foundation for all developer\nactivity analysis.\u003C/span\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "125c9e505fc3f1f1534a9f4af2f7705b", "console": [], "id": "bkHC", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Ch3 id=\"data-freshness-completeness\"\u003EData Freshness \u0026amp; Completeness\u003C/h3\u003E\n\u003Cul\u003E\n\u003Cli\u003E\u003Cstrong\u003EFreshness\u003C/strong\u003E: GitHub Archive data is up to \u003Cstrong\u003E3 days behind\u003C/strong\u003E real-time. The staging model\n  (\u003Ccode\u003Estg_github__events\u003C/code\u003E) shifts the query window back by 3 days to avoid querying BigQuery\n  tables that don't yet exist\n  (\u003Ca href=\"../../../../../../oso/warehouse/oso_sqlmesh/models/staging/github/stg_github__events.py#L114-L117\"\u003Esource\u003C/a\u003E).\u003C/li\u003E\n\u003Cli\u003E\u003Cstrong\u003ECompleteness\u003C/strong\u003E: GitHub Archive captures the public GitHub timeline only. Private\n  repositories and deleted events are not included.\u003C/li\u003E\n\u003C/ul\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "d3f332032aa42d8a707c88befc053545", "console": [], "id": "lEQa", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Ch2 id=\"data-lineage\"\u003EData Lineage\u003C/h2\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "9f7478918a3175e32076e77194573a54", "console": [], "id": "PKri", "outputs": [{"data": {"text/html": "\u003Cmarimo-mermaid data-diagram='\u0026quot;\u0026#92;ngraph TD\u0026#92;n    subgraph sources[\u0026#92;\u0026quot;Sources\u0026#92;\u0026quot;]\u0026#92;n        GHA[\u0026#92;\u0026quot;stg_github__events\u0026lt;br/\u0026gt;\u0026lt;i\u0026gt;raw, nested\u0026lt;/i\u0026gt;\u0026#92;\u0026quot;]\u0026#92;n        ODD[\u0026#92;\u0026quot;stg_opendevdata__commits\u0026lt;br/\u0026gt;\u0026lt;i\u0026gt;identity-resolved\u0026lt;/i\u0026gt;\u0026#92;\u0026quot;]\u0026#92;n    end\u0026#92;n\u0026#92;n    subgraph staging[\u0026#92;\u0026quot;GHA Staging\u0026#92;\u0026quot;]\u0026#92;n        REL[\u0026#92;\u0026quot;stg_github__releases\u0026#92;\u0026quot;]\u0026#92;n        COM[\u0026#92;\u0026quot;stg_github__comments\u0026#92;\u0026quot;]\u0026#92;n        ISS[\u0026#92;\u0026quot;stg_github__issues\u0026#92;\u0026quot;]\u0026#92;n        PR[\u0026#92;\u0026quot;stg_github__pull_requests\u0026#92;\u0026quot;]\u0026#92;n        SF[\u0026#92;\u0026quot;stg_github__stars_and_forks\u0026#92;\u0026quot;]\u0026#92;n    end\u0026#92;n\u0026#92;n    BRIDGE[\u0026#92;\u0026quot;int_opendevdata__repositories_with_repo_id\u0026lt;br/\u0026gt;\u0026lt;i\u0026gt;maps ODD repo IDs \u2192 GitHub repo_id\u0026lt;/i\u0026gt;\u0026#92;\u0026quot;]\u0026#92;n    DEDUP[\u0026#92;\u0026quot;int_ddp__commits_deduped\u0026lt;br/\u0026gt;\u0026lt;i\u0026gt;GHA + ODD merged, 1 row per sha + repo_id\u0026lt;/i\u0026gt;\u0026#92;\u0026quot;]\u0026#92;n\u0026#92;n    subgraph unified[\u0026#92;\u0026quot;Unified Pipeline\u0026#92;\u0026quot;]\u0026#92;n        EVENTS[\u0026#92;\u0026quot;int_events__github_unified\u0026lt;br/\u0026gt;\u0026lt;i\u0026gt;COMMIT_CODE + all other event types\u0026lt;/i\u0026gt;\u0026#92;\u0026quot;]\u0026#92;n        DAILY[\u0026#92;\u0026quot;int_events_daily__github_unified\u0026#92;\u0026quot;]\u0026#92;n    end\u0026#92;n\u0026#92;n    METRICS[\u0026#92;\u0026quot;oso_metrics/code/*\u0026lt;br/\u0026gt;\u0026lt;i\u0026gt;18 metric definitions\u0026lt;/i\u0026gt;\u0026#92;\u0026quot;]\u0026#92;n\u0026#92;n    GHA --\u0026gt; staging\u0026#92;n    ODD --\u0026gt; BRIDGE\u0026#92;n    BRIDGE --\u0026gt; DEDUP\u0026#92;n    GHA --\u0026gt; DEDUP\u0026#92;n    DEDUP --\u0026gt; EVENTS\u0026#92;n    REL --\u0026gt; EVENTS\u0026#92;n    COM --\u0026gt; EVENTS\u0026#92;n    ISS --\u0026gt; EVENTS\u0026#92;n    PR --\u0026gt; EVENTS\u0026#92;n    SF --\u0026gt; EVENTS\u0026#92;n    EVENTS --\u0026gt; DAILY\u0026#92;n    DAILY --\u0026gt; METRICS\u0026#92;n\u0026#92;n    style EVENTS fill:#4C78A8,color:#fff\u0026#92;n    style DAILY fill:#4C78A8,color:#fff\u0026#92;n    style DEDUP fill:#F58518,color:#fff\u0026#92;n\u0026quot;'\u003E\u003C/marimo-mermaid\u003E"}, "type": "data"}]}, {"code_hash": "2ddd895ac2c7cbe4a9c9dd7fea5c60c1", "console": [], "id": "Xref", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Ch3 id=\"existing-models\"\u003EExisting Models\u003C/h3\u003E\n\u003Cspan class=\"paragraph\"\u003E\u003Cstrong\u003EDDP Pipeline:\u003C/strong\u003E\u003C/span\u003E\n\u003Cul\u003E\n\u003Cli\u003E\u003Cstrong\u003E\u003Ccode\u003Eoso.stg_github__events\u003C/code\u003E\u003C/strong\u003E: Raw GitHub Archive events with nested \u003Ccode\u003Erepo\u003C/code\u003E and \u003Ccode\u003Eactor\u003C/code\u003E fields,\n  plus JSON \u003Ccode\u003Epayload\u003C/code\u003E.\u003C/li\u003E\n\u003Cli\u003E\u003Cstrong\u003E\u003Ccode\u003Eoso.int_gharchive__github_events\u003C/code\u003E\u003C/strong\u003E: Standardized projection with flat columns. Contains\n  all event types but at PushEvent grain (not commit grain).\u003C/li\u003E\n\u003Cli\u003E\u003Cstrong\u003E\u003Ccode\u003Eoso.int_ddp_github_events\u003C/code\u003E\u003C/strong\u003E: Filtered to \u003Ccode\u003EPushEvent\u003C/code\u003E and \u003Ccode\u003EWatchEvent\u003C/code\u003E.\u003C/li\u003E\n\u003Cli\u003E\u003Cstrong\u003E\u003Ccode\u003Eoso.int_ddp_github_events_daily\u003C/code\u003E\u003C/strong\u003E: Daily aggregation with normalized event type buckets.\u003C/li\u003E\n\u003Cli\u003E\u003Cstrong\u003E\u003Ccode\u003Eoso.int_gharchive__developer_activities\u003C/code\u003E\u003C/strong\u003E: MAD rollup (PushEvent + PullRequestEvent).\u003C/li\u003E\n\u003C/ul\u003E\n\u003Cspan class=\"paragraph\"\u003E\u003Cstrong\u003ECross-source models:\u003C/strong\u003E\u003C/span\u003E\n\u003Cul\u003E\n\u003Cli\u003E\u003Cstrong\u003E\u003Ccode\u003Eoso.int_opendevdata__repositories_with_repo_id\u003C/code\u003E\u003C/strong\u003E: Bridge model mapping ODD repository IDs\n  to GitHub \u003Ccode\u003Erepo_id\u003C/code\u003E, enabling cross-source joins.\u003C/li\u003E\n\u003C/ul\u003E\n\u003Cspan class=\"paragraph\"\u003E\u003Cstrong\u003EUnified commit models:\u003C/strong\u003E\u003C/span\u003E\n\u003Cul\u003E\n\u003Cli\u003E\u003Cstrong\u003E\u003Ccode\u003Eoso.int_ddp__commits_unified\u003C/code\u003E\u003C/strong\u003E: GHA commits enriched with ODD metadata where available,\n  plus ODD-only commits not in GHA. Provides \u003Ccode\u003Eauthor_id\u003C/code\u003E, \u003Ccode\u003Ecanonical_developer_id\u003C/code\u003E, additions,\n  and deletions.\u003C/li\u003E\n\u003Cli\u003E\u003Cstrong\u003E\u003Ccode\u003Eoso.int_ddp__commits_deduped\u003C/code\u003E\u003C/strong\u003E: Deduplicated \u2014 one row per \u003Ccode\u003E(sha, repository_id)\u003C/code\u003E.\u003C/li\u003E\n\u003C/ul\u003E\n\u003Ch3 id=\"int_events__github_unified\"\u003E\u003Ccode\u003Eint_events__github_unified\u003C/code\u003E\u003C/h3\u003E\n\u003Cspan class=\"paragraph\"\u003EUNION ALL of unified commits with all other GHA event types:\u003C/span\u003E\n\u003Ctable\u003E\n\u003Cthead\u003E\n\u003Ctr\u003E\n\u003Cth\u003EEvent Source\u003C/th\u003E\n\u003Cth\u003EModel\u003C/th\u003E\n\u003Cth\u003EGrain\u003C/th\u003E\n\u003C/tr\u003E\n\u003C/thead\u003E\n\u003Ctbody\u003E\n\u003Ctr\u003E\n\u003Ctd\u003E\u003Cstrong\u003ECommits\u003C/strong\u003E\u003C/td\u003E\n\u003Ctd\u003E\u003Ccode\u003Eint_ddp__commits_deduped\u003C/code\u003E\u003C/td\u003E\n\u003Ctd\u003EOne row per commit (GHA + ODD merged, deduped)\u003C/td\u003E\n\u003C/tr\u003E\n\u003Ctr\u003E\n\u003Ctd\u003E\u003Cstrong\u003EReleases\u003C/strong\u003E\u003C/td\u003E\n\u003Ctd\u003E\u003Ccode\u003Estg_github__releases\u003C/code\u003E\u003C/td\u003E\n\u003Ctd\u003EOne row per release\u003C/td\u003E\n\u003C/tr\u003E\n\u003Ctr\u003E\n\u003Ctd\u003E\u003Cstrong\u003EComments\u003C/strong\u003E\u003C/td\u003E\n\u003Ctd\u003E\u003Ccode\u003Estg_github__comments\u003C/code\u003E\u003C/td\u003E\n\u003Ctd\u003EOne row per comment\u003C/td\u003E\n\u003C/tr\u003E\n\u003Ctr\u003E\n\u003Ctd\u003E\u003Cstrong\u003EIssues\u003C/strong\u003E\u003C/td\u003E\n\u003Ctd\u003E\u003Ccode\u003Estg_github__issues\u003C/code\u003E\u003C/td\u003E\n\u003Ctd\u003EOne row per issue event\u003C/td\u003E\n\u003C/tr\u003E\n\u003Ctr\u003E\n\u003Ctd\u003E\u003Cstrong\u003EPull Requests\u003C/strong\u003E\u003C/td\u003E\n\u003Ctd\u003E\u003Ccode\u003Estg_github__pull_req 26quot;multi\u0026quot;' data-show-filters='true' data-show-download='true' data-show-column-summaries='false' data-show-data-types='false' data-show-page-size-selector='false' data-show-column-explorer='true' data-show-chart-builder='true' data-row-headers='[]' data-has-stable-row-id='true' data-lazy='false' data-preload='false'\u003E\u003C/marimo-table\u003E\u003C/marimo-ui-element\u003E\u003C/div\u003E\u003C/div\u003E\u003C/marimo-accordion\u003E"}, "type": "data"}]}, {"code_hash": "10d333cb7b2cb6672a0239bd4ce9d9ff", "console": [], "id": "Hstk", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Ch2 id=\"deriving-developer-metrics\"\u003EDeriving Developer Metrics\u003C/h2\u003E\n\u003Cspan class=\"paragraph\"\u003EThe daily aggregation model \u003Ccode\u003Eint_events_daily__github_unified\u003C/code\u003E is the building block for\ndeveloper metrics like Monthly Active Developers (MAD). Filter by \u003Ccode\u003Eevent_type\u003C/code\u003E to define\nwhat counts as \"developer activity.\"\u003C/span\u003E\n\u003Ch3 id=\"common-activity-definitions\"\u003ECommon Activity Definitions\u003C/h3\u003E\n\u003Ctable\u003E\n\u003Cthead\u003E\n\u003Ctr\u003E\n\u003Cth\u003EDefinition\u003C/th\u003E\n\u003Cth\u003EEvent Types Included\u003C/th\u003E\n\u003C/tr\u003E\n\u003C/thead\u003E\n\u003Ctbody\u003E\n\u003Ctr\u003E\n\u003Ctd\u003ECode contributors\u003C/td\u003E\n\u003Ctd\u003E\u003Ccode\u003ECOMMIT_CODE\u003C/code\u003E\u003C/td\u003E\n\u003C/tr\u003E\n\u003Ctr\u003E\n\u003Ctd\u003ECode + review contributors\u003C/td\u003E\n\u003Ctd\u003E\u003Ccode\u003ECOMMIT_CODE\u003C/code\u003E, \u003Ccode\u003EPULL_REQUEST_OPENED\u003C/code\u003E, \u003Ccode\u003EPULL_REQUEST_MERGED\u003C/code\u003E\u003C/td\u003E\n\u003C/tr\u003E\n\u003Ctr\u003E\n\u003Ctd\u003EAll active developers\u003C/td\u003E\n\u003Ctd\u003EAll event types\u003C/td\u003E\n\u003C/tr\u003E\n\u003C/tbody\u003E\n\u003C/table\u003E\n\u003Ch3 id=\"key-fields-for-activity-queries\"\u003EKey Fields for Activity Queries\u003C/h3\u003E\n\u003Cul\u003E\n\u003Cli\u003E\u003Cstrong\u003E\u003Ccode\u003Ebucket_day\u003C/code\u003E\u003C/strong\u003E: Date of activity\u003C/li\u003E\n\u003Cli\u003E\u003Cstrong\u003E\u003Ccode\u003Efrom_artifact_id\u003C/code\u003E\u003C/strong\u003E: Developer (hashed ID)\u003C/li\u003E\n\u003Cli\u003E\u003Cstrong\u003E\u003Ccode\u003Eto_artifact_id\u003C/code\u003E\u003C/strong\u003E: Repository (hashed ID)\u003C/li\u003E\n\u003Cli\u003E\u003Cstrong\u003E\u003Ccode\u003Eevent_type\u003C/code\u003E\u003C/strong\u003E: Filter to define your activity scope\u003C/li\u003E\n\u003Cli\u003E\u003Cstrong\u003E\u003Ccode\u003Eamount\u003C/code\u003E\u003C/strong\u003E: Count of events\u003C/li\u003E\n\u003C/ul\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "963d508913dcc89e401da0f3466b318e", "console": [], "id": "nWHF", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Cspan class=\"paragraph\"\u003ESee the \u003Cstrong\u003ESample Queries\u003C/strong\u003E section below for ready-to-use SQL for daily active developers,\ncustom activity rollups, and ecosystem-level filtering.\u003C/span\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "05ecd054bcb4091b58eeb643a2926bbd", "console": [], "id": "iLit", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Ch2 id=\"cross-source-enrichment\"\u003ECross-Source Enrichment\u003C/h2\u003E\n\u003Cspan class=\"paragraph\"\u003EThe unified model already merges GHA and ODD data at the commit level through\n\u003Ccode\u003Eint_ddp__commits_deduped\u003C/code\u003E. For \u003Ccode\u003ECOMMIT_CODE\u003C/code\u003E events, the underlying commits include:\u003C/span\u003E\n\u003Cul\u003E\n\u003Cli\u003E\u003Cstrong\u003EIdentity resolution\u003C/strong\u003E: \u003Ccode\u003Ecanonical_developer_id\u003C/code\u003E linking across Git emails and GitHub logins\u003C/li\u003E\n\u003Cli\u003E\u003Cstrong\u003ECode churn\u003C/strong\u003E: \u003Ccode\u003Eadditions\u003C/code\u003E and \u003Ccode\u003Edeletions\u003C/code\u003E per commit\u003C/li\u003E\n\u003Cli\u003E\u003Cstrong\u003EBot detection\u003C/strong\u003E: \u003Ccode\u003Eis_bot\u003C/code\u003E flag\u003C/li\u003E\n\u003Cli\u003E\u003Cstrong\u003ESource tracking\u003C/strong\u003E: \u003Ccode\u003Esource\u003C/code\u003E field indicating GHA, ODD, or both\u003C/li\u003E\n\u003C/ul\u003E\n\u003Cspan class=\"paragraph\"\u003EThese enriched fields are available in commits.py. The event model\nitself carries the standardized schema (\u003Ccode\u003Etime\u003C/code\u003E, \u003Ccode\u003Eevent_type\u003C/code\u003E, \u003Ccode\u003Efrom_artifact_*\u003C/code\u003E, \u003Ccode\u003Eto_artifact_*\u003C/code\u003E,\n\u003Ccode\u003Eamount\u003C/code\u003E) for consistent querying across all event types.\u003C/span\u003E\n\u003Cspan class=\"paragraph\"\u003ETo filter events by ecosystem, join through the repository and ecosystem mapping tables.\nSee repositories.py and ecosystems.py\nfor the bridge models.\u003C/span\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "d9555499ff61fe3149fcfdcf803121fe", "console": [], "id": "ZHCJ", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Ch2 id=\"how-events-are-unified\"\u003EHow Events Are Unified\u003C/h2\u003E\n\u003Cspan class=\"paragraph\"\u003EThe key difference between \u003Ccode\u003Eint_events__github_unified\u003C/code\u003E and a GHA-only events model is\nthe \u003Cstrong\u003Ecommit source\u003C/strong\u003E. Commits come from \u003Ccode\u003Eint_ddp__commits_deduped\u003C/code\u003E which merges GitHub\nArchive and Open Dev Data, deduped on \u003Ccode\u003E(sha, repository_id)\u003C/code\u003E. All other event types\n(releases, comments, issues, PRs, stars, forks) source from their standard GHA staging models.\u003C/span\u003E\n\u003Ch3 id=\"what-the-unified-commits-solve\"\u003EWhat the Unified Commits Solve\u003C/h3\u003E\n\u003Ctable\u003E\n\u003Cthead\u003E\n\u003Ctr\u003E\n\u003Cth\u003EProblem\u003C/th\u003E\n\u003Cth\u003EGHA-only\u003C/th\u003E\n\u003Cth\u003EUnified\u003C/th\u003E\n\u003C/tr\u003E\n\u003C/thead\u003E\n\u003Ctbody\u003E\n\u003Ctr\u003E\n\u003Ctd\u003E20-commit cap per PushEvent\u003C/td\u003E\n\u003Ctd\u003EUnder-counts commits in large pushes\u003C/td\u003E\n\u003Ctd\u003EODD fills in the missing commits\u003C/td\u003E\n\u003C/tr\u003E\n\u003Ctr\u003E\n\u003Ctd\u003ENo commit payloads post Oct 2025\u003C/td\u003E\n\u003Ctd\u003EOnly \u003Ccode\u003Ehead\u003C/code\u003E SHA, no commit array\u003C/td\u003E\n\u003Ctd\u003EODD provides full commit history\u003C/td\u003E\n\u003C/tr\u003E\n\u003Ctr\u003E\n\u003Ctd\u003EActor \u2260 Author\u003C/td\u003E\n\u003Ctd\u003E\u003Ccode\u003Eactor_id\u003C/code\u003E is the pusher, not the code author\u003C/td\u003E\n\u003Ctd\u003EODD resolves the actual commit author\u003C/td\u003E\n\u003C/tr\u003E\n\u003Ctr\u003E\n\u003Ctd\u003ENo code churn data\u003C/td\u003E\n\u003Ctd\u003ENo additions/deletions\u003C/td\u003E\n\u003Ctd\u003EODD provides per-commit additions and deletions\u003C/td\u003E\n\u003C/tr\u003E\n\u003C/tbody\u003E\n\u003C/table\u003E\n\u003Ch3 id=\"architecture\"\u003EArchitecture\u003C/h3\u003E\n\u003Cspan class=\"paragraph\"\u003EThe model UNION ALLs commits from \u003Ccode\u003Eint_ddp__commits_deduped\u003C/code\u003E with other event types\ninto a single table. Each source CTE maps its columns into the standard schema:\u003C/span\u003E\n\u003Cul\u003E\n\u003Cli\u003E\u003Cstrong\u003E\u003Ccode\u003Etime\u003C/code\u003E\u003C/strong\u003E \u2190 \u003Ccode\u003Ecreated_at\u003C/code\u003E (commits), \u003Ccode\u003Ecreated_at\u003C/code\u003E (other events)\u003C/li\u003E\n\u003Cli\u003E\u003Cstrong\u003E\u003Ccode\u003Eevent_source_id\u003C/code\u003E\u003C/strong\u003E \u2190 \u003Ccode\u003Esha\u003C/code\u003E (commits), \u003Ccode\u003Eid\u003C/code\u003E (other events)\u003C/li\u003E\n\u003Cli\u003E\u003Cstrong\u003E\u003Ccode\u003Efrom_artifact_name\u003C/code\u003E\u003C/strong\u003E \u2190 \u003Ccode\u003Eactor_login\u003C/code\u003E (the developer)\u003C/li\u003E\n\u003Cli\u003E\u003Cstrong\u003E\u003Ccode\u003Eto_artifact_name\u003C/code\u003E\u003C/strong\u003E \u2190 repository name\u003C/li\u003E\n\u003Cli\u003E\u003Cstrong\u003E\u003Ccode\u003Eamount\u003C/code\u003E\u003C/strong\u003E \u2190 always \u003Ccode\u003E1.0\u003C/code\u003E\u003C/li\u003E\n\u003C/ul\u003E\n\u003Cspan class=\"paragraph\"\u003EBecause \u003Ccode\u003Eint_ddp__commits_deduped\u003C/code\u003E covers the full date range (no gap post Oct 2025),\nthe unified model does not need a pre/post date split.\u003C/span\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "e4e753ad1ed851ddaa8f22173c18a9a7", "console": [], "id": "ROlb", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Ch2 id=\"live-data-exploration\"\u003ELive Data Exploration\u003C/h2\u003E\n\u003Cspan class=\"paragraph\"\u003EThe following charts show actual data from the event tables, filtered to a recent date range\nto demonstrate the data structure and typical patterns.\u003C/span\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "5925e769da176b7723439f696b454656", "console": [], "id": "qnkX", "outputs": [{"data": {"text/plain": ""}, "type": "data"}]}, {"code_hash": "4134f066acd9732587db3a466bc2e772", "console": [], "id": "TqIu", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Ch3 id=\"event-type-distribution-last-14-days\"\u003EEvent Type Distribution (Last 14 Days)\u003C/h3\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "d8756c79ae1e78eedc0775597820184f", "console": [], "id": "Vxnm", "outputs": [{"data": {"text/plain": ""}, "type": "data"}]},
