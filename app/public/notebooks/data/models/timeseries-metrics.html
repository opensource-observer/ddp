    <script data-marimo="true">
      function __resizeIframe(obj) {
        const scrollbarHeight = 20; // Max between windows, mac, and linux

        function setHeight() {
          // Guard against race condition where iframe isn't ready
          if (!obj.contentWindow?.document?.documentElement) {
            return;
          }
          const element = obj.contentWindow.document.documentElement;
          // If there is no vertical scrollbar, we don't need to resize the iframe
          if (element.scrollHeight === element.clientHeight) {
            return;
          }

          // Create a new height that includes the scrollbar height if it's visible
          const hasHorizontalScrollbar = element.scrollWidth > element.clientWidth;
          const newHeight = element.scrollHeight + (hasHorizontalScrollbar ? scrollbarHeight : 0);

          // Only update the height if it's different from the current height
          if (obj.style.height !== `${newHeight}px`) {
            obj.style.height = `${newHeight}px`;
          }
        }

        // Resize the iframe to the height of the content and bottom scrollbar height
        setHeight();

        // Resize the iframe when the content changes
        const resizeObserver = new ResizeObserver((_entries) => {
          setHeight();
        });
        // Only observe if iframe content is ready
        if (obj.contentWindow?.document?.body) {
          resizeObserver.observe(obj.contentWindow.document.body);
        }
      }
    </script>

/* Source: base.css + _data.css */

/*
 * DDP Notebook Base Styles
 *
 * Shared foundation for all marimo notebooks in the Developer Data Portal.
 * This file is concatenated with variant partials (_root.css, _data.css,
 * _insights.css) by scripts/build_css.py to produce self-contained CSS files.
 *
 * Font: System stack — matches the Next.js shell exactly. Overrides marimo's
 * default PT Sans to eliminate the visual mismatch between sidebar and content.
 *
 * Color provenance (update both here and app/app/globals.css if colors change):
 *   - Chart palette: --ddp-primary, --ddp-secondary, --ddp-tertiary
 *   - Shell accent: --ddp-accent (indigo-600, shared with Tailwind config)
 *   - Slate scale: --ddp-text, --ddp-border, etc. (Tailwind slate palette)
 */

/* === Custom Properties === */
:root {
  --ddp-font: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen',
    'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue', sans-serif;
  --ddp-font-mono: 'Fira Mono', 'Fira Code', ui-monospace, monospace;
  --ddp-primary: #4C78A8;
  --ddp-secondary: #F58518;
  --ddp-tertiary: #72B7B2;
  --ddp-text: #0f172a;
  --ddp-text-muted: #64748b;
  --ddp-bg: #ffffff;
  --ddp-border: #e2e8f0;
  --ddp-surface: #f8fafc;
  --ddp-accent: #4f46e5;
}

/* === Nuclear font override ===
 * Marimo components use inline styles and deeply nested React elements.
 * A targeted selector list can't catch them all. The universal selector
 * with !important is the only way to guarantee the system font everywhere. */
*, *::before, *::after {
  box-sizing: border-box;
  font-family: var(--ddp-font) !important;
}
code, code *, pre, pre *, .cm-editor, .cm-editor * {
  font-family: var(--ddp-font-mono) !important;
}

/* === Content width ===
 * Global max-width for all cell output so tables, charts, markdown,
 * and stat cards align to the same column. Root variant narrows to 720px. */
#root [data-cell-id] > div {
  max-width: 1100px !important;
}

/* === Base === */
body {
  margin: 0;
  padding: 0;
  font-size: 14px;
  line-height: 1.5;
  color: var(--ddp-text);
  background: var(--ddp-bg);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

/* === Headings ===
 * Weight 600 (semibold) throughout — quieter than marimo's 700-800 defaults.
 * Tight letter-spacing for a modern, dense feel. .prose targets marimo's
 * Tailwind Typography wrapper around markdown output. */
h1, .prose h1 {
  font-weight: 600 !important;
  line-height: 1.25 !important;
  letter-spacing: -0.02em !important;
  color: var(--ddp-text) !important;
}
h2, .prose h2 {
  font-weight: 600 !important;
  line-height: 1.3 !important;
  letter-spacing: -0.01em !important;
  color: var(--ddp-text) !important;
}
h3, .prose h3 {
  font-weight: 600 !important;
  line-height: 1.35 !important;
  color: var(--ddp-text) !important;
}

/* === Body text === */
p, li, .prose p, .prose li {
  line-height: 1.5 !important;
  color: var(--ddp-text) !important;
  font-size: inherit !important;
}

small, .text-muted {
  color: var(--ddp-text-muted);
}

/* === Inline code === */
code {
  font-size: 0.8125em;
  background: var(--ddp-surface);
  padding: 0.15em 0.4em;
  border-radius: 3px;
  color: var(--ddp-text);
}
.prose code {
  font-size: 0.8125em !important;
  background: var(--ddp-surface) !important;
  color: var(--ddp-text) !important;
}

/* === Code blocks (GitHub-style: subtle bg, no border) === */
pre code {
  display: block;
  padding: 0.85em 1em;
  overflow-x: auto;
  background: #f6f8fa;
  border: none;
  border-radius: 6px;
  font-size: 0.8125em;
  line-height: 1.55;
}

/* === Links === */
a {
  color: var(--ddp-accent);
  text-decoration: none;
}
a:hover {
  text-decoration: underline;
}

/* === Scrollbar === */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: #9ca3af; }

/* === Tables === */
table {
  width: 100%;
  border-collapse: collapse;
  font-size: 0.8125em;
}
th {
  text-align: left;
  padding: 6px 10px;
  border-bottom: 1px solid var(--ddp-border);
  color: var(--ddp-text-muted);
  font-weight: 500;
  font-size: 0.8125em;
  text-transform: uppercase;
  letter-spacing: 0.03em;
}
td {
  padding: 6px 10px;
  border-bottom: 1px solid var(--ddp-border);
  color: var(--ddp-text);
}

/* === Marimo stat cards ===
 * Normalize the oversized stat values and labels to feel like
 * part of the same app as the sidebar. */
/* Equal-height stat cards: stretch within flex row, clamp long values */
[data-testid="marimo-stat"] {
  border-color: var(--ddp-border) !important;
  border-radius: 6px !important;
  align-self: stretch !important;
  min-height: 0 !important;
}
[data-testid="marimo-stat"] > div {
  height: 100% !important;
}
[data-testid="marimo-stat"] [class*="label"],
[data-testid="marimo-stat"] [class*="Label"] {
  font-size: 0.75em !important;
  font-weight: 500 !important;
  color: var(--ddp-text-muted) !important;
  text-transform: uppercase !important;
  letter-spacing: 0.03em !important;
}
[data-testid="marimo-stat"] [class*="value"],
[data-testid="marimo-stat"] [class*="Value"] {
  font-size: clamp(1em, 4vw, 1.5em) !important;
  font-weight: 600 !important;
  letter-spacing: -0.02em !important;
  color: var(--ddp-text) !important;
  overflow-wrap: break-word !important;
  word-break: break-word !important;
  line-height: 1.2 !important;
}
[data-testid="marimo-stat"] [class*="caption"],
[data-testid="marimo-stat"] [class*="Caption"] {
  font-size: 0.75em !important;
  color: var(--ddp-text-muted) !important;
}

/* === Marimo tables (data grid) === */
[data-testid="marimo-table"] th,
[class*="TableHeader"] th {
  font-size: 0.6875em !important;
  font-weight: 500 !important;
  text-transform: uppercase !important;
  letter-spacing: 0.04em !important;
  color: var(--ddp-text-muted) !important;
}

/* === Marimo UI elements === */
select, button, input {
  font-size: 0.8125em !important;
}

/* === Plotly chart overrides ===
 * Plotly uses inline SVG text — we can't override font-family on those,
 * but we can normalize the container spacing. */
.js-plotly-plot {
  max-width: 100%;
  margin: 0.5em 0;
}

/* === Mobile: Tablet === */
@media (max-width: 768px) {
  #root {
    padding-left: 12px !important;
    padding-right: 12px !important;
  }

  table {
    display: block;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
  }

  .marimo-output .flex-row {
    flex-direction: column !important;
  }
}

/* === Mobile: Phone === */
@media (max-width: 480px) {
  .marimo-output .flex-row {
    flex-direction: column !important;
    gap: 0.5rem !important;
  }
}


/* === Data variant overrides === */

/*
 * DDP Data Notebook Overrides
 * For: data/sources/*.py, data/models/*.py, data/metric-definitions/*.py
 * Reference/documentation style with table-heavy content.
 */

/* Zebra striping for tables */
tbody tr:nth-child(even) {
  background: var(--ddp-surface);
}

/* Code blocks in documentation */
pre code {
  font-size: 0.8125em;
  line-height: 1.6;
}

/* Mermaid diagram container */
.marimo-output svg.mermaid {
  display: block;
  max-width: 600px;
  margin: 1em auto;
}

/* Accordion previews (render_table_preview) */
details {
  border: 1px solid var(--ddp-border);
  border-radius: 6px;
  margin: 0.5em 0;
  overflow: hidden;
}
details summary {
  font-weight: 600;
  font-size: 0.9em;
  padding: 0.6em 1em;
  background: var(--ddp-surface);
  cursor: pointer;
}
details > div {
  padding: 0.5em 1em;
}

/* Field documentation tables */
table th {
  background: var(--ddp-surface);
  white-space: nowrap;
}

nfig": {"column": null, "disabled": false, "hide_code": true}, "id": "aLJB", "name": "_"}, {"code": "", "code_hash": "f9f77a546ead1e1eef94e2c101c9c0df", "config": {"column": null, "disabled": false, "hide_code": true}, "id": "nHfw", "name": "_"}, {"code": "", "code_hash": "4b57cc23a49d39e57ee3b0c7736aecde", "config": {"column": null, "disabled": false, "hide_code": true}, "id": "xXTn", "name": "_"}, {"code": "", "code_hash": "368d6c4e7e031f15038b8a126a7a644d", "config": {"column": null, "disabled": false, "hide_code": true}, "id": "AjVT", "name": "_"}, {"code": "", "code_hash": "85a7d2f38423e16192da0d7d622711fd", "config": {"column": null, "disabled": false, "hide_code": true}, "id": "pHFh", "name": "_"}, {"code": "", "code_hash": "71be4f141998b096a0f37c660b1c5e14", "config": {"column": null, "disabled": false, "hide_code": true}, "id": "NCOB", "name": "_"}], "metadata": {"marimo_version": "0.18.4"}, "version": "1"},
            "session": {"cells": [{"code_hash": "99fb35d9e3ea495b450bac4f1f4733d9", "console": [], "id": "Hbol", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Ch1 id=\"timeseries-metrics\"\u003ETimeseries Metrics\u003C/h1\u003E\n\u003Cspan class=\"paragraph\"\u003EPre-aggregated \u003Cstrong\u003Etime series models\u003C/strong\u003E for developer activity, commit patterns, and ecosystem growth \u2014 built from Open Dev Data's 28-day rolling windows and GitHub Archive's event stream.\u003C/span\u003E\n\u003Cspan class=\"paragraph\"\u003EPreview:\n\u003Cdiv class=\"language-sql codehilite\"\u003E\u003Cpre\u003E\u003Cspan\u003E\u003C/span\u003E\u003Ccode\u003E\u003Cspan class=\"k\"\u003ESELECT\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"o\"\u003E*\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"k\"\u003EFROM\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"n\"\u003Eoso\u003C/span\u003E\u003Cspan class=\"p\"\u003E.\u003C/span\u003E\u003Cspan class=\"n\"\u003Estg_opendevdata__eco_mads\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"k\"\u003ELIMIT\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"mi\"\u003E10\u003C/span\u003E\n\u003C/code\u003E\u003C/pre\u003E\u003C/div\u003E\u003C/span\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "36e7ce41df3c58da011c6148af923d1c", "console": [], "id": "MJUe", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Ch2 id=\"overview\"\u003EOverview\u003C/h2\u003E\n\u003Cspan class=\"paragraph\"\u003ETime series metrics enable temporal analysis of developer activity, ecosystem growth, and contribution patterns. They are pre-aggregated from raw event data at various granularities to support trend analysis, comparisons, and reporting.\u003C/span\u003E\n\u003Cul\u003E\n\u003Cli\u003E\u003Cstrong\u003EOpen Dev Data\u003C/strong\u003E provides curated 28-day rolling activity metrics with identity resolution (\u003Ccode\u003Ecanonical_developer_id\u003C/code\u003E) and pre-calculated ecosystem MAD (Monthly Active Developer) counts\u003C/li\u003E\n\u003Cli\u003E\u003Cstrong\u003EGitHub Archive\u003C/strong\u003E provides raw event-based daily rollups identified by \u003Ccode\u003Eactor_id\u003C/code\u003E\u003C/li\u003E\n\u003Cli\u003ETogether they enable both high-fidelity (ODD) and broad-coverage (GHA) temporal analysis\u003C/li\u003E\n\u003C/ul\u003E\n\u003Ch3 id=\"key-models\"\u003EKey Models\u003C/h3\u003E\n\u003Ctable\u003E\n\u003Cthead\u003E\n\u003Ctr\u003E\n\u003Cth style=\"text-align: left;\"\u003EModel\u003C/th\u003E\n\u003Cth style=\"text-align: left;\"\u003ESource\u003C/th\u003E\n\u003Cth style=\"text-align: left;\"\u003EGrain\u003C/th\u003E\n\u003Cth style=\"text-align: left;\"\u003EKey Metrics\u003C/th\u003E\n\u003C/tr\u003E\n\u003C/thead\u003E\n\u003Ctbody\u003E\n\u003Ctr\u003E\n\u003Ctd style=\"text-align: left;\"\u003E\u003Ccode\u003Estg_opendevdata__repo_developer_28d_activities\u003C/code\u003E\u003C/td\u003E\n\u003Ctd style=\"text-align: left;\"\u003EODD\u003C/td\u003E\n\u003Ctd style=\"text-align: left;\"\u003Eday \u00d7 repo \u00d7 developer\u003C/td\u003E\n\u003Ctd style=\"text-align: left;\"\u003E\u003Ccode\u003Enum_commits\u003C/code\u003E, \u003Ccode\u003El28_days\u003C/code\u003E, rolling 28-day activity\u003C/td\u003E\n\u003C/tr\u003E\n\u003Ctr\u003E\n\u003Ctd style=\"text-align: left;\"\u003E\u003Ccode\u003Estg_opendevdata__eco_mads\u003C/code\u003E\u003C/td\u003E\n\u003Ctd style=\"text-align: left;\"\u003EODD\u003C/td\u003E\n\u003Ctd style=\"text-align: left;\"\u003Eday \u00d7 ecosystem\u003C/td\u003E\n\u003Ctd style=\"text-align: left;\"\u003E\u003Ccode\u003Eall_devs\u003C/code\u003E, \u003Ccode\u003Efull_time_devs\u003C/code\u003E\u003C/td\u003E\n\u003C/tr\u003E\n\u003Ctr\u003E\n\u003Ctd style=\"text-align: left;\"\u003E\u003Ccode\u003Eint_gharchive__developer_activities\u003C/code\u003E\u003C/td\u003E\n\u003Ctd style=\"text-align: left;\"\u003EGHA\u003C/td\u003E\n\u003Ctd style=\"text-align: left;\"\u003Eday \u00d7 repo \u00d7 actor\u003C/td\u003E\n\u003Ctd style=\"text-align: left;\"\u003E\u003Ccode\u003Enum_events\u003C/code\u003E (PushEvent + PullRequestEvent)\u003C/td\u003E\n\u003C/tr\u003E\n\u003C/tbody\u003E\n\u003C/table\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "a9f0eda93dc5c4a06bf01b3057d48387", "console": [], "id": "vblA", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Ch2 id=\"aggregation-periods\"\u003EAggregation Periods\u003C/h2\u003E\n\u003Ctable\u003E\n\u003Cthead\u003E\n\u003Ctr\u003E\n\u003Cth style=\"text-align: left;\"\u003EPeriod\u003C/th\u003E\n\u003Cth style=\"text-align: left;\"\u003EDuration\u003C/th\u003E\n\u003Cth style=\"text-align: left;\"\u003EUse Case\u003C/th\u003E\n\u003C/tr\u003E\n\u003C/thead\u003E\n\u003Ctbody\u003E\n\u003Ctr\u003E\n\u003Ctd style=\"text-align: left;\"\u003E\u003Cstrong\u003EDaily\u003C/strong\u003E\u003C/td\u003E\n\u003Ctd style=\"text-align: left;\"\u003E1 day\u003C/td\u003E\n\u003Ctd style=\"text-align: left;\"\u003EAnomaly detection, debugging data quality, day-of-week patterns\u003C/td\u003E\n\u003C/tr\u003E\n\u003Ctr\u003E\n\u003Ctd style=\"text-align: left;\"\u003E\u003Cstrong\u003E7-day (Weekly)\u003C/strong\u003E\u003C/td\u003E\n\u003Ctd style=\"text-align: left;\"\u003E7 days\u003C/td\u003E\n\u003Ctd style=\"text-align: left;\"\u003ESmooth daily noise, week-over-week comparisons, sprint-level analysis\u003C/td\u003E\n\u003C/tr\u003E\n\u003Ctr\u003E\n\u003Ctd style=\"text-align: left;\"\u003E\u003Cstrong\u003E28-day\u003C/strong\u003E\u003C/td\u003E\n\u003Ctd style=\"text-align: left;\"\u003E28 days\u003C/td\u003E\n\u003Ctd style=\"text-align: left;\"\u003EMonthly Active Developers (MAD), consistent month-to-month comparison, Electric Capital methodology\u003C/td\u003E\n\u003C/tr\u003E\n\u003Ctr\u003E\n\u003Ctd style=\"text-align: left;\"\u003E\u003Cstrong\u003E30-day\u003C/strong\u003E\u003C/td\u003E\n\u003Ctd style=\"text-align: left;\"\u003E30 days\u003C/td\u003E\n\u003Ctd style=\"text-align: left;\"\u003ECalendar month approximations, financial reporting\u003C/td\u003E\n\u003C/tr\u003E\n\u003C/tbody\u003E\n\u003C/table\u003E\n\u003Ch3 id=\"rolling-vs-point-in-time\"\u003ERolling vs. Point-in-Time\u003C/h3\u003E\n\u003Cspan class=\"paragraph\"\u003E\u003Cstrong\u003ERolling Window\u003C/strong\u003E: Each day's value includes activity from the previous N days (overlapping)\n\u003Cdiv class=\"language-text codehilite\"\u003E\u003Cpre\u003E\u003Cspan\u003E\u003C/span\u003E\u003Ccode\u003EDay 28: Activity from Day 1-28\nDay 29: Activity from Day 2-29\nDay 30: Activity from Day 3-30\n\u003C/code\u003E\u003C/pre\u003E\u003C/div\u003E\u003C/span\u003E\n\u003Cspan class=\"paragraph\"\u003E\u003Cstrong\u003EPoint-in-Time\u003C/strong\u003E: Each period is discrete (non-overlapping)\n\u003Cdiv class=\"language-text codehilite\"\u003E\u003Cpre\u003E\u003Cspan\u003E\u003C/span\u003E\u003Ccode\u003EWeek 1: Activity from Day 1-7\nWeek 2: Activity from Day 8-14\nWeek 3: Activity from Day 15-21\n\u003C/code\u003E\u003C/pre\u003E\u003C/div\u003E\u003C/span\u003E\n\u003Cspan class=\"paragraph\"\u003EThe ODD models (\u003Ccode\u003Erepo_developer_28d_activities\u003C/code\u003E, \u003Ccode\u003Eeco_mads\u003C/code\u003E) use \u003Cstrong\u003Erolling windows\u003C/strong\u003E. For point-in-time, use \u003Ccode\u003EDATE_TRUNC\u003C/code\u003E on the raw data.\u003C/span\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "35029ee09342a086d10a959d25ed36c0", "console": [], "id": "bkHC", "outputs": [{"data": {"text/html": "\u003Cmarimo-mermaid data-diagram='\u0026quot;\u0026#92;ngraph TD\u0026#92;n    A[stg_opendevdata__commits\u0026lt;br/\u0026gt;ODD commits wit
