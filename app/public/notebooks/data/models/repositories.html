      function __resizeIframe(obj) {
        const scrollbarHeight = 20; // Max between windows, mac, and linux

        function setHeight() {
          // Guard against race condition where iframe isn't ready
          if (!obj.contentWindow?.document?.documentElement) {
            return;
          }
          const element = obj.contentWindow.document.documentElement;
          // If there is no vertical scrollbar, we don't need to resize the iframe
          if (element.scrollHeight === element.clientHeight) {
            return;
          }

          // Create a new height that includes the scrollbar height if it's visible
          const hasHorizontalScrollbar = element.scrollWidth > element.clientWidth;
          const newHeight = element.scrollHeight + (hasHorizontalScrollbar ? scrollbarHeight : 0);

          // Only update the height if it's different from the current height
          if (obj.style.height !== `${newHeight}px`) {
            obj.style.height = `${newHeight}px`;
          }
        }

        // Resize the iframe to the height of the content and bottom scrollbar height
        setHeight();

        // Resize the iframe when the content changes
        const resizeObserver = new ResizeObserver((_entries) => {
          setHeight();
        });
        // Only observe if iframe content is ready
        if (obj.contentWindow?.document?.body) {
          resizeObserver.observe(obj.contentWindow.document.body);
        }
      }
    </script>

/* Source: base.css + _data.css */

/*
 * DDP Notebook Base Styles
 *
 * Shared foundation for all marimo notebooks in the Developer Data Portal.
 * This file is concatenated with variant partials (_root.css, _data.css,
 * _insights.css) by scripts/build_css.py to produce self-contained CSS files.
 *
 * Font: System stack — matches the Next.js shell exactly. Overrides marimo's
 * default PT Sans to eliminate the visual mismatch between sidebar and content.
 *
 * Color provenance (update both here and app/app/globals.css if colors change):
 *   - Chart palette: --ddp-primary, --ddp-secondary, --ddp-tertiary
 *   - Shell accent: --ddp-accent (indigo-600, shared with Tailwind config)
 *   - Slate scale: --ddp-text, --ddp-border, etc. (Tailwind slate palette)
 */

/* === Custom Properties === */
:root {
  --ddp-font: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen',
    'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue', sans-serif;
  --ddp-font-mono: 'Fira Mono', 'Fira Code', ui-monospace, monospace;
  --ddp-primary: #4C78A8;
  --ddp-secondary: #F58518;
  --ddp-tertiary: #72B7B2;
  --ddp-text: #0f172a;
  --ddp-text-muted: #64748b;
  --ddp-bg: #ffffff;
  --ddp-border: #e2e8f0;
  --ddp-surface: #f8fafc;
  --ddp-accent: #4f46e5;
}

/* === Nuclear font override ===
 * Marimo components use inline styles and deeply nested React elements.
 * A targeted selector list can't catch them all. The universal selector
 * with !important is the only way to guarantee the system font everywhere. */
*, *::before, *::after {
  box-sizing: border-box;
  font-family: var(--ddp-font) !important;
}
code, code *, pre, pre *, .cm-editor, .cm-editor * {
  font-family: var(--ddp-font-mono) !important;
}

/* === Content width ===
 * Global max-width for all cell output so tables, charts, markdown,
 * and stat cards align to the same column. Root variant narrows to 720px. */
#root [data-cell-id] > div {
  max-width: 1100px !important;
}

/* === Base === */
body {
  margin: 0;
  padding: 0;
  font-size: 14px;
  line-height: 1.5;
  color: var(--ddp-text);
  background: var(--ddp-bg);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

/* === Headings ===
 * Weight 600 (semibold) throughout — quieter than marimo's 700-800 defaults.
 * Tight letter-spacing for a modern, dense feel. .prose targets marimo's
 * Tailwind Typography wrapper around markdown output. */
h1, .prose h1 {
  font-weight: 600 !important;
  line-height: 1.25 !important;
  letter-spacing: -0.02em !important;
  color: var(--ddp-text) !important;
}
h2, .prose h2 {
  font-weight: 600 !important;
  line-height: 1.3 !important;
  letter-spacing: -0.01em !important;
  color: var(--ddp-text) !important;
}
h3, .prose h3 {
  font-weight: 600 !important;
  line-height: 1.35 !important;
  color: var(--ddp-text) !important;
}

/* === Body text === */
p, li, .prose p, .prose li {
  line-height: 1.5 !important;
  color: var(--ddp-text) !important;
  font-size: inherit !important;
}

small, .text-muted {
  color: var(--ddp-text-muted);
}

/* === Inline code === */
code {
  font-size: 0.8125em;
  background: var(--ddp-surface);
  padding: 0.15em 0.4em;
  border-radius: 3px;
  color: var(--ddp-text);
}
.prose code {
  font-size: 0.8125em !important;
  background: var(--ddp-surface) !important;
  color: var(--ddp-text) !important;
}

/* === Code blocks (GitHub-style: subtle bg, no border) === */
pre code {
  display: block;
  padding: 0.85em 1em;
  overflow-x: auto;
  background: #f6f8fa;
  border: none;
  border-radius: 6px;
  font-size: 0.8125em;
  line-height: 1.55;
}

/* === Links === */
a {
  color: var(--ddp-accent);
  text-decoration: none;
}
a:hover {
  text-decoration: underline;
}

/* === Scrollbar === */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: #9ca3af; }

/* === Tables === */
table {
  width: 100%;
  border-collapse: collapse;
  font-size: 0.8125em;
}
th {
  text-align: left;
  padding: 6px 10px;
  border-bottom: 1px solid var(--ddp-border);
  color: var(--ddp-text-muted);
  font-weight: 500;
  font-size: 0.8125em;
  text-transform: uppercase;
  letter-spacing: 0.03em;
}
td {
  padding: 6px 10px;
  border-bottom: 1px solid var(--ddp-border);
  color: var(--ddp-text);
}

/* === Marimo stat cards ===
 * Normalize the oversized stat values and labels to feel like
 * part of the same app as the sidebar. */
/* Equal-height stat cards: stretch within flex row, clamp long values */
[data-testid="marimo-stat"] {
  border-color: var(--ddp-border) !important;
  border-radius: 6px !important;
  align-self: stretch !important;
  min-height: 0 !important;
}
[data-testid="marimo-stat"] > div {
  height: 100% !important;
}
[data-testid="marimo-stat"] [class*="label"],
[data-testid="marimo-stat"] [class*="Label"] {
  font-size: 0.75em !important;
  font-weight: 500 !important;
  color: var(--ddp-text-muted) !important;
  text-transform: uppercase !important;
  letter-spacing: 0.03em !important;
}
[data-testid="marimo-stat"] [class*="value"],
[data-testid="marimo-stat"] [class*="Value"] {
  font-size: clamp(1em, 4vw, 1.5em) !important;
  font-weight: 600 !important;
  letter-spacing: -0.02em !important;
  color: var(--ddp-text) !important;
  overflow-wrap: break-word !important;
  word-break: break-word !important;
  line-height: 1.2 !important;
}
[data-testid="marimo-stat"] [class*="caption"],
[data-testid="marimo-stat"] [class*="Caption"] {
  font-size: 0.75em !important;
  color: var(--ddp-text-muted) !important;
}

/* === Marimo tables (data grid) === */
[data-testid="marimo-table"] th,
[class*="TableHeader"] th {
  font-size: 0.6875em !important;
  font-weight: 500 !important;
  text-transform: uppercase !important;
  letter-spacing: 0.04em !important;
  color: var(--ddp-text-muted) !important;
}

/* === Marimo UI elements === */
select, button, input {
  font-size: 0.8125em !important;
}

/* === Plotly chart overrides ===
 * Plotly uses inline SVG text — we can't override font-family on those,
 * but we can normalize the container spacing. */
.js-plotly-plot {
  max-width: 100%;
  margin: 0.5em 0;
}

/* === Mobile: Tablet === */
@media (max-width: 768px) {
  #root {
    padding-left: 12px !important;
    padding-right: 12px !important;
  }

  table {
    display: block;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
  }

  .marimo-output .flex-row {
    flex-direction: column !important;
  }
}

/* === Mobile: Phone === */
@media (max-width: 480px) {
  .marimo-output .flex-row {
    flex-direction: column !important;
    gap: 0.5rem !important;
  }
}


/* === Data variant overrides === */

/*
 * DDP Data Notebook Overrides
 * For: data/sources/*.py, data/models/*.py, data/metric-definitions/*.py
 * Reference/documentation style with table-heavy content.
 */

/* Zebra striping for tables */
tbody tr:nth-child(even) {
  background: var(--ddp-surface);
}

/* Code blocks in documentation */
pre code {
  font-size: 0.8125em;
  line-height: 1.6;
}

/* Mermaid diagram container */
.marimo-output svg.mermaid {
  display: block;
  max-width: 600px;
  margin: 1em auto;
}

/* Accordion previews (render_table_preview) */
details {
  border: 1px solid var(--ddp-border);
  border-radius: 6px;
  margin: 0.5em 0;
  overflow: hidden;
}
details summary {
  font-weight: 600;
  font-size: 0.9em;
  padding: 0.6em 1em;
  background: var(--ddp-surface);
  cursor: pointer;
}
details > div {
  padding: 0.5em 1em;
}

/* Field documentation tables */
table th {
  background: var(--ddp-surface);
  white-space: nowrap;
}

            "session": {"cells": [{"code_hash": "290431d9d344d3d825e949a3f2d5334c", "console": [], "id": "Hbol", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Ch1 id=\"repositories\"\u003ERepositories\u003C/h1\u003E\n\u003Cspan class=\"paragraph\"\u003EThe \u003Cstrong\u003Erepository bridge model\u003C/strong\u003E maps Open Dev Data repositories to canonical GitHub IDs, enabling cross-source joins between ODD's commit tracking and GitHub Archive's event stream.\u003C/span\u003E\n\u003Cspan class=\"paragraph\"\u003EPreview:\n\u003Cdiv class=\"language-sql codehilite\"\u003E\u003Cpre\u003E\u003Cspan\u003E\u003C/span\u003E\u003Ccode\u003E\u003Cspan class=\"k\"\u003ESELECT\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"o\"\u003E*\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"k\"\u003EFROM\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"n\"\u003Eoso\u003C/span\u003E\u003Cspan class=\"p\"\u003E.\u003C/span\u003E\u003Cspan class=\"n\"\u003Eint_opendevdata__repositories_with_repo_id\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"k\"\u003ELIMIT\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"mi\"\u003E10\u003C/span\u003E\n\u003C/code\u003E\u003C/pre\u003E\u003C/div\u003E\u003C/span\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "fd7a23255f450ecceac74bfbd7629e04", "console": [], "id": "MJUe", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Ch2 id=\"overview\"\u003EOverview\u003C/h2\u003E\n\u003Cspan class=\"paragraph\"\u003EThe \u003Ccode\u003Eint_opendevdata__repositories_with_repo_id\u003C/code\u003E model serves as a bridge between multiple data sources within the OSO ecosystem. It provides a unified view of software repositories by mapping external identifiers to canonical GitHub integer IDs.\u003C/span\u003E\n\u003Cul\u003E\n\u003Cli\u003E\u003Cstrong\u003ENormalization\u003C/strong\u003E: Standardizes repository names and URLs across different schemas\u003C/li\u003E\n\u003Cli\u003E\u003Cstrong\u003EStability\u003C/strong\u003E: Provides a stable \u003Ccode\u003Erepo_id\u003C/code\u003E that can be used to join events, contributions, and project-level metrics\u003C/li\u003E\n\u003Cli\u003E\u003Cstrong\u003ECross-source analysis\u003C/strong\u003E: Enables joining Open Dev Data commits with GitHub Archive events via a shared \u003Ccode\u003Erepo_id\u003C/code\u003E\u003C/li\u003E\n\u003C/ul\u003E\n\u003Ch3 id=\"id-source-definitions\"\u003EID Source Definitions\u003C/h3\u003E\n\u003Cspan class=\"paragraph\"\u003EThe \u003Ccode\u003Erepo_id_source\u003C/code\u003E column indicates how the internal \u003Ccode\u003Erepo_id\u003C/code\u003E was resolved:\u003C/span\u003E\n\u003Ctable\u003E\n\u003Cthead\u003E\n\u003Ctr\u003E\n\u003Cth style=\"text-align: left;\"\u003ESource\u003C/th\u003E\n\u003Cth style=\"text-align: left;\"\u003EDescription\u003C/th\u003E\n\u003Cth style=\"text-align: left;\"\u003EReliability\u003C/th\u003E\n\u003C/tr\u003E\n\u003C/thead\u003E\n\u003Ctbody\u003E\n\u003Ctr\u003E\n\u003Ctd style=\"text-align: left;\"\u003E\u003Ccode\u003Eossd\u003C/code\u003E\u003C/td\u003E\n\u003Ctd style=\"text-align: left;\"\u003EVerified match via \u003Ccode\u003Egithub_graphql_id\u003C/code\u003E in the curated OSS Directory\u003C/td\u003E\n\u003Ctd style=\"text-align: left;\"\u003EHighest\u003C/td\u003E\n\u003C/tr\u003E\n\u003Ctr\u003E\n\u003Ctd style=\"text-align: left;\"\u003E\u003Ccode\u003Enode_id\u003C/code\u003E\u003C/td\u003E\n\u003Ctd style=\"text-align: left;\"\u003EDecoded from \u003Ccode\u003Egithub_graphql_id\u003C/code\u003E via node_id_map, but not in OSS Directory\u003C/td\u003E\n\u003Ctd style=\"text-align: left;\"\u003EHigh\u003C/td\u003E\n\u003C/tr\u003E\n\u003Ctr\u003E\n\u003Ctd style=\"text-align: left;\"\u003E\u003Ccode\u003Egharchive\u003C/code\u003E\u003C/td\u003E\n\u003Ctd style=\"text-align: left;\"\u003EFallback match by \u003Ccode\u003Erepo_name\u003C/code\u003E in GitHub Archive data\u003C/td\u003E\n\u003Ctd style=\"text-align: left;\"\u003ELower\u003C/td\u003E\n\u003C/tr\u003E\n\u003Ctr\u003E\n\u003Ctd style=\"text-align: left;\"\u003E\u003Ccode\u003Eopendevdata\u003C/code\u003E\u003C/td\u003E\n\u003Ctd style=\"text-align: left;\"\u003ENo match found \u2014 \u003Ccode\u003Erepo_id\u003C/code\u003E is NULL\u003C/td\u003E\n\u003Ctd style=\"text-align: left;\"\u003ENone\u003C/td\u003E\n\u003C/tr\u003E\n\u003C/tbody\u003E\n\u003C/table\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "f45df07ae4cd018308bf825a20d81fba", "console": [], "id": "vblA", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Ch2 id=\"the-3-id-system\"\u003EThe 3-ID System\u003C/h2\u003E\n\u003Cspan class=\"paragraph\"\u003ERepositories in the OSO ecosystem have three different identifiers that need bridging:\u003C/span\u003E\n\u003Ctable\u003E\n\u003Cthead\u003E\n\u003Ctr\u003E\n\u003Cth style=\"text-align: left;\"\u003EID Type\u003C/th\u003E\n\u003Cth style=\"text-align: left;\"\u003EColumn Name\u003C/th\u003E\n\u003Cth style=\"text-align: left;\"\u003EDescription\u003C/th\u003E\n\u003C/tr\u003E\n\u003C/thead\u003E\n\u003Ctbody\u003E\n\u003Ctr\u003E\n\u003Ctd style=\"text-align: left;\"\u003EOpenDevData ID\u003C/td\u003E\n\u003Ctd style=\"text-align: left;\"\u003E\u003Ccode\u003Eopendevdata_id\u003C/code\u003E\u003C/td\u003E\n\u003Ctd style=\"text-align: left;\"\u003EPrimary key in ODD source data\u003C/td\u003E\n\u003C/tr\u003E\n\u003Ctr\u003E\n\u003Ctd style=\"text-align: left;\"\u003EGraphQL Node ID\u003C/td\u003E\n\u003Ctd style=\"text-align: left;\"\u003E\u003Ccode\u003Egithub_graphql_id\u003C/code\u003E\u003C/td\u003E\n\u003Ctd style=\"text-align: left;\"\u003EGitHub's global opaque ID (Base64 encoded)\u003C/td\u003E\n\u003C/tr\u003E\n\u003Ctr\u003E\n\u003Ctd style=\"text-align: left;\"\u003EREST API ID\u003C/td\u003E\n\u003Ctd style=\"text-align: left;\"\u003E\u003Ccode\u003Erepo_id\u003C/code\u003E\u003C/td\u003E\n\u003Ctd style=\"text-align: left;\"\u003ENumeric GitHub Database ID \u2014 the primary join key\u003C/td\u003E\n\u003C/tr\u003E\n\u003C/tbody\u003E\n\u003C/table\u003E\n\u003Cspan class=\"paragraph\"\u003EThe \u003Ccode\u003Erepo_id\u003C/code\u003E (REST API ID) is the canonical join key used throughout the DDP models to connect repositories across Open Dev Data and GitHub Archive.\u003C/span\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "42bb777bd40cca4ebb32293c34281872", "console": [], "id": "bkHC", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Ch2 id=\"id-mapping-strategy\"\u003EID Mapping Strategy\u003C/h2\u003E\n\u003Cspan class=\"paragraph\"\u003EThe model employs a 3-tier priority logic to assign a \u003Ccode\u003Erepo_id\u003C/code\u003E to each record:\u003C/span\u003E\n\u003Col\u003E\n\u003Cli\u003E\u003Cstrong\u003EPrimary Match (OSS Directory)\u003C/strong\u003E: Match using \u003Ccode\u003Egithub_graphql_id\u003C/code\u003E against the curated OSS Directory. Most reliable \u2014 relies on persistent, immutable IDs from GitHub.\u003C/li\u003E\n\u003Cli\u003E\u003Cstrong\u003EDecoded Match (Node ID Map)\u003C/strong\u003E: If not in OSS Directory, decode the \u003Ccode\u003Egithub_graphql_id\u003C/code\u003E to an integer ID using \u003Ccode\u003Eint_github__node_id_map\u003C/code\u003E. Handles both legacy Base64 and next-gen MessagePack formats.\u003C/li\u003E\n\u003Cli\u003E\u003Cstrong\u003EFallback Match (GitHub Archive)\u003C/strong\u003E: Match by \u003Ccode\u003Erepo_name\u003C/code\u003E (e.g., \u003Ccode\u003Eowner/repo\u003C/code\u003E) against GitHub Archive data. Less reliable due to renames.\u003C/li\u003E\n\u003Cli\u003E\u003Cstrong\u003EUnmatched\u003C/strong\u003E: \u003Ccode\u003Erepo_id\u003C/code\u003E is NULL. The repository exists in ODD but couldn't be mapped to a GitHub integer ID.\u003C/li\u003E\n\u003C/ol\u003E\n\u003Ch3 id=\"node-id-decoding\"\u003ENode ID Decoding\u003C/h3\u003E\n\u003Cspan class=\"paragraph\"\u003EA key challenge is bridging GitHub's two API ID systems:\u003C/span\u003E\n\u003Cul\u003E\n\u003Cli\u003E\u003Cstrong\u003EGraphQL API\u003C/strong\u003E: Opaque Node IDs (e.g., \u003Ccode\u003EMDEwOlJlcG9zaXRvcnkyNDI0Nzg0\u003C/code\u003E)\u003C/li\u003E\n\u003Cli\u003E\u003Cstrong\u003EREST API\u003C/strong\u003E: Integer Database IDs (e.g., \u003Ccode\u003E2424784\u003C/code\u003E)\u003C/li\u003E\n\u003C/ul\u003E\n\u003Cspan class=\"paragraph\"\u003EThe \u003Ccode\u003Eint_github__node_id_map\u003C/code\u003E model pre-computes this mapping by decoding both legacy (simple Base64) and next-gen (MessagePack binary) ID formats.\u003C/span\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "4663634b34326ace963eae076de1e0d9", "console": [], "id": "lEQa", "outputs": [{"data": {"text/html": "\u003Cmarimo-mermaid data-diagram='\u0026quot;\u0026#92;ngraph TD\u0026#92;n    A[stg_opendevdata__repos\u0026lt;br/\u0026gt;ODD repositories with GraphQL IDs] --\u0026gt; D\u0026#92;n    B[int_github__node_id_map\u0026lt;br/\u0026gt;Decode GraphQL \u2192 Database ID] --\u0026gt; D\u0026#92;n    C[oss-directory artifacts\u0026lt;br/\u0026gt;Curated repo mappings] --\u0026gt; D\u0026#92;n    E[int_gharchive__github_events\u0026lt;br/\u0026gt;GHA repos for name-based fallback] --\u0026gt; D\u0026#92;n    D[int_opendevdata__repositories_with_repo_id\u0026lt;br/\u0026gt;Unified repo bridge with repo_id + source]\u0026#92;n\u0026quot;'\u003E\u003C/marimo-mermaid\u003E"}, "type": "data"}]}, {"code_hash": "4b2096fbc9a1859bb40ae907c12873fb", "console": [], "id": "PKri", "outputs": [{"data": {"text/html": "\u003Cmarimo-accordion data-labels='[\u0026quot;\u0026lt;span class=\u0026#92;\u0026quot;markdown pros
