    <script data-marimo="true">
      function __resizeIframe(obj) {
        const scrollbarHeight = 20; // Max between windows, mac, and linux

        function setHeight() {
          // Guard against race condition where iframe isn't ready
          if (!obj.contentWindow?.document?.documentElement) {
            return;
          }
          const element = obj.contentWindow.document.documentElement;
          // If there is no vertical scrollbar, we don't need to resize the iframe
          if (element.scrollHeight === element.clientHeight) {
            return;
          }

          // Create a new height that includes the scrollbar height if it's visible
          const hasHorizontalScrollbar = element.scrollWidth > element.clientWidth;
          const newHeight = element.scrollHeight + (hasHorizontalScrollbar ? scrollbarHeight : 0);

          // Only update the height if it's different from the current height
          if (obj.style.height !== `${newHeight}px`) {
            obj.style.height = `${newHeight}px`;
          }
        }

        // Resize the iframe to the height of the content and bottom scrollbar height
        setHeight();

        // Resize the iframe when the content changes
        const resizeObserver = new ResizeObserver((_entries) => {
          setHeight();
        });
        // Only observe if iframe content is ready
        if (obj.contentWindow?.document?.body) {
          resizeObserver.observe(obj.contentWindow.document.body);
        }
      }
    </script>

/* Source: base.css + _data.css */

/*
 * DDP Notebook Base Styles
 *
 * Shared foundation for all marimo notebooks in the Developer Data Portal.
 * This file is concatenated with variant partials (_root.css, _data.css,
 * _insights.css) by scripts/build_css.py to produce self-contained CSS files.
 *
 * Font: System stack — matches the Next.js shell exactly. Overrides marimo's
 * default PT Sans to eliminate the visual mismatch between sidebar and content.
 *
 * Color provenance (update both here and app/app/globals.css if colors change):
 *   - Chart palette: --ddp-primary, --ddp-secondary, --ddp-tertiary
 *   - Shell accent: --ddp-accent (indigo-600, shared with Tailwind config)
 *   - Slate scale: --ddp-text, --ddp-border, etc. (Tailwind slate palette)
 */

/* === Custom Properties === */
:root {
  --ddp-font: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen',
    'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue', sans-serif;
  --ddp-font-mono: 'Fira Mono', 'Fira Code', ui-monospace, monospace;
  --ddp-primary: #4C78A8;
  --ddp-secondary: #F58518;
  --ddp-tertiary: #72B7B2;
  --ddp-text: #0f172a;
  --ddp-text-muted: #64748b;
  --ddp-bg: #ffffff;
  --ddp-border: #e2e8f0;
  --ddp-surface: #f8fafc;
  --ddp-accent: #4f46e5;
}

/* === Nuclear font override ===
 * Marimo components use inline styles and deeply nested React elements.
 * A targeted selector list can't catch them all. The universal selector
 * with !important is the only way to guarantee the system font everywhere. */
*, *::before, *::after {
  box-sizing: border-box;
  font-family: var(--ddp-font) !important;
}
code, code *, pre, pre *, .cm-editor, .cm-editor * {
  font-family: var(--ddp-font-mono) !important;
}

/* === Content width ===
 * Global max-width for all cell output so tables, charts, markdown,
 * and stat cards align to the same column. Root variant narrows to 720px. */
#root [data-cell-id] > div {
  max-width: 1100px !important;
}

/* === Base === */
body {
  margin: 0;
  padding: 0;
  font-size: 14px;
  line-height: 1.5;
  color: var(--ddp-text);
  background: var(--ddp-bg);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

/* === Headings ===
 * Weight 600 (semibold) throughout — quieter than marimo's 700-800 defaults.
 * Tight letter-spacing for a modern, dense feel. .prose targets marimo's
 * Tailwind Typography wrapper around markdown output. */
h1, .prose h1 {
  font-weight: 600 !important;
  line-height: 1.25 !important;
  letter-spacing: -0.02em !important;
  color: var(--ddp-text) !important;
}
h2, .prose h2 {
  font-weight: 600 !important;
  line-height: 1.3 !important;
  letter-spacing: -0.01em !important;
  color: var(--ddp-text) !important;
}
h3, .prose h3 {
  font-weight: 600 !important;
  line-height: 1.35 !important;
  color: var(--ddp-text) !important;
}

/* === Body text === */
p, li, .prose p, .prose li {
  line-height: 1.5 !important;
  color: var(--ddp-text) !important;
  font-size: inherit !important;
}

small, .text-muted {
  color: var(--ddp-text-muted);
}

/* === Inline code === */
code {
  font-size: 0.8125em;
  background: var(--ddp-surface);
  padding: 0.15em 0.4em;
  border-radius: 3px;
  color: var(--ddp-text);
}
.prose code {
  font-size: 0.8125em !important;
  background: var(--ddp-surface) !important;
  color: var(--ddp-text) !important;
}

/* === Code blocks (GitHub-style: subtle bg, no border) === */
pre code {
  display: block;
  padding: 0.85em 1em;
  overflow-x: auto;
  background: #f6f8fa;
  border: none;
  border-radius: 6px;
  font-size: 0.8125em;
  line-height: 1.55;
}

/* === Links === */
a {
  color: var(--ddp-accent);
  text-decoration: none;
}
a:hover {
  text-decoration: underline;
}

/* === Scrollbar === */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: #9ca3af; }

/* === Tables === */
table {
  width: 100%;
  border-collapse: collapse;
  font-size: 0.8125em;
}
th {
  text-align: left;
  padding: 6px 10px;
  border-bottom: 1px solid var(--ddp-border);
  color: var(--ddp-text-muted);
  font-weight: 500;
  font-size: 0.8125em;
  text-transform: uppercase;
  letter-spacing: 0.03em;
}
td {
  padding: 6px 10px;
  border-bottom: 1px solid var(--ddp-border);
  color: var(--ddp-text);
}

/* === Marimo stat cards ===
 * Normalize the oversized stat values and labels to feel like
 * part of the same app as the sidebar. */
/* Equal-height stat cards: stretch within flex row, clamp long values */
[data-testid="marimo-stat"] {
  border-color: var(--ddp-border) !important;
  border-radius: 6px !important;
  align-self: stretch !important;
  min-height: 0 !important;
}
[data-testid="marimo-stat"] > div {
  height: 100% !important;
}
[data-testid="marimo-stat"] [class*="label"],
[data-testid="marimo-stat"] [class*="Label"] {
  font-size: 0.75em !important;
  font-weight: 500 !important;
  color: var(--ddp-text-muted) !important;
  text-transform: uppercase !important;
  letter-spacing: 0.03em !important;
}
[data-testid="marimo-stat"] [class*="value"],
[data-testid="marimo-stat"] [class*="Value"] {
  font-size: clamp(1em, 4vw, 1.5em) !important;
  font-weight: 600 !important;
  letter-spacing: -0.02em !important;
  color: var(--ddp-text) !important;
  overflow-wrap: break-word !important;
  word-break: break-word !important;
  line-height: 1.2 !important;
}
[data-testid="marimo-stat"] [class*="caption"],
[data-testid="marimo-stat"] [class*="Caption"] {
  font-size: 0.75em !important;
  color: var(--ddp-text-muted) !important;
}

/* === Marimo tables (data grid) === */
[data-testid="marimo-table"] th,
[class*="TableHeader"] th {
  font-size: 0.6875em !important;
  font-weight: 500 !important;
  text-transform: uppercase !important;
  letter-spacing: 0.04em !important;
  color: var(--ddp-text-muted) !important;
}

/* === Marimo UI elements === */
select, button, input {
  font-size: 0.8125em !important;
}

/* === Plotly chart overrides ===
 * Plotly uses inline SVG text — we can't override font-family on those,
 * but we can normalize the container spacing. */
.js-plotly-plot {
  max-width: 100%;
  margin: 0.5em 0;
}

/* === Mobile: Tablet === */
@media (max-width: 768px) {
  #root {
    padding-left: 12px !important;
    padding-right: 12px !important;
  }

  table {
    display: block;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
  }

  .marimo-output .flex-row {
    flex-direction: column !important;
  }
}

/* === Mobile: Phone === */
@media (max-width: 480px) {
  .marimo-output .flex-row {
    flex-direction: column !important;
    gap: 0.5rem !important;
  }
}


/* === Data variant overrides === */

/*
 * DDP Data Notebook Overrides
 * For: data/sources/*.py, data/models/*.py, data/metric-definitions/*.py
 * Reference/documentation style with table-heavy content.
 */

/* Zebra striping for tables */
tbody tr:nth-child(even) {
  background: var(--ddp-surface);
}

/* Code blocks in documentation */
pre code {
  font-size: 0.8125em;
  line-height: 1.6;
}

/* Mermaid diagram container */
.marimo-output svg.mermaid {
  display: block;
  max-width: 600px;
  margin: 1em auto;
}

/* Accordion previews (render_table_preview) */
details {
  border: 1px solid var(--ddp-border);
  border-radius: 6px;
  margin: 0.5em 0;
  overflow: hidden;
}
details summary {
  font-weight: 600;
  font-size: 0.9em;
  padding: 0.6em 1em;
  background: var(--ddp-surface);
  cursor: pointer;
}
details > div {
  padding: 0.5em 1em;
}

/* Field documentation tables */
table th {
  background: var(--ddp-surface);
  white-space: nowrap;
}

            "session": {"cells": [{"code_hash": "1fe0bdb5ad1db9e8f0bde0fa1f63235c", "console": [], "id": "Hbol", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Ch1 id=\"lifecycle\"\u003ELifecycle\u003C/h1\u003E\n\u003Cspan class=\"paragraph\"\u003ELifecycle classification tracks how developers move between activity states over time, from first contribution through sustained engagement to dormancy and churn.\u003C/span\u003E\n\u003Cspan class=\"paragraph\"\u003E\u003Cstrong\u003EPreview:\u003C/strong\u003E\n\u003Cdiv class=\"language-sql codehilite\"\u003E\u003Cpre\u003E\u003Cspan\u003E\u003C/span\u003E\u003Ccode\u003E\u003Cspan class=\"k\"\u003ESELECT\u003C/span\u003E\n\u003Cspan class=\"w\"\u003E  \u003C/span\u003E\u003Cspan class=\"n\"\u003Ee\u003C/span\u003E\u003Cspan class=\"p\"\u003E.\u003C/span\u003E\u003Cspan class=\"n\"\u003Ename\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"k\"\u003EAS\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"n\"\u003Eecosystem\u003C/span\u003E\u003Cspan class=\"p\"\u003E,\u003C/span\u003E\n\u003Cspan class=\"w\"\u003E  \u003C/span\u003E\u003Cspan class=\"n\"\u003Em\u003C/span\u003E\u003Cspan class=\"p\"\u003E.\u003C/span\u003E\u003Cspan class=\"k\"\u003Eday\u003C/span\u003E\u003Cspan class=\"p\"\u003E,\u003C/span\u003E\n\u003Cspan class=\"w\"\u003E  \u003C/span\u003E\u003Cspan class=\"n\"\u003Em\u003C/span\u003E\u003Cspan class=\"p\"\u003E.\u003C/span\u003E\u003Cspan class=\"n\"\u003Efull_time_devs\u003C/span\u003E\u003Cspan class=\"p\"\u003E,\u003C/span\u003E\n\u003Cspan class=\"w\"\u003E  \u003C/span\u003E\u003Cspan class=\"n\"\u003Em\u003C/span\u003E\u003Cspan class=\"p\"\u003E.\u003C/span\u003E\u003Cspan class=\"n\"\u003Epart_time_devs\u003C/span\u003E\u003Cspan class=\"p\"\u003E,\u003C/span\u003E\n\u003Cspan class=\"w\"\u003E  \u003C/span\u003E\u003Cspan class=\"n\"\u003Em\u003C/span\u003E\u003Cspan class=\"p\"\u003E.\u003C/span\u003E\u003Cspan class=\"n\"\u003Eone_time_devs\u003C/span\u003E\n\u003Cspan class=\"k\"\u003EFROM\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"n\"\u003Eoso\u003C/span\u003E\u003Cspan class=\"p\"\u003E.\u003C/span\u003E\u003Cspan class=\"n\"\u003Estg_opendevdata__eco_mads\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"k\"\u003EAS\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"n\"\u003Em\u003C/span\u003E\n\u003Cspan class=\"k\"\u003EJOIN\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"n\"\u003Eoso\u003C/span\u003E\u003Cspan class=\"p\"\u003E.\u003C/span\u003E\u003Cspan class=\"n\"\u003Estg_opendevdata__ecosystems\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"k\"\u003EAS\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"n\"\u003Ee\u003C/span\u003E\n\u003Cspan class=\"w\"\u003E  \u003C/span\u003E\u003Cspan class=\"k\"\u003EON\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"n\"\u003Em\u003C/span\u003E\u003Cspan class=\"p\"\u003E.\u003C/span\u003E\u003Cspan class=\"n\"\u003Eecosystem_id\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"o\"\u003E=\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"n\"\u003Ee\u003C/span\u003E\u003Cspan class=\"p\"\u003E.\u003C/span\u003E\u003Cspan class=\"n\"\u003Eid\u003C/span\u003E\n\u003Cspan class=\"k\"\u003EWHERE\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"n\"\u003Ee\u003C/span\u003E\u003Cspan class=\"p\"\u003E.\u003C/span\u003E\u003Cspan class=\"n\"\u003Ename\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"o\"\u003E=\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"s1\"\u003E\u0026#39;Ethereum\u0026#39;\u003C/span\u003E\n\u003Cspan class=\"k\"\u003EORDER\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"k\"\u003EBY\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"n\"\u003Em\u003C/span\u003E\u003Cspan class=\"p\"\u003E.\u003C/span\u003E\u003Cspan class=\"k\"\u003Eday\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"k\"\u003EDESC\u003C/span\u003E\n\u003Cspan class=\"k\"\u003ELIMIT\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"mi\"\u003E5\u003C/span\u003E\n\u003C/code\u003E\u003C/pre\u003E\u003C/div\u003E\u003C/span\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "c84ebdfdf200b8ac0e5d222fe33e526e", "console": [], "id": "MJUe", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Ch2 id=\"standard-definition\"\u003EStandard Definition\u003C/h2\u003E\n\u003Cspan class=\"paragraph\"\u003EODD tracks activity levels in \u003Ccode\u003Eeco_mads\u003C/code\u003E as a simple snapshot:\u003C/span\u003E\n\u003Ctable\u003E\n\u003Cthead\u003E\n\u003Ctr\u003E\n\u003Cth style=\"text-align: left;\"\u003EState\u003C/th\u003E\n\u003Cth style=\"text-align: left;\"\u003EColumn\u003C/th\u003E\n\u003Cth style=\"text-align: left;\"\u003EThreshold\u003C/th\u003E\n\u003C/tr\u003E\n\u003C/thead\u003E\n\u003Ctbody\u003E\n\u003Ctr\u003E\n\u003Ctd style=\"text-align: left;\"\u003EFull-time\u003C/td\u003E\n\u003Ctd style=\"text-align: left;\"\u003E\u003Ccode\u003Efull_time_devs\u003C/code\u003E\u003C/td\u003E\n\u003Ctd style=\"text-align: left;\"\u003E\u0026gt;=10 active days per 28-day window\u003C/td\u003E\n\u003C/tr\u003E\n\u003Ctr\u003E\n\u003Ctd style=\"text-align: left;\"\u003EPart-time\u003C/td\u003E\n\u003Ctd style=\"text-align: left;\"\u003E\u003Ccode\u003Epart_time_devs\u003C/code\u003E\u003C/td\u003E\n\u003Ctd style=\"text-align: left;\"\u003E1-9 active days\u003C/td\u003E\n\u003C/tr\u003E\n\u003Ctr\u003E\n\u003Ctd style=\"text-align: left;\"\u003EOne-time\u003C/td\u003E\n\u003Ctd style=\"text-align: left;\"\u003E\u003Ccode\u003Eone_time_devs\u003C/code\u003E\u003C/td\u003E\n\u003Ctd style=\"text-align: left;\"\u003ESporadic activity over 84-day window\u003C/td\u003E\n\u003C/tr\u003E\n\u003C/tbody\u003E\n\u003C/table\u003E\n\u003Cspan class=\"paragraph\"\u003EThis is a point-in-time classification \u2014 ODD does not track transitions between states or dormancy/churn.\u003C/span\u003E\n\u003Cspan class=\"paragraph\"\u003EDDP extends this into 16 granular states that track direction of change:\u003C/span\u003E\n\u003Ctable\u003E\n\u003Cthead\u003E\n\u003Ctr\u003E\n\u003Cth style=\"text-align: left;\"\u003ECategory\u003C/th\u003E\n\u003Cth style=\"text-align: left;\"\u003ELabel\u003C/th\u003E\n\u003Cth style=\"text-align: left;\"\u003EDescription\u003C/th\u003E\n\u003C/tr\u003E\n\u003C/thead\u003E\n\u003Ctbody\u003E\n\u003Ctr\u003E\n\u003Ctd style=\"text-align: left;\"\u003E\u003Cstrong\u003EFirst Time\u003C/strong\u003E\u003C/td\u003E\n\u003Ctd style=\"text-align: left;\"\u003E\u003Ccode\u003Efirst time\u003C/code\u003E\u003C/td\u003E\n\u003Ctd style=\"text-align: left;\"\u003EFirst-ever contribution to the ecosystem\u003C/td\u003E\n\u003C/tr\u003E\n\u003Ctr\u003E\n\u003Ctd style=\"text-align: left;\"\u003E\u003Cstrong\u003EFull Time\u003C/strong\u003E\u003C/td\u003E\n\u003Ctd style=\"text-align: left;\"\u003E\u003Ccode\u003Efull time\u003C/code\u003E\u003C/td\u003E\n\u003Ctd style=\"text-align: left;\"\u003E10+ active days, continuing from prior month\u003C/td\u003E\n\u003C/tr\u003E\n\u003Ctr\u003E\n\u003Ctd style=\"text-align: left;\"\u003E\u003C/td\u003E\n\u003Ctd style=\"text-align: left;\"\u003E\u003Ccode\u003Enew full time\u003C/code\u003E\u003C/td\u003E\n\u003Ctd style=\"text-align: left;\"\u003EFirst month reaching 10+ active days\u003C/td\u003E\n\u003C/tr\u003E\n\u003Ctr\u003E\n\u003Ctd style=\"text-align: left;\"\u003E\u003C/td\u003E\n\u003Ctd style=\"text-align: left;\"\u003E\u003Ccode\u003Epart time to full time\u003C/code\u003E\u003C/td\u003E\n\u003Ctd style=\"text-align: left;\"\u003ETransitioned from part-time level\u003C/td\u003E\n\u003C/tr\u003E\n\u003Ctr\u003E\n\u003Ctd style=\"text-align: left;\"\u003E\u003C/td\u003E\n\u003Ctd style=\"text-align: left;\"\u003E\u003Ccode\u003Edormant to full time\u003C/code\u003E\u003C/td\u003E\n\u003Ctd style=\"text-align: left;\"\u003EReturned from dormancy at full-time level\u003C/td\u003E\n\u003C/tr\u003E\n\u003Ctr\u003E\n\u003Ctd style=\"text-align: left;\"\u003E\u003Cstrong\u003EPart Time\u003C/strong\u003E\u003C/td\u003E\n\u003Ctd style=\"text-align: left;\"\u003E\u003Ccode\u003Epart time\u003C/code\u003E\u003C/td\u003E\n\u003Ctd style=\"text-align: left;\"\u003E1-9 active days, continuing from prior month\u003C/td\u003E\n\u003C/tr\u003E\n\u003Ctr\u003E\n\u003Ctd style=\"text-align: left;\"\u003E\u003C/td\u003E\n\u003Ctd style=\"text-align: left;\"\u003E\u003Ccode\u003Enew part time\u003C/code\u003E\u003C/td\u003E\n\u003Ctd style=\"text-align: left;\"\u003EFirst month at part-time level\u003C/td\u003E\n\u003C/tr\u003E\n\u003Ctr\u003E\n\u003Ctd style=\"text-align: left;\"\u003E\u003C/td\u003E\n\u003Ctd style=\"text-align: left;\"\u003E\u003Ccode\u003Efull time to part time\u003C/code\u003E\u003C/td\u003E\n\u003Ctd style=\"text-align: left;\"\u003EStepped down from full-time level\u003C/td\u003E\n\u003C/tr\u003E\n\u003Ctr\u003E\n\u003Ctd style=\"text-align: left;\"\u003E\u003C/td\u003E\n\u003Ctd style=\"text-align: left;\"\u003E\u003Ccode\u003Edormant to part time\u003C/code\u003E\u003C/td\u003E\n\u003Ctd style=\"text-align: left;\"\u003EReturned from dormancy at part-time level\u003C/td\u003E\n\u003C/tr\u003E\n\u003Ctr\u003E\n\u003Ctd style=\"text-align: left;\"\u003E\u003Cstrong\u003EChurned / Dormant\u003C/strong\u003E\u003C/td\u003E\n\u003Ctd style=\"text-align: left;\"\u003E\u003Ccode\u003Edormant\u003C/code\u003E\u003C/td\u003E\n\u003Ctd style=\"text-align: left;\"\u003ENo activity this month (previously active)\u003C/td\u003E\n\u003C/tr\u003E\n\u003Ctr\u003E\n\u003Ctd style=\"text-align: left;\"\u003E\u003C/td\u003E\n\u003Ctd style=\"text-align: left;\"\u003E\u003Ccode\u003Efirst time to dormant\u003C/code\u003E\u003C/td\u003E\n\u003Ctd style=\"text-align: left;\"\u003EDormant after first contribution\u003C/td\u003E\n\u003C/tr\u003E\n\u003Ctr\u003E\n\u003Ctd style=\"text-align: left;\"\u003E\u003C/td\u003E\n\u003Ctd style=\"text-align: left;\"\u003E\u003Ccode\u003Epart time to dormant\u003C/code\u003E\u003C/td\u003E\n\u003Ctd style=\"text-align: left;\"\u003EDormant after part-time activity\u003C/td\u003E\n\u003C/tr\u003E\n\u003Ctr\u003E\n\u003Ctd style=\"text-align: left;\"\u003E\u003C/td\u003E\n\u003Ctd style=\"text-align: left;\"\u003E\u003Ccode\u003Efull time to dormant\u003C/code\u003E\u003C/td\u003E\n\u003Ctd style=\"text-align: left;\"\u003EDormant after full-time activity\u003C/td\u003E\n\u003C/tr\u003E\n\u003Ctr\u003E\n\u003Ctd style=\"text-align: left;\"\u003E\u003C/td\u003E\n\u003Ctd style=\"text-align: left;\"\u003E\u003Ccode\u003Echurned (after first time)\u003C/code\u003E\u003C/td\u003E\n\u003Ctd style=\"text-align: left;\"\u003EExtended inactivity after first contribution\u003C/td\u003E\n\u003C/tr\u003E\n\u003Ctr\u003E\n\u003Ctd style=\"text-align: left;\"\u003E\u003C/td\u003E\n\u003Ctd style=\"text-align: left;\"\u003E\u003Ccode\u003Echurned (after reaching part time)\u003C/code\u003E\u003C/td\u003E\n\u003Ctd style=\"text-align: left;\"\u003EExtended inactivity after reaching part time\u003C/td\u003E\n\u003C/tr\u003E\n\u003Ctr\u003E\n\u003Ctd style=\"text-align: left;\"\u003E\u003C/td\u003E\n\u003Ctd style=\"text-align: left;\"\u003E\u003Ccode\u003Echurned (after reaching full time)\u003C/code\u003E\u003C/td\u003E\n\u003Ctd style=\"text-align: left;\"\u003EExtended inactivity after reaching full time\u003C/td\u003E\n\u003C/tr\u003E\n\u003C/tbody\u003E\n\u003C/table\u003E\n\u003Cspan class=\"paragraph\"\u003E\u003Cstrong\u003EActive\u003C/strong\u003E = First Time + Full Time + Part Time (all 9 labels above the Churned/Dormant group).\u003C/span\u003E\n\u003Cspan class=\"paragraph\"\u003EActivity levels (full-time, part-time) are assessed over a 28-day rolling window per Electric Capital's methodology. Dormancy transitions to churn after approximately 6 months of continuous inactivity.\u003C/span\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "f83fbb9d9c6e6b354e8c48b322863e12", "console": [], "id": "vblA", "outputs": [{"data": {"text/html": "\u003Cmarimo-mermaid data-diagram='\u0026quot;\u0026#92;ngraph LR\u0026#92;n    NEW[\u0026#92;\u0026quot;New\u0026lt;br/\u0026gt;\u0026lt;small\u0026gt;First contribution\u0026lt;/small\u0026gt;\u0026#92;\u0026quot;] --\u0026gt; FT[\u0026#92;\u0026quot;Full-Time\u0026lt;br/\u0026gt;\u0026lt;small\u0026gt;10+ days / 28d\u0026lt;/small\u0026gt;\u0026#92;\u0026quot;]\u0026#92;n    NEW --\u0026gt; PT[\u0026#92;\u0026quot;Part-Time\u0026lt;br/\u0026gt;\u0026lt;small\u0026gt;1-9 days / 28d\u0026lt;/small\u0026gt;\u0026#92;\u0026quot;]\u0026#92;n    FT \u0026lt;--\u0026gt;|\u0026#92;\u0026quot;activity changes\u0026#92;\u0026quot;| PT\u0026#92;n    FT --\u0026gt;|\u0026#92;\u0026quot;stops contributing\u0026#92;\u0026quot;| DORMANT[\u0026#92;\u0026quot;Dormant\u0026lt;br/\u0026gt;\u0026lt;small\u0026gt;1-6 months inactive\u0026lt;/small\u0026gt;\u0026#92;\u0026quot;]\u0026#92;n    PT --\u0026gt;|\u0026#92;\u0026quot;stops contributing\u0026#92;\u0026quot;| DORMANT\u0026#92;n    DORMANT --\u0026gt;|\u0026#92;\u0026quot;resumes activity\u0026#92;\u0026quot;| FT\u0026#92;n    DORMANT --\u0026gt;|\u0026#92;\u0026quot;resumes activity\u0026#92;\u0026quot;| PT\u0026#92;n    DORMANT --\u0026gt;|\u0026#92;\u0026quot;\u0026gt;6 months\u0026#92;\u0026quot;| CHURNED[\u0026#92;\u0026quot;Churned\u0026lt;br/\u0026gt;\u0026lt;small\u0026gt;\u0026gt;6 months inactive\u0026lt;/small\u0026gt;\u0026#92;\u0026quot;]\u0026#92;n    CHURNED -.-\u0026gt;|\u0026#92;\u0026quot;rare return\u0026#92;\u0026quot;| FT\u0026#92;n    CHURNED -.-\u0026gt;|\u0026#92;\u0026quot;rare return\u0026#92;\u0026quot;| PT\u0026#92;n\u0026quot;'\u003E\u003C/marimo-mermaid\u003E"}, "type": "data"}]}, {"code_hash": "9d5a709984056317f43ca992615016ec", "console": [], "id": "bkHC", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Ch2 id=\"ddp-variants\"\u003EDDP Variants\u003C/h2\u003E\n\u003Ctable\u003E\n\u003Cthead\u003E\n\u003Ctr\u003E\n\u003Cth style=\"text-align: left;\"\u003EVariant\u003C/th\u003E\n\u003Cth style=\"text-align: left;\"\u003EInsight\u003C/th\u003E\n\u003Cth style=\"text-align: left;\"\u003EDefinition\u003C/th\u003E\n\u003Cth style=\"text-align: left;\"\u003EHow It Differs\u003C/th\u003E\n\u003C/tr\u003E\n\u003C/thead\u003E\n\u003Ctbody\u003E\n\u003Ctr\u003E\n\u003Ctd style=\"text-align: left;\"\u003E16-state transition model\u003C/td\u003E\n\u003Ctd style=\"text-align: left;\"\u003ELifecycle Analysis\u003C/td\u003E\n\u003Ctd style=\"text-align: left;\"\u003EExpands ODD's 3 states into 16 granular labels tracking direction of change: \u003Ccode\u003Efirst time\u003C/code\u003E, \u003Ccode\u003Enew full time\u003C/code\u003E, \u003Ccode\u003Epart time to full time\u003C/code\u003E, \u003Ccode\u003Edormant to full time\u003C/code\u003E, etc. Rolled up to 4 categories: First Time, Full Time, Part Time, Churned/Dormant\u003C/td\u003E\n\u003Ctd style=\"text-align: left;\"\u003EAdds state transitions, dormancy (1-6mo inactive), and churn (\u0026gt;6mo). Uses pre-aggregated \u003Ccode\u003Eint_crypto_ecosystems_developer_lifecycle_monthly_aggregated\u003C/code\u003E\u003C/td\u003E\n\u003C/tr\u003E\n\u003Ctr\u003E\n\u003Ctd style=\"text-align: left;\"\u003EMonthly churn rate\u003C/td\u003E\n\u003Ctd style=\"text-align: left;\"\u003ELifecycle Analysis\u003C/td\u003E\n\u003Ctd style=\"text-align: left;\"\u003E\u003Ccode\u003E(churned + dormant) / active * 100\u003C/code\u003E per month\u003C/td\u003E\n\u003Ctd style=\"text-align: left;\"\u003EDerived ratio not in ODD. Measures ecosystem health over time\u003C/td\u003E\n\u003C/tr\u003E\n\u003Ctr\u003E\n\u003Ctd style=\"text-align: left;\"\u003EProject-level lifecycle\u003C/td\u003E\n\u003Ctd style=\"text-align: left;\"\u003EDeFi Builder Journeys\u003C/td\u003E\n\u003Ctd style=\"text-align: left;\"\u003EOnboarding month (first home project activity), offboarding month (6+ months inactive), tenure, current status (active/elsewhere/inactive)\u003C/td\u003E\n\u003Ctd style=\"text-align: left;\"\u003EPer-project, not per-ecosystem. Tracks individual developer journeys rather than aggregate state distributions\u003C/td\u003E\n\u003C/tr\u003E\n\u003C/tbody\u003E\n\u003C/table\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "3a145f10384b059a916bbaa0bd51c44e", "console": [], "id": "lEQa", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Ch2 id=\"sample-queries\"\u003ESample Queries\u003C/h2\u003E\n\u003Ch3 id=\"1-activity-level-snapshot-odd-standard\"\u003E1. Activity Level Snapshot (ODD Standard)\u003C/h3\u003E\n\u003Cspan class=\"paragraph\"\u003EThe standard \u003Ccode\u003Eeco_mads\u003C/code\u003E table provides a daily snapshot of developer activity levels per ecosystem. This query shows the latest 10 days for Ethereum with percentage breakdowns.\u003C/span\u003E\n\u003Cdiv class=\"language-sql codehilite\"\u003E\u003Cpre\u003E\u003Cspan\u003E\u003C/span\u003E\u003Ccode\u003E\u003Cspan class=\"k\"\u003ESELECT\u003C/span\u003E\n\u003Cspan class=\"w\"\u003E  \u003C/span\u003E\u003Cspan class=\"n\"\u003Em\u003C/span\u003E\u003Cspan class=\"p\"\u003E.\u003C/span\u003E\u003Cspan class=\"k\"\u003Eday\u003C/span\u003E\u003Cspan class=\"p\"\u003E,\u003C/span\u003E\n\u003Cspan class=\"w\"\u003E  \u003C/span\u003E\u003Cspan class=\"n\"\u003Em\u003C/span\u003E\u003Cspan class=\"p\"\u003E.\u003C/span\u003E\u
